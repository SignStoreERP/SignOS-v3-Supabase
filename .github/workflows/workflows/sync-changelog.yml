on:
  push:
    branches:
      - main
      - dev

jobs:
  log_commit_to_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Post Commit to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMMIT_HASH: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # 1. Determine the Twin-Engine Environment
          ENV="DEV"
          if [ "$BRANCH" == "main" ]; then
            ENV="LIVE"
          fi

          # 2. Calculate Files Changed
          FILES_CHANGED=$(git diff --name-only HEAD^ HEAD | wc -l || echo "1")
          
          # Clean up the message for JSON safety
          CLEAN_MSG=$(echo "$COMMIT_MSG" | tr '\n' ' ' | sed 's/"/\\"/g')

          echo "Logging commit to SignOS Changelog ($ENV)..."

          # 3. Push to Supabase REST API
          curl -s -X POST "$SUPABASE_URL/rest/v1/sys_changelog" \
          -H "apikey: $SUPABASE_KEY" \
          -H "Authorization: Bearer $SUPABASE_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "author": "'"$COMMIT_AUTHOR"'",
            "commit_hash": "'"$COMMIT_HASH"'",
            "message": "'"$CLEAN_MSG"'",
            "files_changed": "'"$FILES_CHANGED"'",
            "github_link": "'"$COMMIT_URL"'",
            "environment": "'"$ENV"'"
          }'