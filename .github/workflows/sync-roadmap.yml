name: SignOS Roadmap Auto-Sync

on:
  push:
    branches:
      - main
      - dev

jobs:
  sync_to_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Commit and Update Strategy Board
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          echo "Scanning commit for SignOS Epic Tracker IDs..."
          
          # Extract Ticket ID (e.g., RMP_SPRINT_02)
          TICKET_ID=$(echo "$COMMIT_MSG" | grep -oP 'RMP_[A-Za-z0-9_]+' | head -n 1)

          # Extract Status if provided (e.g., Status: Live)
          STATUS=$(echo "$COMMIT_MSG" | grep -ioP 'Status:\s*\K([A-Za-z ]+)' | head -n 1)

          if [ -n "$TICKET_ID" ]; then
            echo "Match found! Syncing to Ticket: $TICKET_ID"

            # 1. Log the Code Commit into the Ticket History
            curl -s -X POST "$SUPABASE_URL/rest/v1/ticket_actions" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "ticket_id": "'"$TICKET_ID"'",
              "user_id": "'"$COMMIT_AUTHOR"'",
              "type": "Code Commit",
              "message": "'"$COMMIT_MSG"'"
            }'

            # 2. Advance the Status Column (if a status is specified)
            if [ -n "$STATUS" ]; then
              echo "Advancing Ticket Status to: $STATUS"
              curl -s -X PATCH "$SUPABASE_URL/rest/v1/sys_roadmap?id=eq.$TICKET_ID" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "status": "'"$STATUS"'"
              }'
            fi
          else
            echo "No RMP_ identifier found. Skipping roadmap sync."
          fi