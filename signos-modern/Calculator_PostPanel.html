<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post & Panel Signs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <script src="signos-ui.js"></script>
    <script src="signos-sandbox.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scroll { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* 3D Rendering Engine Classes */
        #preview-wrapper { perspective: 1200px; cursor: grab; }
        #preview-wrapper:active { cursor: grabbing; }
        #svg-preview-container { transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        
        /* FIXED: Target the container itself, removing the space in the selector */
        #svg-preview-container.isometric-view { transform: rotateX(82deg) rotateZ(-25deg); }
        #svg-preview-container.front-view { transform: rotateX(90deg) rotateZ(0deg); }
        
        /* Lowered camera angle from 60deg to 82deg to fix the "Top Down" view */
        .isometric-view #svg-preview-container { transform: rotateX(82deg) rotateZ(-25deg); }
        .front-view #svg-preview-container { transform: rotateX(90deg) rotateZ(0deg); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10 overflow-x-hidden">
    <div id="app-wrapper" class="w-full max-w-xl mx-auto mt-8 transition-all duration-500 flex justify-center items-start gap-4 px-4 sm:px-0">
        
        <!-- LEFT: FULL MATH LEDGER (SANDBOX) -->
        <div id="sandbox-ledger" class="hidden w-[380px] bg-white shadow-xl rounded-xl border border-gray-200 flex-col shrink-0 relative z-10">
            <div class="p-4 bg-slate-50 border-b border-gray-200 flex flex-col shrink-0 rounded-t-xl gap-3">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-sm font-black text-gray-800 uppercase tracking-widest">Financial Ledger</h2>
                        <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Market vs. Physics Breakdown</span>
                    </div>
                    <button onclick="SignOS_Sandbox.toggle()" class="text-gray-400 hover:text-red-500 transition font-bold text-lg focus:outline-none">✕</button>
                </div>
                <div id="ledger-interactive-header" class="bg-white p-3 rounded border border-gray-200 shadow-sm"></div>
            </div>
            <div class="p-5 space-y-6">
                <div>
                    <h3 class="text-[11px] font-black text-blue-700 uppercase tracking-widest border-b-2 border-blue-100 pb-2 mb-3">Market Logic (Retail)</h3>
                    <div id="sbx-retail-breakdown" class="space-y-3 mb-4"></div>
                </div>
                <div>
                    <h3 class="text-[11px] font-black text-red-700 uppercase tracking-widest border-b-2 border-red-100 pb-2 mb-3">Physics Engine (Hard Cost)</h3>
                    <div id="sbx-cost-breakdown" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- CENTER: MAIN CALCULATOR ISLAND -->
        <div class="flex flex-col gap-4 w-full max-w-xl shrink-0 z-20">
            <div id="main-card" class="w-full bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200 transition-all duration-300 relative">
                
                <!-- 3D ARCHITECTURAL VIEWPORT -->
                <div class="w-full h-80 bg-slate-900 border-b border-gray-200 flex flex-col relative overflow-hidden">
                    <div class="absolute top-3 left-3 z-30 flex gap-1.5 pointer-events-auto">
                        <button onclick="toggle3D()" id="btn-3d" class="bg-white/90 hover:bg-gray-50 text-blue-600 border border-gray-200 px-3 py-1.5 rounded shadow-sm text-[8px] font-black uppercase tracking-widest transition backdrop-blur-sm focus:outline-none">3D Isometric View</button>
                        <button onclick="toggleExplode()" id="btn-explode" class="bg-white/90 hover:bg-gray-50 text-indigo-600 border border-gray-200 px-3 py-1.5 rounded shadow-sm text-[8px] font-black uppercase tracking-widest transition backdrop-blur-sm focus:outline-none">Explode View</button>
                        <button onclick="SignOS_UI.Camera3D.reset()" class="bg-white/80 hover:bg-gray-50 text-gray-500 border border-gray-200 px-3 py-1.5 rounded shadow-sm text-[8px] font-black uppercase tracking-widest transition backdrop-blur-sm focus:outline-none">Reset Camera</button>
                    </div>
                    <span class="absolute top-3 right-3 text-[8px] font-bold text-slate-400 uppercase tracking-widest z-10 pointer-events-none">Live Structural Physics</span>
                    
                    <!-- 3D STAGE W/ PAN & ZOOM HOOKS -->
                    <div id="preview-wrapper" class="w-full h-full flex items-center justify-center cursor-grab active:cursor-grabbing" onwheel="SignOS_UI.Camera3D.handleZoom(event)" onmousedown="SignOS_UI.Camera3D.startPan(event)" onmousemove="SignOS_UI.Camera3D.handlePan(event)" onmouseup="SignOS_UI.Camera3D.endPan()" onmouseleave="SignOS_UI.Camera3D.endPan()">
                        <div id="zoom-stage" class="w-full h-full flex items-center justify-center origin-center">
                            <!-- Defaulted to Front View! -->
                            <div id="svg-preview-container" class="front-view relative transition-transform duration-700 ease-in-out" style="transform-style: preserve-3d; width: 0; height: 0;"></div>
                        </div>
                    </div>
                </div>

                <!-- PHYSICS COLLISION GUARD ALERT -->
                <div id="physics-warn" class="hidden bg-red-100 text-red-800 text-[10px] font-bold px-4 py-2 border-b border-red-300 flex items-center gap-2 transition-opacity">
                    <span class="text-sm">⚠️</span> <span id="physics-warn-msg">Physics limit reached.</span>
                </div>

                <div class="p-6 space-y-5">
                    <!-- Global Configuration -->
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 border-b border-gray-100 pb-4">
                        <div>
                            <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Total Qty</label>
                            <input type="number" id="qty" value="1" min="1" class="w-full border border-gray-300 p-2 rounded text-lg font-black text-center bg-gray-50 focus:border-blue-500 outline-none shadow-inner" oninput="runCalc()">
                        </div>
                        <div class="col-span-3 grid grid-cols-3 gap-3 bg-blue-50/50 p-2 rounded border border-blue-100 shadow-sm">
                            <div class="col-span-2">
                                <label class="block text-[9px] font-bold text-blue-700 uppercase mb-1">System Width (in)</label>
                                <div class="flex">
                                    <input type="number" id="systemWidth" value="48" min="12" step="1" class="w-16 border border-gray-300 p-2 rounded-l text-sm font-black text-center focus:border-blue-500 outline-none shadow-inner bg-white" oninput="runCalc()">
                                    <select id="widthMode" class="flex-1 border-y border-r border-gray-300 p-2 rounded-r text-xs font-bold text-gray-700 outline-none focus:border-blue-500 bg-white" onchange="runCalc()">
                                        <option value="Overall">Overall Width (O.A.W)</option>
                                        <option value="Inside">Inside Distance (I.D)</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-blue-700 uppercase mb-1" title="Total Height Above Grade">THAG (in)</label>
                                <input type="number" id="thag" value="84" min="12" step="1" class="w-full border border-gray-300 p-2 rounded text-sm font-black text-center focus:border-blue-500 outline-none shadow-inner bg-white" oninput="runCalc()">
                            </div>
                        </div>
                    </div>

                    <!-- Panel Section Builder -->
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <label class="block text-[10px] font-black text-gray-600 uppercase tracking-widest">Sign Panels</label>
                            <button onclick="addPanel()" class="text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded hover:bg-blue-600 hover:text-white transition shadow-sm">+ ADD PANEL</button>
                        </div>
                        <div id="panel-container" class="space-y-3"></div>
                    </div>

                    <!-- Posts & Skeleton -->
                    <div class="border-t border-gray-100 pt-3 space-y-3">
                        <label class="block text-[10px] font-black text-gray-600 uppercase tracking-widest">Structural Skeleton</label>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="flex gap-1">
                                <select id="postType" class="w-1/2 border border-gray-300 p-2 rounded-l text-xs font-bold text-gray-700 outline-none focus:border-blue-500 h-[38px] shadow-sm bg-white" onchange="runCalc()">
                                    <option value="Aluminum" selected>Aluminum Post</option>
                                    <option value="Steel">Steel Post</option>
                                </select>
                                <select id="postSize" class="w-1/2 border-y border-r border-gray-300 p-2 rounded-r text-xs font-bold text-gray-700 outline-none focus:border-blue-500 h-[38px] shadow-sm bg-white" onchange="runCalc()">
                                    <option value="2">2" Square</option>
                                    <option value="3">3" Square</option>
                                    <option value="4" selected>4" Square</option>
                                    <option value="6">6" Square</option>
                                </select>
                            </div>
                            <div>
                                <select id="frameMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none focus:border-blue-500 h-[38px] shadow-sm bg-white" onchange="runCalc()">
                                    <option value="AlumAngle_1.5_1/8">1.5" Aluminum Angle</option>
                                    <option value="AlumAngle_2_1/8">2" Aluminum Angle</option>
                                    <option value="AlumTube_1.5_1/8">1.5" Aluminum Square Tube</option>
                                    <option value="AlumTube_2_1/8" selected>2" Aluminum Square Tube</option>
                                    <option value="SteelAngle_1.5_1/8">1.5" Steel Angle</option>
                                    <option value="SteelAngle_2_1/8">2" Steel Angle</option>
                                    <option value="SteelTube_1.5_1/8">1.5" Steel Tube</option>
                                    <option value="SteelTube_2_1/8">2" Steel Tube</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <div>
                                <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Top Offset (in)</label>
                                <input type="number" id="topOffset" value="0" min="0" step="1" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-center focus:border-blue-500 outline-none shadow-sm h-[38px] bg-white" oninput="runCalc()" title="Distance panel is dropped from top of posts">
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Foundation</label>
                                <select id="underground" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none focus:border-blue-500 h-[38px] shadow-sm bg-white" onchange="runCalc()">
                                    <option value="36" selected>36" Direct Burial w/ Concrete</option>
                                    <option value="48">48" Direct Burial w/ Concrete</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RESULTS -->
                <div class="bg-blue-50 p-6 border-t border-blue-200 shadow-inner relative z-0">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Price</span>
                        <span id="ui-unit" class="text-3xl font-black text-blue-900 tracking-tight leading-none">$0.00</span>
                    </div>
                    <div class="border-t border-blue-200/50 my-3"></div>
                    <div class="flex justify-between items-end pt-1">
                        <div>
                            <span class="text-xs font-bold text-blue-800 uppercase block">Total Quote</span>
                            <span class="text-[9px] font-bold text-blue-600 uppercase block mt-1" id="ui-min-text">Shop Minimum: $150</span>
                            <div id="min-badge" class="hidden bg-red-100 text-red-600 border border-red-200 text-[9px] font-bold px-1 rounded inline-block mt-1">MINIMUM APPLIED</div>
                        </div>
                        <span class="text-3xl font-black text-blue-700" id="ui-total">---</span>
                    </div>
                    <button id="btn-sandbox" onclick="SignOS_Sandbox.toggle()" class="hidden w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-black py-2.5 rounded shadow-md uppercase tracking-widest transition">
                        Launch Cost Sandbox
                    </button>
                </div>
                
                <div class="bg-gray-50 p-4 border-t border-gray-200">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Job Description</label>
                    <textarea id="job-desc" class="w-full text-xs p-3 border border-gray-300 rounded bg-white h-32 text-gray-700 font-mono outline-none leading-snug shadow-inner custom-scroll" readonly></textarea>
                </div>
            </div>
        </div>

        <!-- RIGHT: SANDBOX VARIABLES -->
        <div id="sandbox-vars" class="hidden w-[350px] bg-white shadow-xl rounded-xl border border-gray-200 flex-col shrink-0 relative z-10">
            <div class="p-4 bg-slate-50 border-b border-gray-200 flex justify-between items-center shrink-0 rounded-t-xl">
                <div>
                    <h2 class="text-sm font-black text-gray-800 uppercase tracking-widest">Sandbox Variables</h2>
                    <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Modify System Inputs</span>
                </div>
            </div>
            <div class="p-5 space-y-6 overflow-y-auto custom-scroll max-h-[60vh]">
                <div id="sbx-retail-inputs" class="space-y-2 mb-6"></div>
                <div id="sbx-cost-inputs" class="space-y-2"></div>
            </div>
            <div class="p-4 bg-slate-50 border-t border-gray-200 shrink-0 space-y-2 rounded-b-xl z-20">
                <button onclick="SignOS_Sandbox.apply()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded shadow text-xs uppercase tracking-widest transition">Apply & Simulate</button>
                <div class="flex gap-2">
                    <button onclick="SignOS_Sandbox.reset()" class="flex-1 bg-white border border-gray-300 hover:bg-gray-100 text-gray-600 font-bold py-2 rounded text-[10px] uppercase tracking-widest transition shadow-sm">Reset</button>
                    <button onclick="SignOS_Sandbox.exportTXT()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-2 rounded text-[10px] uppercase tracking-widest transition shadow-sm">Export TXT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const POSTPANEL_UI_SCHEMA = {
            retails: [
                { key: 'Target_Margin_Pct', label: 'Target Margin (%)' },
                { key: 'Override_Retail_Total', label: 'Override Price ($)' }
            ],
            costs: [
                { key: 'Cost_Post_Aluminum_2_1/8', label: '2" Alum Post ($/LF)' },
                { key: 'Cost_Post_Aluminum_3_1/8', label: '3" Alum Post ($/LF)' },
                { key: 'Cost_Post_Aluminum_4_1/8', label: '4" Alum Post ($/LF)' },
                { key: 'Cost_Post_Aluminum_6_1/4', label: '6" Alum Post ($/LF)' },
                { key: 'Cost_Post_Steel_2_1/8', label: '2" Steel Post ($/LF)' },
                { key: 'Cost_Post_Steel_3_1/8', label: '3" Steel Post ($/LF)' },
                { key: 'Cost_Post_Steel_4_3/16', label: '4" Steel Post ($/LF)' },
                { key: 'Cost_Post_Steel_6_3/16', label: '6" Steel Post ($/LF)' },
                { key: 'Cost_Frame_AlumAngle_1.5_1/8', label: '1.5" Alum Angle ($/LF)' },
                { key: 'Cost_Frame_AlumAngle_2_1/8', label: '2.0" Alum Angle ($/LF)' },
                { key: 'Cost_Frame_AlumTube_1.5_1/8', label: '1.5" Alum Tube ($/LF)' },
                { key: 'Cost_Frame_AlumTube_2_1/8', label: '2.0" Alum Tube ($/LF)' },
                { key: 'Cost_Frame_SteelAngle_1.5_1/8', label: '1.5" Steel Angle ($/LF)' },
                { key: 'Cost_Frame_SteelAngle_2_1/8', label: '2.0" Steel Angle ($/LF)' },
                { key: 'Cost_Frame_SteelTube_1.5_1/8', label: '1.5" Steel Tube ($/LF)' },
                { key: 'Cost_Frame_SteelTube_2_1/8', label: '2.0" Steel Tube ($/LF)' },
                { key: 'Cost_Stock_040_4x8', label: '.040 Alum Sht ($)' },
                { key: 'Cost_Stock_063_4x8', label: '.063 Alum Sht ($)' },
                { key: 'Cost_Stock_080_4x8', label: '.080 Alum Sht ($)' },
                { key: 'Cost_Stock_3mm_4x8', label: '3mm ACM Sht ($)' },
                { key: 'Cost_Stock_6mm_4x8', label: '6mm ACM Sht ($)' },
                { key: 'Cost_Concrete_Bag', label: 'Concrete Bag ($)' },
                { key: 'Cost_Adhesive_Tube', label: 'Lord\'s Glue ($/Tube)' },
                { key: 'Cost_Vin_Cast', label: 'Cast Vinyl ($/SF)' },
                { key: 'Cost_Lam_Cast', label: 'Cast Lam ($/SF)' },
                { key: 'Cost_Ink_Latex', label: 'Latex Ink ($/SF)' },
                { key: 'Cost_Paint_SqFt', label: 'Paint Cost ($/SF)' },
                { key: 'Rate_Shop_Labor', label: 'Shop Rate ($/Hr)' },
                { key: 'Rate_Paint_Labor', label: 'Paint Rate ($/Hr)' },
                { key: 'Rate_Operator', label: 'Print Op ($/Hr)' },
                { key: 'Rate_Machine_Print', label: 'Print Mach ($/Hr)' },
                { key: 'Time_Saw_Band', label: 'Band Saw (Mins/Cut)' },
                { key: 'Time_Saw_Miter', label: 'Miter Saw (Mins/Cut)' },
                { key: 'Time_Weld_Per_Loc', label: 'Weld (Mins/Loc)' },
                { key: 'Time_Clean_Weld_Loc', label: 'Clean Weld (Mins/Loc)' },
                { key: 'Time_Paint_Setup', label: 'Paint Prep (Mins)' },
                { key: 'Waste_Factor', label: 'Waste Multiplier' },
                { key: 'Factor_Risk', label: 'Risk Multiplier' }
            ]
        };

        let backendData = {};
        let panels = [{ id: Date.now(), h: 48, mountStyle: 'Flush', faceMat: '3mm ACM', sides: 2, gap: 0 }];
        
        let is3D = false; // Defaulted to Flat Front View
        let isExploded = false;

        function toggle3D() {
            is3D = !is3D;
            const container = document.getElementById('svg-preview-container');
            
            if (is3D) {
                container.classList.add('isometric-view');
                container.classList.remove('front-view');
            } else {
                container.classList.remove('isometric-view');
                container.classList.add('front-view');
            }
            
            document.getElementById('btn-3d').innerText = is3D ? "Flat 2D View" : "3D Isometric View";
            document.getElementById('btn-explode').classList.toggle('hidden', !is3D);
            
            if (!is3D && isExploded) toggleExplode();
            runCalc();
        }

        function toggleExplode() {
            isExploded = !isExploded;
            document.getElementById('btn-explode').innerText = isExploded ? "Stack Layers" : "Explode View";
            runCalc();
        }

        function renderPanels() {
            const container = document.getElementById('panel-container');
            container.innerHTML = '';
            
            panels.forEach((p, index) => {
                const isFirst = index === 0;
                
                container.innerHTML += `
                <div class="flex flex-col gap-2 bg-gray-50 p-3 rounded-lg border border-gray-200 shadow-sm relative">
                    <span class="absolute -top-2.5 left-3 bg-blue-100 text-blue-800 text-[8px] font-black px-1.5 py-0.5 rounded border border-blue-200 uppercase tracking-widest">Panel ${index + 1}</span>
                    ${!isFirst ? `<button onclick="removePanel(${p.id})" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 font-bold focus:outline-none">✕</button>` : ''}
                    
                    <div class="grid grid-cols-4 gap-2 mt-1">
                        <div class="col-span-2">
                            <label class="block text-[8px] font-bold text-gray-500 uppercase mb-0.5">Mount Style</label>
                            <select onchange="updatePanel(${p.id}, 'mountStyle', this.value)" class="w-full border border-gray-300 p-1.5 rounded text-xs font-bold text-gray-700 outline-none focus:border-blue-500 bg-white">
                                <option value="Flush" ${p.mountStyle === 'Flush' ? 'selected' : ''}>Flush Mount</option>
                                <option value="Between" ${p.mountStyle === 'Between' ? 'selected' : ''}>Between Posts</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[8px] font-bold text-gray-500 uppercase mb-0.5 text-center">Height (in)</label>
                            <input type="number" value="${p.h}" oninput="updateDim(${p.id}, 'h', this.value)" class="w-full border border-gray-300 p-1.5 rounded text-xs font-bold text-center outline-none focus:border-blue-500 bg-white shadow-inner">
                        </div>
                        <div>
                            <label class="block text-[8px] font-bold text-gray-500 uppercase mb-0.5 text-center">Gap (in)</label>
                            <input type="number" value="${p.gap}" oninput="updateDim(${p.id}, 'gap', this.value)" class="w-full border border-gray-300 p-1.5 rounded text-xs font-bold text-center outline-none focus:border-blue-500 bg-white shadow-inner" ${isFirst ? 'disabled opacity-50' : ''}>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <select onchange="updatePanel(${p.id}, 'faceMat', this.value)" class="w-full border border-gray-300 p-1.5 rounded text-xs font-bold text-gray-700 outline-none focus:border-blue-500 bg-white">
                                <option value="063 Alum" ${p.faceMat === '063 Alum' ? 'selected' : ''}>.063 Aluminum</option>
                                <option value="080 Alum" ${p.faceMat === '080 Alum' ? 'selected' : ''}>.080 Aluminum</option>
                                <option value="3mm ACM" ${p.faceMat === '3mm ACM' ? 'selected' : ''}>3mm ACM</option>
                                <option value="6mm ACM" ${p.faceMat === '6mm ACM' ? 'selected' : ''}>6mm ACM</option>
                            </select>
                        </div>
                        <div>
                            <select onchange="updateDim(${p.id}, 'sides', this.value)" class="w-full border border-gray-300 p-1.5 rounded text-xs font-bold text-gray-700 outline-none focus:border-blue-500 bg-white">
                                <option value="1" ${p.sides == 1 ? 'selected' : ''}>1-Sided</option>
                                <option value="2" ${p.sides == 2 ? 'selected' : ''}>2-Sided</option>
                            </select>
                        </div>
                    </div>
                </div>`;
            });
            runCalc();
        }

        function updatePanel(id, field, val) {
            const p = panels.find(x => x.id === id);
            if(p) { p[field] = val; renderPanels(); }
        }
        function updateDim(id, field, val) {
            const p = panels.find(x => x.id === id);
            if(p) { p[field] = parseFloat(val) || 0; runCalc(); }
        }
        function addPanel() {
            panels.push({ id: Date.now(), h: 12, mountStyle: 'Between', faceMat: '3mm ACM', sides: 2, gap: 2 });
            renderPanels();
        }
        function removePanel(id) {
            panels = panels.filter(x => x.id !== id);
            renderPanels();
        }
        
        // --- PHYSICS ENFORCEMENT ENGINE ---
        function enforcePhysics() {
            let thagEl = document.getElementById('thag');
            let offsetEl = document.getElementById('topOffset');
            let pSize = parseFloat(document.getElementById('postSize').value) || 2;
            let pType = document.getElementById('postType').value;
            let under = parseFloat(document.getElementById('underground').value) || 36;
            
            let fThickMatch = document.getElementById('frameMat').value.match(/(\d+(\.\d+)?)/); 
            let fThick = fThickMatch ? parseFloat(fThickMatch) : 2;
            let isAngle = document.getElementById('frameMat').value.includes('Angle');
            
            let warnEl = document.getElementById('physics-warn');
            let warnMsg = document.getElementById('physics-warn-msg');

            let thag = parseFloat(thagEl.value) || 84;
            let offset = parseFloat(offsetEl.value) || 0;
            
            let didClamp = false;
            let msg = "";

            // 1. Force Offset to 0 if Primary Panel is Flush
            if (panels && panels && panels.mountStyle === 'Flush' && offset > 0) {
                offset = 0; offsetEl.value = 0;
                didClamp = true; msg = "Top Offset must be 0 when Primary Panel is Flush Mount.";
            }

            // 2. Height Guard: Panels + Gaps + Offset cannot exceed THAG
            let totalStack = offset + panels.reduce((sum, p, i) => sum + p.h + (i > 0 ? p.gap : 0), 0);
            if (thag < totalStack) {
                thag = totalStack; thagEl.value = thag;
                didClamp = true; msg = "THAG automatically increased to support total panel stack height.";
            }

            // 3. Parent Stock Limit Guard (Steel: 20', Alum: 24')
            let maxInches = pType === 'Steel' ? 240 : 288;
            if ((thag + under) > maxInches) {
                thag = maxInches - under; thagEl.value = thag;
                didClamp = true; msg = `Max stock limit (${maxInches/12}') reached. THAG clamped to ${thag}".`;
            }

            // 4. Internal Frame Depth Collision Guard
            panels.forEach(p => {
                let internalFrameDepth = (isAngle && p.sides === 2) ? fThick * 2 : fThick;
                if (p.mountStyle === 'Flush' && internalFrameDepth > pSize) {
                    document.getElementById('frameMat').value = document.getElementById('frameMat').value.includes('Alum') ? 'AlumTube_1.5_1/8' : 'SteelTube_1.5_1/8'; 
                    didClamp = true; msg = `Structural collision: Frame depth (${internalFrameDepth}") exceeded Post size (${pSize}"). Frame reduced to 1.5" material.`;
                }
            });

            if (didClamp) {
                warnEl.classList.remove('hidden');
                warnMsg.innerText = msg;
                clearTimeout(warnEl.timeoutId);
                warnEl.timeoutId = setTimeout(() => warnEl.classList.add('hidden'), 5000);
            }
        }

        // --- 3D ISOMETRIC / 2D FRONT RENDER ENGINE ---
        function renderIsometric(geom) {
            const cont = document.getElementById('svg-preview-container');
            if (!cont || !geom || !geom.panels || geom.panels.length === 0) return;

            const scale = Math.min(2.5, 300 / geom.overallW); 
            let html = '';
            
            const pSize = geom.post * scale;
            const oaw = geom.overallW * scale;
            const thag = geom.above * scale;
            const under = geom.under * scale;
            
            // Adjust X/Y to center the structural group in the view wrapper
            const cx = -oaw/2;
            const cy = -pSize/2;
            
            // Materials 
            const isAlum = document.getElementById('postType').value === 'Aluminum';
            const postColor = isAlum ? '#cbd5e1' : '#94a3b8'; 
            const frameColor = '#64748b';
            const faceColor = '#3b82f6';
            
            // 1. GRADE LINE & UNDERGROUND DIRT
            // A 3D block representing the dirt underground (Opacity 0.15 for X-Ray effect)
            html += draw3DBox(cx - (oaw*0.5), cy - pSize, -under, oaw * 2, pSize * 3, under, '#22c55e', true, 0.15);
            // A solid green physical strip exactly at Z=0 to act as the undeniable grade line
            html += draw3DBox(cx - (oaw*0.5), cy - pSize/2, -1.5, oaw * 2, pSize * 2, 3, '#16a34a', false, 0.9);
            
            // Posts (Extending from -under up to thag)
            html += draw3DBox(cx, cy, -under, pSize, pSize, thag+under, postColor); // Left Post
            html += draw3DBox(cx + oaw - pSize, cy, -under, pSize, pSize, thag+under, postColor); // Right Post
            
            // Panels
            let currentZ = thag - (geom.topOffset * scale); // Top starts at thag - offset
            geom.panels.forEach((p, idx) => {
                let sGap = (parseFloat(p.gap) || 0) * scale;
                if (idx > 0) currentZ -= sGap;
                
                const isBetween = p.mountStyle === 'Between';
                const pw = isBetween ? oaw - (pSize*2) : oaw;
                const px = isBetween ? cx + pSize : cx;
                
                const ph = p.h * scale;
                currentZ -= ph; // Advance Z downwards to the bottom of the current panel
                const pz = currentZ; 
                
                const pd = geom.frameThick * scale;
                const frameY = cy + (pSize - pd) / 2; // Frame is centered between the front and back of the posts
                
                // Exploded View Y-Translation Variables (Depth)
                const faceD = 2; // 2px visual thickness
                const explodeY = isExploded ? 40 : 0;
                
                let frontFaceY, backFaceY;
                if (isBetween) {
                    frontFaceY = frameY + pd; 
                    backFaceY = frameY - faceD;
                } else {
                    // Flush mount goes on the outside of the posts
                    frontFaceY = cy + pSize; 
                    backFaceY = cy - faceD; 
                }

                // Frames
                let shareTop = (idx > 0 && sGap === 0);
                let crossbarW = isBetween ? pw : oaw - (pSize*2);
                let crossbarX = isBetween ? px : cx + pSize;

                if (!shareTop) html += draw3DBox(crossbarX, frameY, pz + ph - pd, crossbarW, pd, pd, frameColor); // Top Frame
                html += draw3DBox(crossbarX, frameY, pz, crossbarW, pd, pd, frameColor); // Bottom Frame
                
                if (isBetween) {
                    html += draw3DBox(px, frameY, pz + pd, pd, pd, ph - (pd*2), frameColor); // Left Vertical
                    html += draw3DBox(px + pw - pd, frameY, pz + pd, pd, pd, ph - (pd*2), frameColor); // Right Vertical
                }
                
                // Faces
                html += draw3DBox(px, frontFaceY + explodeY, pz, pw, faceD, ph, faceColor, false); // Front Face
                if (p.sides === 2) {
                    html += draw3DBox(px, backFaceY - explodeY, pz, pw, faceD, ph, faceColor, false); // Back Face
                }
            });
            
            cont.innerHTML = html;
        }

        // Helper: Generates a 6-sided 3D CSS Box using Absolute XYZ. Added customOpacity support.
        function draw3DBox(x, y, z, w, d, h, baseColor, isGhost = false, customOpacity = null) {
            const adjustColor = (hex, amt) => '#' + hex.replace(/^#/, '').replace(/../g, c => ('0'+Math.min(255, Math.max(0, parseInt(c, 16) + amt)).toString(16)).substr(-2));
            const cTop = baseColor;
            const cFront = adjustColor(baseColor, -25);
            const cSide = adjustColor(baseColor, -40);
            
            const op = customOpacity !== null ? customOpacity : (isGhost ? 0.8 : 1);
            const border = isGhost ? 'border: 1px solid rgba(255,255,255,0.4);' : '';
            
            return `
            <div style="position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${d}px; background:${cTop}; opacity:${op}; transform: translateZ(${z+h}px); ${border}"></div>
            <div style="position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${d}px; background:${cTop}; opacity:${op}; transform: translateZ(${z}px); ${border}"></div>
            <div style="position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; background:${cFront}; opacity:${op}; transform-origin: top left; transform: translateY(${d}px) translateZ(${z}px) rotateX(-90deg); ${border}"></div>
            <div style="position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; background:${cFront}; opacity:${op}; transform-origin: top left; transform: translateZ(${z}px) rotateX(-90deg); ${border}"></div>
            <div style="position:absolute; left:${x}px; top:${y}px; width:${d}px; height:${h}px; background:${cSide}; opacity:${op}; transform-origin: top left; transform: translateX(${w}px) translateZ(${z}px) rotateZ(90deg) rotateX(-90deg); ${border}"></div>
            <div style="position:absolute; left:${x}px; top:${y}px; width:${d}px; height:${h}px; background:${cSide}; opacity:${op}; transform-origin: top left; transform: translateZ(${z}px) rotateZ(90deg) rotateX(-90deg); ${border}"></div>
            `;
        }

        async function runCalc() {
            if(!backendData.Retail_Min_Order) return;
            enforcePhysics(); 

            const inputs = {
                qty: parseInt(document.getElementById('qty').value) || 1,
                systemWidth: parseFloat(document.getElementById('systemWidth').value) || 48,
                widthMode: document.getElementById('widthMode').value,
                thag: parseFloat(document.getElementById('thag').value) || 84,
                topOffset: parseFloat(document.getElementById('topOffset').value) || 0,
                belowGrade: parseFloat(document.getElementById('underground').value) || 36,
                postType: document.getElementById('postType').value,
                postSize: document.getElementById('postSize').value,
                frameMat: document.getElementById('frameMat').value,
                panels: panels,
                hasConcrete: true
            };

            try {
                const dataToUse = (typeof SignOS_Sandbox !== 'undefined' && SignOS_Sandbox.simData) ? SignOS_Sandbox.simData : backendData;
                const fnUrl = `${EDGE_URL}/functions/v1/calculate-post-panel`;
                const response = await fetch(fnUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                    body: JSON.stringify({ inputs: inputs, config: dataToUse })
                });

                if (!response.ok) throw new Error(`Server Error: ${response.status}`);
                const result = await response.json();
                if (!result || !result.retail) return;

                const ret = result.retail;
                const fmt = (n) => "$" + (n || 0).toFixed(2);

                document.getElementById('ui-unit').innerText = fmt(ret.unitPrice);
                document.getElementById('ui-total').innerText = fmt(ret.grandTotal);
                document.getElementById('ui-min-text').innerText = `Shop Minimum: $${parseFloat(dataToUse.Retail_Min_Order || 150)}`;
                document.getElementById('min-badge').classList.toggle('hidden', !ret.isMinApplied);

                const frameTxt = document.getElementById('frameMat').options[document.getElementById('frameMat').selectedIndex].text;
                
                let panelStr = panels.map((p, i) => `[P${i+1}] ${p.h}" ${p.mountStyle} - ${p.faceMat} (${p.sides} Sides)`).join('\n');
                
                document.getElementById('job-desc').value = `(x${inputs.qty}) ${result.geom.overallW}" O.A.W x ${result.geom.above}" THAG Post & Panel Assembly.\nStructure: 2x ${inputs.postType} ${inputs.postSize}" Posts. (${result.geom.clearance}" Ground Clearance)\nFrame: ${frameTxt}\n\nPanels:\n${panelStr}\n\nInternal Cut List Guidance:\n${result.geom.cutList.join('\n')}`;

                if(result.geom) renderIsometric(result.geom);

                if (typeof SignOS_Sandbox !== 'undefined' && SignOS_Sandbox.renderLedger) {
                    SignOS_Sandbox.renderLedger(result);
                }
            } catch(e) { console.error("Cloud Physics Error:", e); }
        }

        window.addEventListener('load', async () => {
            if (typeof injectHeader === 'function') injectHeader("Post & Panel Fabrication");
            
            // Force Camera3D to initialize so pan/zoom works on both Flat 2D and Isometric 3D views
            if (typeof SignOS_UI !== 'undefined' && SignOS_UI.Camera3D) {
                SignOS_UI.Camera3D.init('zoom-stage');
                SignOS_UI.Camera3D.toggle(true); // Toggle to ensure default rendering matches Front View layout logic
            }

            const btnSandbox = document.getElementById('btn-sandbox');
            if(btnSandbox && (sessionStorage.getItem('signos_role') === 'ADMIN' || sessionStorage.getItem('signos_role') === 'SUPER')) {
                btnSandbox.classList.remove('hidden');
            }

            renderPanels();

            try {
                const payload = await SignOS.fetchProductData('PROD_Post_Panel');
                backendData = payload.config || {};
                backendData.ui_schema = POSTPANEL_UI_SCHEMA; 
                
                if (typeof SignOS_Sandbox !== 'undefined') SignOS_Sandbox.init(backendData.ui_schema, backendData, runCalc);
                runCalc();
            } catch(e) { console.error("API Error:", e); }
        });
    </script>
