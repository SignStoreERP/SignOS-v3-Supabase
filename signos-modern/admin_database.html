<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Data Engine v2.0 | SignOS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>
        .custom-scroll { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f1f1; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .override-active { background-color: #fef08a !important; border-color: #eab308 !important; }
    </style>
</head>
<body class="bg-gray-100 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- GLOBAL HEADER -->
    <div class="bg-gray-900 text-white border-b border-gray-800 px-6 py-4 flex justify-between items-center shadow-lg z-30 shrink-0">
        <div>
            <h1 class="text-lg font-bold tracking-wide flex items-center gap-2">
                <span class="text-blue-400">🗄️</span> Master Data Engine <span class="text-gray-500 text-xs font-normal">v2.0</span>
            </h1>
            <div class="text-[10px] font-bold text-gray-400 mt-0.5 tracking-wider uppercase">
                Database Access & Routing Matrix
            </div>
        </div>
        <div class="flex items-center gap-4">
            <a href="menu.html" class="text-xs font-bold text-gray-300 border border-gray-600 px-3 py-1.5 rounded hover:bg-gray-800 transition active:scale-95 uppercase">
                Exit
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex flex-1 overflow-hidden">
        <!-- SIDEBAR -->
        <div class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-20">
            <div class="p-4 bg-slate-50 border-b border-gray-100">
                <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest">Database Tables</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-4 custom-scroll">
                
                <!-- ECONOMICS & LOGIC -->
                <div>
                    <span class="block px-3 py-1 text-[9px] font-black text-gray-400 uppercase tracking-widest">Economics & Logic</span>
                    <button onclick="loadTable('global_variables')" id="btn-tab-global_variables" class="w-full text-left px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 font-bold text-xs uppercase tracking-wide transition tab-btn">
                        Global Variables
                    </button>
                    <button class="w-full text-left px-3 py-2 rounded-lg text-gray-300 font-bold text-xs uppercase tracking-wide transition cursor-not-allowed" disabled>
                        Retail Curves (Algorithms)
                    </button>
                </div>

                <!-- SYSTEM INFRASTRUCTURE -->
                <div class="border-t border-gray-100 pt-2">
                    <span class="block px-3 py-1 text-[9px] font-black text-gray-400 uppercase tracking-widest">System Infrastructure</span>
                    <button onclick="loadTable('system_modules')" id="btn-tab-system_modules" class="w-full text-left px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 font-bold text-xs uppercase tracking-wide transition tab-btn">
                        System Modules (Menu)
                    </button>
                </div>

                <!-- WORKFORCE & OPERATIONS -->
                <div class="border-t border-gray-100 pt-2">
                    <span class="block px-3 py-1 text-[9px] font-black text-gray-400 uppercase tracking-widest">Operations</span>
                    <a href="admin_staff.html" class="block w-full text-left px-3 py-2 rounded-lg text-indigo-600 hover:bg-indigo-50 font-bold text-xs uppercase tracking-wide transition border border-transparent hover:border-indigo-200">
                        Workforce Manager ↗
                    </a>
                </div>

            </div>
        </div>

        <!-- TABLE DATA -->
        <div class="flex-1 flex flex-col bg-gray-50 relative">
            <div class="p-4 flex justify-between items-center bg-white border-b border-gray-200 shrink-0 shadow-sm z-10">
                <input type="text" id="search-filter" onkeyup="renderTable()" placeholder="Search records..." class="w-96 border border-gray-300 rounded-lg p-2 text-sm font-bold text-gray-700 outline-none focus:border-blue-500 shadow-inner">
                <div id="table-legend" class="text-[10px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                    <!-- Dynamic Legend -->
                </div>
            </div>

            <div class="flex-1 overflow-auto custom-scroll p-4">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead id="table-head" class="bg-slate-50 border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                            <!-- Injected by JS -->
                        </thead>
                        <tbody id="data-table" class="divide-y divide-gray-100 text-sm">
                            <tr><td colspan="6" class="p-8 text-center text-gray-400 font-bold animate-pulse text-xs uppercase tracking-widest">Select a table to begin...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- OVERRIDE MODAL (For Global Variables) -->
    <div id="override-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden border border-gray-200 flex flex-col">
            <div class="p-4 bg-orange-50 border-b border-orange-200 flex justify-between items-center">
                <h3 class="font-black text-orange-800 uppercase tracking-widest text-xs">Set Manual Override</h3>
                <button onclick="closeModal()" class="text-orange-400 hover:text-red-500 font-bold transition">✕</button>
            </div>
            <div class="p-6 space-y-4">
                <div class="bg-gray-50 p-3 rounded border border-gray-200">
                    <span class="block text-[9px] font-black text-gray-400 uppercase tracking-widest">Variable</span>
                    <span id="mod-id" class="text-sm font-black text-gray-800"></span>
                    <span id="mod-desc" class="block text-[10px] text-gray-500 mt-1 italic"></span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">System Actual</label>
                        <input type="text" id="mod-actual" readonly class="w-full border border-gray-200 p-2 rounded font-mono text-gray-500 bg-gray-50 cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-orange-600 uppercase tracking-widest mb-1">Override Value</label>
                        <input type="number" id="mod-override" step="0.01" class="w-full border border-orange-300 p-2 rounded font-black text-orange-900 bg-orange-50 outline-none focus:ring-2 focus:ring-orange-500 shadow-inner">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Audit Diagnostic Note (Optional)</label>
                    <textarea id="mod-reason" placeholder="e.g. Supplier raised price, hidden freight cost, etc." class="w-full border border-gray-300 p-2 rounded text-xs font-medium text-gray-700 outline-none focus:border-blue-500 h-20 shadow-inner"></textarea>
                </div>
            </div>
            <div class="p-4 bg-gray-50 border-t border-gray-200 flex gap-3">
                <button onclick="clearOverride()" class="px-4 py-2 bg-white border border-red-200 text-red-600 hover:bg-red-50 font-bold rounded text-xs uppercase tracking-wide transition shadow-sm">Clear Override</button>
                <button onclick="saveOverride()" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-black py-2 rounded text-xs uppercase tracking-widest transition shadow-md">Apply Override</button>
            </div>
        </div>
    </div>

    <script>
        let tableData = [];
        let activeTable = 'global_variables';
        let activeRowId = null;

        window.onload = async function() {
            const role = sessionStorage.getItem('signos_role');
            if (role !== 'ADMIN' && role !== 'SUPER') {
                alert("SECURITY VIOLATION: Master Data Engine is restricted to Administrators.");
                window.location.href = 'menu.html';
                return;
            }
            loadTable('system_modules'); // Default landing page
        };

        // --- DYNAMIC TABLE ROUTER ---
        async function loadTable(tableName) {
            activeTable = tableName;
            
            // UI Button Highlighting
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.className = "w-full text-left px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 font-bold text-xs uppercase tracking-wide transition tab-btn";
            });
            const activeBtn = document.getElementById('btn-tab-' + tableName);
            if(activeBtn) activeBtn.className = "w-full text-left px-3 py-2 rounded-lg bg-blue-50 text-blue-700 font-black text-xs border border-blue-200 shadow-sm uppercase tracking-wide transition tab-btn";

            document.getElementById('data-table').innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-400 font-bold animate-pulse text-xs uppercase tracking-widest">Fetching Data...</td></tr>`;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/${tableName}?select=*&order=id.asc`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                if(!res.ok) throw new Error("Database query blocked by RLS.");
                
                tableData = await res.json();
                
                // Special Sorting for System Modules
                if(tableName === 'system_modules') {
                    tableData.sort((a,b) => (a.category > b.category) ? 1 : ((b.category > a.category) ? -1 : 0));
                }
                
                renderTable();
            } catch(e) {
                document.getElementById('data-table').innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 font-bold text-xs uppercase tracking-widest">Error: ${e.message}</td></tr>`;
            }
        }

        // --- RENDER ENGINE ---
        function renderTable() {
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('data-table');
            const legend = document.getElementById('table-legend');
            const search = document.getElementById('search-filter').value.toLowerCase();
            let html = '';

            // VIEW: GLOBAL VARIABLES
            if (activeTable === 'global_variables') {
                legend.innerHTML = '<span class="w-3 h-3 bg-yellow-200 border border-yellow-400 inline-block rounded-sm"></span> = Manual Override Active';
                thead.innerHTML = `<tr>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest">Variable ID</th>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest">Category</th>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Unit</th>
                    <th class="p-3 text-[10px] font-black text-blue-600 uppercase tracking-widest text-right">System Actual</th>
                    <th class="p-3 text-[10px] font-black text-orange-600 uppercase tracking-widest text-right">Manual Override</th>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Action</th>
                </tr>`;

                tableData.forEach(row => {
                    if (search && !row.id.toLowerCase().includes(search) && !row.category.toLowerCase().includes(search)) return;
                    const hasOverride = row.override_value !== null && row.override_value !== undefined;
                    const rowClass = hasOverride ? 'override-active bg-yellow-50' : 'hover:bg-slate-50 transition';
                    const catColors = { 'Material': 'bg-purple-100 text-purple-700', 'Labor': 'bg-blue-100 text-blue-700', 'Overhead': 'bg-red-100 text-red-700', 'Markup': 'bg-green-100 text-green-700', 'Time': 'bg-indigo-100 text-indigo-700' };
                    const cBadge = catColors[row.category] || 'bg-gray-100 text-gray-700';

                    html += `
                    <tr class="${rowClass} border-b border-gray-100 group">
                        <td class="p-3">
                            <div class="font-black text-gray-800">${row.id}</div>
                            <div class="text-[9px] text-gray-500 mt-0.5 truncate max-w-[250px] italic">${row.notes || ''}</div>
                        </td>
                        <td class="p-3"><span class="text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded ${cBadge}">${row.category}</span></td>
                        <td class="p-3 text-center text-[10px] font-bold text-gray-400">${row.unit || ''}</td>
                        <td class="p-3 text-right font-mono font-bold text-blue-600">${row.default_value}</td>
                        <td class="p-3 text-right font-mono font-black ${hasOverride ? 'text-orange-600' : 'text-gray-300'}">${hasOverride ? row.override_value : '---'}</td>
                        <td class="p-3 text-center">
                            <button onclick="openModal('${row.id}')" class="bg-white border border-gray-300 hover:border-gray-500 text-gray-600 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition">Edit</button>
                        </td>
                    </tr>`;
                });
            } 
            
            // VIEW: SYSTEM MODULES (ROUTING / VERSIONS / DEPLOYMENT)
            else if (activeTable === 'system_modules') {
                legend.innerHTML = 'Note: SUPER role bypasses visibility matrices.';
                thead.innerHTML = `<tr>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest">Module Info</th>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Dev Status</th>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Versions (Live/Dev)</th>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Menu Visibility (S / P / A)</th>
                    <th class="p-3 text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Action</th>
                </tr>`;

                tableData.forEach(row => {
                    if (search && !row.id.toLowerCase().includes(search) && !row.display_name.toLowerCase().includes(search)) return;
                    html += `
                    <tr class="hover:bg-slate-50 transition border-b border-gray-100">
                        <td class="p-3">
                            <div class="font-black text-gray-800">${row.display_name}</div>
                            <div class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-0.5">${row.category} | ${row.id}</div>
                            <a href="${row.file_link}" target="_blank" class="text-[9px] text-blue-500 hover:underline mt-0.5 block">${row.file_link}</a>
                        </td>
                        <td class="p-3 text-center">
                            <select id="sm-status-${row.id}" class="text-[10px] font-black uppercase tracking-widest border border-gray-300 rounded p-1.5 outline-none focus:border-blue-500 bg-white" onchange="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')">
                                <option value="LIVE" ${row.dev_status==='LIVE'?'selected':''}>LIVE</option>
                                <option value="FIX PENDING" ${row.dev_status==='FIX PENDING'?'selected':''}>FIX PENDING</option>
                                <option value="DEV ONLY" ${row.dev_status==='DEV ONLY'?'selected':''}>DEV ONLY</option>
                                <option value="NOT APPROVED" ${row.dev_status==='NOT APPROVED'?'selected':''}>NOT APPROVED</option>
                            </select>
                        </td>
                        <td class="p-3 text-center">
                            <div class="flex flex-col gap-1.5 items-center">
                                <div class="flex items-center gap-1"><span class="text-[9px] font-bold text-gray-400 w-8 text-right">LIVE:</span><input type="text" id="sm-lv-${row.id}" value="${row.live_ver || ''}" class="w-14 text-[10px] border rounded p-1 text-center font-mono outline-none focus:border-blue-500" oninput="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')"></div>
                                <div class="flex items-center gap-1"><span class="text-[9px] font-bold text-gray-400 w-8 text-right">DEV:</span><input type="text" id="sm-dv-${row.id}" value="${row.dev_ver || ''}" class="w-14 text-[10px] border rounded p-1 text-center font-mono outline-none focus:border-blue-500" oninput="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')"></div>
                            </div>
                        </td>
                        <td class="p-3">
                            <div class="flex flex-col gap-2 items-center text-[10px] font-black text-gray-600 bg-white p-2 rounded border border-gray-200 shadow-inner">
                                <div class="flex items-center gap-3 border-b border-gray-100 pb-1">
                                    <span class="w-10 text-right text-gray-400">LIVE:</span>
                                    <label class="cursor-pointer hover:text-blue-500"><input type="checkbox" id="sm-ls-${row.id}" ${row.live_sales?'checked':''} onchange="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')" class="mr-0.5"> S</label>
                                    <label class="cursor-pointer hover:text-green-500"><input type="checkbox" id="sm-lp-${row.id}" ${row.live_prod?'checked':''} onchange="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')" class="mr-0.5"> P</label>
                                    <label class="cursor-pointer hover:text-red-500"><input type="checkbox" id="sm-la-${row.id}" ${row.live_admin?'checked':''} onchange="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')" class="mr-0.5"> A</label>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="w-10 text-right text-gray-400">DEV:</span>
                                    <label class="cursor-pointer hover:text-blue-500"><input type="checkbox" id="sm-ds-${row.id}" ${row.dev_sales?'checked':''} onchange="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')" class="mr-0.5"> S</label>
                                    <label class="cursor-pointer hover:text-green-500"><input type="checkbox" id="sm-dp-${row.id}" ${row.dev_prod?'checked':''} onchange="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')" class="mr-0.5"> P</label>
                                    <label class="cursor-pointer hover:text-red-500"><input type="checkbox" id="sm-da-${row.id}" ${row.dev_admin?'checked':''} onchange="document.getElementById('btn-sm-${row.id}').classList.remove('hidden')" class="mr-0.5"> A</label>
                                </div>
                            </div>
                        </td>
                        <td class="p-3 text-center">
                            <button id="btn-sm-${row.id}" onclick="saveSystemModule('${row.id}')" class="hidden w-full bg-blue-600 hover:bg-blue-700 text-white px-3 py-3 rounded shadow-md text-[10px] font-black uppercase tracking-widest transition">
                                Update
                            </button>
                        </td>
                    </tr>`;
                });
            }

            tbody.innerHTML = html;
        }

        // --- SAVING LOGIC (System Modules) ---
        async function saveSystemModule(id) {
            const btn = document.getElementById(`btn-sm-${id}`);
            btn.innerText = "SAVING..."; btn.disabled = true;
            
            const payload = {
                dev_status: document.getElementById(`sm-status-${id}`).value,
                live_ver: document.getElementById(`sm-lv-${id}`).value,
                dev_ver: document.getElementById(`sm-dv-${id}`).value,
                live_sales: document.getElementById(`sm-ls-${id}`).checked,
                live_prod: document.getElementById(`sm-lp-${id}`).checked,
                live_admin: document.getElementById(`sm-la-${id}`).checked,
                dev_sales: document.getElementById(`sm-ds-${id}`).checked,
                dev_prod: document.getElementById(`sm-dp-${id}`).checked,
                dev_admin: document.getElementById(`sm-da-${id}`).checked
            };

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/system_modules?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error("Failed to write to database.");

                // Forensic Telemetry Log
                await fetch(`${SUPABASE_URL}/rest/v1/access_logs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                    body: JSON.stringify({
                        target: id, action: 'MODULE_UPDATED', role: sessionStorage.getItem('signos_role') || 'ADMIN',
                        meta_data: { user: sessionStorage.getItem('signos_user') || 'Admin', updates: payload }
                    })
                });

                btn.innerText = "SAVED";
                btn.classList.replace('bg-blue-600', 'bg-green-500');
                setTimeout(() => {
                    btn.classList.add('hidden');
                    btn.classList.replace('bg-green-500', 'bg-blue-600');
                    btn.innerText = "UPDATE";
                    btn.disabled = false;
                }, 1500);

            } catch (e) {
                alert(e.message);
                btn.innerText = "ERROR";
                btn.classList.replace('bg-blue-600', 'bg-red-500');
            }
        }

        // --- SAVING LOGIC (Global Variables) ---
        function openModal(id) {
            activeRowId = id;
            const row = tableData.find(r => r.id === id);
            document.getElementById('mod-id').innerText = row.id;
            document.getElementById('mod-desc').innerText = row.notes;
            document.getElementById('mod-actual').value = row.default_value;
            document.getElementById('mod-override').value = row.override_value !== null ? row.override_value : '';
            document.getElementById('mod-reason').value = '';
            document.getElementById('override-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('override-modal').classList.add('hidden'); }

        async function saveOverride() {
            const val = document.getElementById('mod-override').value;
            const reason = document.getElementById('mod-reason').value.trim();
            const user = sessionStorage.getItem('signos_user') || 'Admin';
            const numVal = val === '' ? null : parseFloat(val);

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/global_variables?id=eq.${activeRowId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                    body: JSON.stringify({ override_value: numVal })
                });

                if (!res.ok) throw new Error("Failed to write to database.");

                const logPayload = {
                    target: activeRowId, action: numVal === null ? 'CLEARED_OVERRIDE' : 'MANUAL_OVERRIDE', role: sessionStorage.getItem('signos_role') || 'ADMIN',
                    meta_data: { new_value: numVal, old_actual: document.getElementById('mod-actual').value, reason: reason || "No note provided", user: user }
                };

                await fetch(`${SUPABASE_URL}/rest/v1/access_logs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                    body: JSON.stringify(logPayload)
                });

                closeModal();
                loadTable('global_variables');
            } catch (e) { alert(e.message); }
        }

        function clearOverride() {
            document.getElementById('mod-override').value = '';
            document.getElementById('mod-reason').value = ''; 
            saveOverride();
        }
    </script>
</body>
</html>
