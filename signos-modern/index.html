<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignOS Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (sessionStorage.getItem("signos_user")) {
            const role = sessionStorage.getItem("signos_role");
            let mode = (role === 'PROD') ? 'production' : (role === 'ADMIN' || role === 'SUPER' ? 'admin' : 'sales');
            window.location.href = `menu.html?mode=${mode}`;
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-sm w-full bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200" id="login-card">
        <div class="bg-gray-900 px-6 py-8 text-center flex flex-col items-center">
            <!-- REPLACE THE SRC ATTRIBUTE WITH YOUR ACTUAL LOGO URL -->
            <img src="https://signos.zublinsystems.com/sign_store_logo_cloudflare_v01.svg" alt="The Sign Store" class="h-10 mb-4 object-contain">
            <h1 class="text-2xl font-black text-white tracking-tight leading-none">SignOS ERP <span class="text-blue-500 text-sm">v4.0</span></h1>
            <div class="text-[9px] font-bold text-gray-400 mt-2 tracking-widest uppercase">Secure Access Gateway</div>
        </div>

        <form id="login-form" class="p-6 space-y-5 relative">
            <div id="reset-success" class="hidden absolute top-0 left-0 right-0 bg-green-100 text-green-800 text-[10px] font-black p-2 text-center uppercase tracking-widest border-b border-green-200">Reset Link Sent to Email</div>
            
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Company Email</label>
                <input type="email" id="email" required class="w-full border border-gray-300 p-3 rounded-lg text-sm font-bold text-gray-800 outline-none focus:border-blue-500 shadow-inner bg-gray-50" placeholder="user@signstoremacon.com">
            </div>
            
            <div>
                <div class="flex justify-between items-end mb-1">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase">Secure Password</label>
                    <button type="button" onclick="triggerPasswordReset()" class="text-[10px] font-bold text-blue-600 hover:text-blue-800 transition">Forgot Password?</button>
                </div>
                <input type="password" id="password" required class="w-full border border-gray-300 p-3 rounded-lg text-sm font-bold text-center tracking-widest text-gray-800 focus:border-blue-500 shadow-inner bg-gray-50">
            </div>

            <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-lg shadow-md transition uppercase tracking-widest text-xs flex justify-center items-center gap-2">
                Authenticate
            </button>

            <div id="status-msg" class="mt-4 text-center text-[10px] font-bold text-gray-400 h-4 uppercase tracking-wide">AWAITING CREDENTIALS</div>
        </form>
    </div>

    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- PASSWORD RESET LOGIC ---
        async function triggerPasswordReset() {
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('status-msg');
            if (!email) {
                msg.innerText = "ENTER EMAIL ABOVE FIRST";
                msg.className = "mt-4 text-center text-[10px] font-bold text-red-500 h-4 uppercase tracking-wide";
                return;
            }
            msg.innerText = "SENDING RESET LINK...";
            msg.className = "mt-4 text-center text-[10px] font-bold text-blue-500 h-4 uppercase tracking-wide";
            
            const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://signos-v3-supabase.vercel.app/index.html',
            });

            if (error) {
                msg.innerText = error.message.toUpperCase();
                msg.className = "mt-4 text-center text-[10px] font-bold text-red-500 h-4 uppercase tracking-wide";
            } else {
                document.getElementById('reset-success').classList.remove('hidden');
                msg.innerText = "AWAITING CREDENTIALS";
                msg.className = "mt-4 text-center text-[10px] font-bold text-gray-400 h-4 uppercase tracking-wide";
            }
        }

        // --- LOGIN LOGIC ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('status-msg');
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = `<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> DECRYPTING...`;
            msg.innerText = "ESTABLISHING SECURE CONNECTION";
            msg.className = "mt-4 text-center text-[10px] font-bold text-blue-500 h-4 uppercase tracking-wide animate-pulse";

            // 1. Authenticate via Supabase Auth
            const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email: email, password: pass });

            if (authError || !authData.user) {
                msg.innerText = "ACCESS DENIED: INVALID CREDENTIALS";
                msg.className = "mt-4 text-center text-[10px] font-bold text-red-500 h-4 uppercase tracking-wide";
                btn.innerHTML = "AUTHENTICATE";
                btn.disabled = false;
                return;
            }

            // 2. Fetch specific role, ID, and department from staff table
            const { data: staffData, error: staffError } = await supabaseClient
                .from('staff')
                .select('id, first_name, role, department_id')
                .eq('id', authData.user.id)
                .single();

            if (staffError || !staffData) {
                msg.innerText = "ACCOUNT NOT MAPPED";
                msg.className = "mt-4 text-center text-[10px] font-bold text-red-500 h-4 uppercase tracking-wide";
                btn.innerHTML = "AUTHENTICATE";
                btn.disabled = false;
                return;
            }

            // 3. Set Session Storage and Forward
            msg.innerText = `WELCOME, ${staffData.first_name.toUpperCase()}`;
            msg.className = "mt-4 text-center text-[10px] font-bold text-green-600 h-4 uppercase tracking-wide";
            
            sessionStorage.setItem("signos_user", staffData.first_name);
            sessionStorage.setItem("signos_user_id", staffData.id);
            sessionStorage.setItem("signos_dept", staffData.department_id);
            sessionStorage.setItem("signos_role", staffData.role);

            setTimeout(() => {
                let mode = (staffData.role === 'PROD') ? 'production' : (staffData.role === 'ADMIN' || staffData.role === 'SUPER' ? 'admin' : 'sales');
                window.location.href = `menu.html?mode=${mode}`;
            }, 800);
        });
    </script>
</body>
</html>
