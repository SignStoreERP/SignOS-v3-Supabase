<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignOS Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (sessionStorage.getItem("signos_user")) {
            window.location.href = "menu.html";
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">

    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-200">
        
        <div class="bg-gray-900 text-white p-6 text-center border-b border-gray-800">
            <div class="w-16 h-16 mx-auto bg-blue-600 rounded-full flex items-center justify-center font-black text-2xl shadow-inner border-2 border-blue-400 mb-3">OS</div>
            <h1 class="text-2xl font-black tracking-tight">SignOS v4.0</h1>
            <div class="text-[10px] font-bold text-gray-400 mt-1 tracking-widest uppercase">Secure Access Gateway</div>
        </div>

        <form id="login-form" class="p-6 space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Email / Access ID</label>
                <input type="email" id="email" required class="w-full border border-gray-300 p-3 rounded-lg text-sm font-bold text-gray-800 outline-none focus:border-blue-500 shadow-inner bg-gray-50" placeholder="user@signstoremacon.com">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Password</label>
                <input type="password" id="password" required class="w-full border border-gray-300 p-3 rounded-lg text-sm font-bold text-gray-800 outline-none focus:border-blue-500 shadow-inner bg-gray-50" placeholder="••••••••">
            </div>

            <button type="submit" id="btn-go" class="w-full h-12 mt-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-bold text-white shadow-md transition uppercase tracking-widest">
                Authorize
            </button>

            <div id="status-msg" class="mt-4 text-center text-[10px] font-bold text-gray-400 h-4 uppercase tracking-wide">AWAITING CREDENTIALS</div>
        </form>
    </div>

<script>
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-go');
    const msg = document.getElementById('status-msg');

    btn.disabled = true;
    msg.innerText = "AUTHENTICATING...";
    msg.className = "mt-4 text-center text-[10px] font-bold text-blue-500 h-4 uppercase tracking-wide animate-pulse";

    // 1. Authenticate with Supabase Auth
    const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
    });

    if (authError || !authData.user) {
        msg.innerText = "ACCESS DENIED";
        msg.className = "mt-4 text-center text-[10px] font-bold text-red-500 h-4 uppercase tracking-wide";
        btn.disabled = false;
        return;
    }

    // 2. Fetch specific role, ID, last name, and department
    const { data: staffData, error: staffError } = await supabaseClient
        .from('staff')
        .select('id, first_name, last_name, role, department_id')
        .eq('id', authData.user.id)
        .single();

    if (staffError || !staffData) {
        msg.innerText = "ACCOUNT NOT MAPPED";
        msg.className = "mt-4 text-center text-[10px] font-bold text-red-500 h-4 uppercase tracking-wide";
        btn.disabled = false;
        return;
    }

    // 3. Set Session Storage and Forward
    msg.innerText = `WELCOME, ${staffData.first_name.toUpperCase()}`;
    msg.className = "mt-4 text-center text-[10px] font-bold text-green-600 h-4 uppercase tracking-wide";

    sessionStorage.setItem("signos_user", staffData.first_name);
    sessionStorage.setItem("signos_user_last", staffData.last_name || ""); 
    sessionStorage.setItem("signos_user_id", staffData.id);
    sessionStorage.setItem("signos_dept", staffData.department_id || "UNASSIGNED");
    sessionStorage.setItem("signos_role", staffData.role);
    sessionStorage.setItem("supabase.auth.token", authData.session.access_token);

    setTimeout(() => { window.location.href = "menu.html"; }, 800);
});
</script>
</body>
</html>
