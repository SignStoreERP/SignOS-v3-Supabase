<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post & Panel v2.0 (Logic Only)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<div class="max-w-2xl mx-auto mt-6 w-[calc(100%-2rem)] sm:w-full">

    <!-- HEADER -->
    <div class="bg-slate-900 rounded-t-xl px-6 py-4 flex justify-between items-center shadow-md border border-slate-800">
        <div>
            <h1 class="text-lg font-black text-white uppercase tracking-widest flex items-center gap-2">
                <span class="text-blue-500">🏗️</span> Post & Panel <span class="text-xs text-slate-500">v2.0</span>
            </h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5">Heavy Fabrication Math Engine</p>
        </div>
        <!-- Admin Cost Toggle -->
        <label class="flex items-center gap-2 cursor-pointer bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
            <span class="text-[10px] font-bold text-slate-300 uppercase">Admin Cost View</span>
            <div class="relative">
                <input type="checkbox" id="toggle-cost-view" class="sr-only" onchange="handleAdminToggle()">
                <div class="block bg-gray-300 w-8 h-5 rounded-full transition-colors" id="toggle-bg"></div>
                <div class="dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-transform" id="toggle-dot"></div>
            </div>
        </label>
    </div>

    <!-- MAIN ISLAND CARD -->
    <div id="main-card" class="bg-white shadow-xl rounded-b-xl border-x border-b border-gray-200">
        
        <div class="p-6 space-y-6">
            
            <!-- SECTION 1: THE PANELS (Moved to Top) -->
            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                <div class="flex justify-between items-center mb-3 border-b border-slate-200 pb-2">
                    <h3 class="text-[10px] font-black text-gray-700 uppercase tracking-widest">1. Primary Face Panel</h3>
                </div>
                
                <div class="grid grid-cols-4 gap-3">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Face Material</label>
                        <select id="faceMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white shadow-sm focus:border-blue-500" onchange="runCalc()">
                            <option value="063 Alum">.063 Aluminum</option>
                            <option value="080 Alum">.080 Aluminum</option>
                            <option value="3mm ACM">3mm ACM</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Width</label>
                        <input type="number" id="panelW" value="36" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-center outline-none shadow-inner bg-white focus:border-blue-500" oninput="runCalc()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Height</label>
                        <input type="number" id="panelH" value="24" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-center outline-none shadow-inner bg-white focus:border-blue-500" oninput="runCalc()">
                    </div>
                </div>
            </div>

            <!-- SECTION 2: GLOBAL SPECS -->
            <div>
                <h3 class="text-[10px] font-black text-blue-800 uppercase tracking-widest border-b border-blue-100 pb-1 mb-3">2. Global Specifications</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Total Qty</label>
                        <input type="number" id="qty" value="1" class="w-full border border-gray-300 p-2 rounded text-lg font-black text-center bg-gray-50 focus:border-blue-500 outline-none shadow-inner" oninput="runCalc()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Height Above Grade</label>
                        <div class="flex items-center bg-white border border-gray-300 rounded shadow-inner focus-within:border-blue-500">
                            <input type="number" id="thag" value="60" class="w-full p-2 text-sm font-bold text-center outline-none bg-transparent" oninput="runCalc()">
                            <span class="text-xs font-bold text-gray-400 pr-3">inches</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Ground Clearance</label>
                        <div class="flex items-center bg-white border border-gray-300 rounded shadow-inner focus-within:border-blue-500">
                            <input type="number" id="clearance" value="36" class="w-full p-2 text-sm font-bold text-center outline-none bg-transparent" oninput="runCalc()">
                            <span class="text-xs font-bold text-gray-400 pr-3">inches</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION 3: THE POSTS & FRAME -->
            <div>
                <h3 class="text-[10px] font-black text-blue-800 uppercase tracking-widest border-b border-blue-100 pb-1 mb-3">3. Structural Skeleton</h3>
                <div class="grid grid-cols-2 gap-4 mb-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Post Material & Size</label>
                        <select id="postParams" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white shadow-sm focus:border-blue-500" onchange="runCalc()">
                            <option value="Aluminum|2">2" Aluminum Square Tube</option>
                            <option value="Aluminum|3">3" Aluminum Square Tube</option>
                            <option value="Aluminum|4">4" Aluminum Square Tube</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Internal Frame Material</label>
                        <select id="frameMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white shadow-sm focus:border-blue-500" onchange="runCalc()">
                            <option value="AlumTube_1.5_1/8">1.5" Aluminum Square Tube</option>
                            <option value="AlumTube_2_1/8">2" Aluminum Square Tube</option>
                            <option value="SteelAngle_2_1/8">2" Steel Angle Iron</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Mounting Style</label>
                        <select id="mountStyle" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white shadow-sm focus:border-blue-500" onchange="runCalc()">
                            <option value="Flush">Flush Mount (Face covers posts)</option>
                            <option value="Between">Between Posts</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Foundation (Below Grade)</label>
                        <select id="underground" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white shadow-sm focus:border-blue-500" onchange="runCalc()">
                            <option value="36">36" Direct Burial w/ Concrete</option>
                            <option value="48">48" Direct Burial w/ Concrete</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- ADMIN HARD COST LEDGER (Hidden by Default) -->
        <div id="admin-ledger-box" class="hidden bg-slate-50 p-6 border-t border-gray-200 shadow-inner relative">
            <div class="absolute top-0 right-6 w-16 h-1 bg-red-500 rounded-b-md"></div>
            <h3 class="text-xs font-black text-gray-800 uppercase tracking-widest mb-4 flex justify-between items-center">
                Internal Cost Audit
                <span id="ui-metrics-margin" class="text-sm text-green-600 font-mono tracking-tight">--% Margin</span>
            </h3>
            <div id="ui-cost-groups" class="space-y-3"></div>
            <div class="flex justify-between items-center border-t-2 border-gray-300 mt-4 pt-3">
                <span class="text-[10px] font-black text-gray-600 uppercase tracking-widest">Total Hard Cost</span>
                <span id="ui-cost-total" class="text-lg font-black text-red-600 font-mono tracking-tight">---</span>
            </div>
        </div>

        <!-- RETAIL LEDGER & BIDIRECTIONAL MARGIN -->
        <div class="bg-blue-50 p-6 border-t border-blue-200 shadow-inner rounded-b-xl">
            <div class="flex justify-between items-end border-b border-blue-200 pb-3 mb-4">
                <div class="flex flex-col gap-1">
                    <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Target Profit Margin</span>
                    <div class="flex items-center bg-white border border-blue-300 rounded shadow-inner w-24 overflow-hidden">
                        <input type="number" id="targetMargin" value="60.0" class="w-full p-1.5 text-sm font-black text-blue-900 text-right outline-none bg-transparent" oninput="runCalc()">
                        <span class="text-xs font-bold text-blue-500 pr-2">%</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest block mb-1">Unit Retail Price</span>
                    <span id="ui-unit" class="text-3xl font-black text-blue-900 tracking-tight leading-none">---</span>
                </div>
            </div>
            
            <div class="flex justify-between items-end">
                <div>
                    <span class="text-xs font-bold text-blue-800 uppercase block">Grand Total</span>
                </div>
                <span id="ui-total" class="text-4xl font-black text-blue-700 tracking-tight leading-none">---</span>
            </div>
        </div>

    </div>
</div>

<script>
    let adminCostEnabled = false;
    let backendData = null; // Will store global_variables fetched via SignOS core
    let calcTimeout = null;

    // 1. Handle Admin Toggle Animation & State
    function handleAdminToggle() {
        const cb = document.getElementById('toggle-cost-view');
        const bg = document.getElementById('toggle-bg');
        const dot = document.getElementById('toggle-dot');
        const ledger = document.getElementById('admin-ledger-box');

        adminCostEnabled = cb.checked;

        if (adminCostEnabled) {
            bg.classList.replace('bg-gray-300', 'bg-red-500');
            dot.style.transform = 'translateX(12px)';
            ledger.classList.remove('hidden');
        } else {
            bg.classList.replace('bg-red-500', 'bg-gray-300');
            dot.style.transform = 'translateX(0)';
            ledger.classList.add('hidden');
        }
        
        runCalc(); // Re-run to ensure cost payload is fetched if activated
    }

    // 2. Render the Hard Cost Ledger
    function renderAdminCostLedger(costData, metricsData) {
        const fmt = (n) => "$" + (n || 0).toFixed(2);
        document.getElementById('ui-cost-total').innerText = fmt(costData.total);
        document.getElementById('ui-metrics-margin').innerText = `${(metricsData.margin * 100).toFixed(1)}% Margin`;

        let html = '';
        costData.breakdown.forEach(i => {
            const cleanFormula = (i.formula || '').replace(/<[^>]*>?/gm, '');
            html += `
            <div class="bg-white p-2 rounded border border-gray-200 shadow-sm">
                <div class="flex justify-between text-xs text-red-800 font-bold mb-1">
                    <span>${i.label}</span><span class="font-mono">${fmt(i.total)}</span>
                </div>
                <div class="text-[9px] text-gray-500 font-mono italic leading-snug break-words">
                    ↳ Math: ${cleanFormula}
                </div>
            </div>`;
        });
        document.getElementById('ui-cost-groups').innerHTML = html;
    }

    // 3. Execution & Edge Function Bridge
    async function runCalc() {
        if(!backendData) return;
        clearTimeout(calcTimeout);

        calcTimeout = setTimeout(async () => {
            document.getElementById('ui-total').classList.add('opacity-50');
            document.getElementById('ui-unit').classList.add('opacity-50');

            try {
                const postSplit = document.getElementById('postParams').value.split('|');
                const targetMargin = parseFloat(document.getElementById('targetMargin').value) / 100;
                
                // Inject margin override into the config payload for the backend
                let dynamicConfig = { ...backendData, Target_Margin_Pct: targetMargin };

                const inputs = {
                    qty: parseFloat(document.getElementById('qty').value) || 1,
                    thag: parseFloat(document.getElementById('thag').value) || 60,
                    clearance: parseFloat(document.getElementById('clearance').value) || 36,
                    belowGrade: parseFloat(document.getElementById('underground').value) || 36,
                    postType: postSplit,
                    postSize: postSplit[2],
                    frameMat: document.getElementById('frameMat').value,
                    postSpacing: parseFloat(document.getElementById('panelW').value) || 36, // Driven by Panel
                    panels: [{
                        id: 1, 
                        w: parseFloat(document.getElementById('panelW').value) || 36, 
                        h: parseFloat(document.getElementById('panelH').value) || 24, 
                        mountStyle: document.getElementById('mountStyle').value, 
                        faceMat: document.getElementById('faceMat').value, 
                        sides: 2, 
                        gap: 0 
                    }]
                };

                const auditMode = adminCostEnabled ? 'full' : 'retail_only';

                const response = await fetch(`${EDGE_URL}/functions/v1/calculate-post-panel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                    body: JSON.stringify({ inputs: inputs, config: dynamicConfig, audit_mode: auditMode })
                });

                if (!response.ok) throw new Error("Calculation failed");
                
                const result = await response.json();
                
                if (result.retail) {
                    const fmt = (n) => "$" + (n || 0).toFixed(2);
                    document.getElementById('ui-unit').innerText = fmt(result.retail.unitPrice);
                    document.getElementById('ui-total').innerText = fmt(result.retail.grandTotal);
                }

                if (adminCostEnabled && result.cost) {
                    renderAdminCostLedger(result.cost, result.metrics);
                }

            } catch(e) {
                console.error("Math Engine Error:", e);
                document.getElementById('ui-total').innerText = "ERR";
            } finally {
                document.getElementById('ui-total').classList.remove('opacity-50');
                document.getElementById('ui-unit').classList.remove('opacity-50');
            }
        }, 250);
    }

    // 4. Initialize Data on Load
    window.addEventListener('load', async () => {
        try {
            // Check roles to display Admin toggle if allowed
            const role = sessionStorage.getItem('signos_role');
            if (role === 'ADMIN' || role === 'SUPER') {
                // Feature currently visible to all via hardcoded HTML, but logic ensures security via edge function
            }

            // Fetch live variables from the database via core SDK
            const payload = await SignOS.fetchProductData('PROD_Post_Panel');
            backendData = payload.config;
            runCalc(); // Run initial calculation
        } catch(e) {
            console.error("Initialization Failed:", e);
        }
    });
</script>

</body>
</html>
