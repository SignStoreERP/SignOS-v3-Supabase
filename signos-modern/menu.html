<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SignOS Menu v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col pb-10">

    <!-- FLOATING ISLAND HEADER -->
    <div class="w-[calc(100%-2rem)] max-w-5xl mx-auto mt-4 mb-6 rounded-2xl overflow-hidden shadow-2xl shrink-0 z-50 flex flex-col border border-gray-800 sticky top-4 transition-all">
        <!-- TOP UTILITY BAR (Injected via JS below to match Avatar system) -->
        <div id="menu-header-container"></div>

        <!-- MAIN NAV BAR (Matches Calculators) -->
        <div class="bg-gray-900 px-6 py-4 text-white flex justify-between items-center relative">
            <div class="flex items-center gap-3 relative z-10">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-black shadow-inner border border-blue-400">OS</div>
                <div class="flex flex-col text-left">
                    <h2 class="text-lg font-bold leading-tight">The Sign Store</h2>
                    <div class="flex items-center gap-2 text-[10px] mt-0.5">
                        <span class="font-bold text-gray-400 tracking-widest uppercase">System Hub v6.0</span>
                    </div>
                </div>
            </div>
            
            <div id="env-badge" class="text-[10px] font-bold py-1 px-3 rounded tracking-widest flex items-center gap-2 shadow-inner bg-slate-800 text-slate-400 border border-slate-700 relative z-10">
                <!-- Injected via JS -->
                SCANNING ENV...
            </div>
        </div>
    </div>

    <div id="menu-container" class="w-full max-w-4xl mx-auto p-4 flex flex-col gap-6 mt-4">
        <!-- Rendered via JS -->
        <div class="text-center p-10 text-gray-400 animate-pulse text-xs font-bold tracking-widest uppercase">FETCHING ACTIVE MODULES...</div>
    </div>

    <div id="admin-workflow" class="hidden w-full max-w-4xl mx-auto px-4 mt-2">
        <div class="border-t-2 border-gray-200 pt-6">
            <div class="flex items-center gap-2 mb-4">
                <h2 class="text-xs font-black text-gray-800 uppercase tracking-widest">Admin Hub</h2>
                <div class="h-px bg-gray-200 flex-1"></div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                <a href="admin_system.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-blue-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">👁️‍🗨️</span>
                    <span class="text-xs font-bold text-gray-700">Command Center</span>
                </a>
                <a href="admin_roadmap.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-orange-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🗺️</span>
                    <span class="text-xs font-bold text-gray-700">Dev Roadmap</span>
                </a>
                <a href="admin_database.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-blue-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🗄️</span>
                    <span class="text-xs font-bold text-gray-700">Data Engine</span>
                </a>
                <a href="admin_product_forge.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-orange-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">⚒️</span>
                    <span class="text-xs font-bold text-gray-700">Product Forge</span>
                </a>
                <a href="admin_staff.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-emerald-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">👥</span>
                    <span class="text-xs font-bold text-gray-700">Workforce</span>
                </a>
                <a href="admin_simulator.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-blue-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🤖</span>
                    <span class="text-xs font-bold text-gray-700">Simulator</span>
                </a>
                <a href="admin_security_matrix.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-red-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🛡️</span>
                    <span class="text-xs font-bold text-gray-700">RLS Auditor</span>
                </a>
                <a href="admin_audit.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-emerald-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">⚖️</span>
                    <span class="text-xs font-bold text-gray-700">Price Auditor</span>
                </a>
                <a href="admin_viewer.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-purple-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">📝</span>
                    <span class="text-xs font-bold text-gray-700">Log Viewer</span>
                </a>
                <a id="btn-backup" href="admin_backup.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-green-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">💾</span>
                    <span class="text-xs font-bold text-gray-700">Backup Tool</span>
                </a>
            </div>
        </div>
    </div>

<script>
// 1. SAFETY VALVE
function val(obj, key) {
    if (!obj) return "";
    return obj[key] || obj[key.toUpperCase()] || obj[key.toLowerCase()] || "";
}

// 2. STYLE MAP
const ICON_STYLES = {
    blue: "bg-blue-50 text-blue-600",
    green: "bg-green-50 text-green-600",
    purple: "bg-purple-50 text-purple-600",
    red: "bg-red-50 text-red-600",
    orange: "bg-orange-50 text-orange-600",
    slate: "bg-slate-50 text-slate-600",
    teal: "bg-teal-50 text-teal-600",
    indigo: "bg-indigo-50 text-indigo-600",
    pink: "bg-pink-50 text-pink-600",
    yellow: "bg-yellow-50 text-yellow-600",
    gray: "bg-gray-100 text-gray-600"
};

// 3. RENDER LOGIC WITH SUB-CATEGORIES
function renderMenu(data, role) {
    const container = document.getElementById('menu-container');
    container.innerHTML = "";

    const sections = {
        "Sales Hub": [],
        "Production Hub": [],
        "Administration Hub": [],
        "Overwatch (Super)": []
    };

    data.forEach(mod => {
        const tags = val(mod, 'Access_Tags') || [];
        const devStatus = val(mod, 'Dev_Status');
        let isAllowed = false;

        const userId = sessionStorage.getItem('signos_user_id');
        const deptId = sessionStorage.getItem('signos_dept');

        if (role === 'SUPER') {
            isAllowed = true;
        } else if (devStatus === 'LIVE') {
            if (tags.includes(role) || tags.includes(deptId) || tags.includes(userId)) {
                isAllowed = true;
            }
        }

        if (!isAllowed) return;

        if (tags.includes('SALES')) sections["Sales Hub"].push(mod);
        else if (tags.includes('PROD')) sections["Production Hub"].push(mod);
        else if (tags.includes('ADMIN')) sections["Administration Hub"].push(mod);
        else sections["Overwatch (Super)"].push(mod);
    });

    for (const [secName, mods] of Object.entries(sections)) {
        if (mods.length === 0) continue;

        const section = document.createElement('div');
        section.className = "mb-6";
        section.innerHTML = `
            <div class="flex items-center gap-2 mb-2">
                <h2 class="text-[11px] font-black text-blue-800 uppercase tracking-widest">${secName}</h2>
                <div class="h-px bg-blue-200 flex-1"></div>
            </div>
        `;

        const groupedMods = {};
        mods.forEach(mod => {
            const cat = val(mod, 'Category') || 'General';
            if (!groupedMods[cat]) groupedMods[cat] = [];
            groupedMods[cat].push(mod);
        });

        const sortedCats = Object.keys(groupedMods).sort();

        sortedCats.forEach(catName => {
            groupedMods[catName].sort((a, b) => {
                const nameA = val(a, 'Display_Name') || '';
                const nameB = val(b, 'Display_Name') || '';
                return nameA.localeCompare(nameB);
            });

            const subSection = document.createElement('div');
            subSection.innerHTML = `<h3 class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-4 mb-2 pl-1">${catName}</h3>`;
            
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3";

            groupedMods[catName].forEach(mod => {
                const devStatus = val(mod, 'Dev_Status');
                const activeCommit = val(mod, 'Active_Commit');
                let verText = activeCommit ? '#' + activeCommit.substring(0,7) : "Auto-Sync";
                let verClass = devStatus === 'LIVE' ? "bg-green-100 text-green-800 border-green-200" : "bg-orange-100 text-orange-800 border-orange-200";
                
                if (devStatus !== 'LIVE' && devStatus !== 'DEV ONLY') {
                    verText = devStatus;
                    verClass = "bg-red-100 text-red-800 border-red-200";
                }

                const displayName = val(mod, 'Display_Name') || "Unnamed Module";
                const fileLink = val(mod, 'File_Link') || "#";
                const icon = val(mod, 'Icon') || 'slate';
                const iconPath = val(mod, 'Icon_Path') || '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>';
                const iStyle = ICON_STYLES[icon] || ICON_STYLES['slate'];

                const link = document.createElement('a');
                link.href = fileLink;
                link.className = `bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-blue-400 transition group flex justify-between items-center ${devStatus !== 'LIVE' && role !== 'SUPER' ? 'opacity-50 pointer-events-none' : ''}`;
                
                link.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center shadow-inner border border-gray-100 ${iStyle}">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">${iconPath}</svg>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-black text-gray-800 text-sm tracking-tight group-hover:text-blue-600 transition">${displayName}</span>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[9px] font-mono px-1.5 py-0.5 rounded font-bold ${verClass}">${verText}</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7-7"></path></svg></div>
                `;
                grid.appendChild(link);
            });
            subSection.appendChild(grid);
            section.appendChild(subSection);
        });

        container.appendChild(section);
    }
}

// 4. MAIN INIT
window.onload = async function() {
    const uFirst = sessionStorage.getItem('signos_user');
    const uLast = sessionStorage.getItem('signos_user_last') || '';
    const r = sessionStorage.getItem('signos_role');
    const dept = (sessionStorage.getItem('signos_dept') || 'UNASSIGNED').replace('DEPT_', '');

    if (!uFirst) { window.location.href = 'index.html'; return; }

    const initials = (uFirst.charAt(0) + (uLast ? uLast.charAt(0) : '')).toUpperCase();
    const fullName = `${uFirst} ${uLast}`.trim().toUpperCase();

    let roleBg = "bg-gray-600"; let roleText = "text-gray-400";
    if (r === 'SUPER') { roleBg = "bg-purple-600"; roleText = "text-purple-400"; }
    else if (r === 'ADMIN') { roleBg = "bg-red-600"; roleText = "text-red-400"; }
    else if (r === 'SALES') { roleBg = "bg-blue-600"; roleText = "text-blue-400"; }
    else if (r === 'PROD') { roleBg = "bg-green-600"; roleText = "text-green-400"; }

    // Inject Avatar Header (Inner shadow/border removed since parent floating island wraps it)
    document.getElementById('menu-header-container').innerHTML = `
    <div class="bg-gray-800 px-4 py-2 flex justify-between items-center text-[10px] text-gray-400 border-b border-gray-700">
        <div class="flex items-center gap-3">
            <a href="user_profile.html" class="w-8 h-8 rounded-full ${roleBg} text-white flex items-center justify-center font-black shadow-inner border-2 border-gray-700 hover:scale-105 transition hover:border-white" title="Edit Profile">
                ${initials}
            </a>
            <div class="flex flex-col leading-none justify-center">
                <a href="user_profile.html" class="text-gray-200 font-bold uppercase hover:text-white hover:underline transition mb-1">${fullName}</a>
                <div class="flex items-center gap-1.5">
                    <span class="text-[8px] font-black uppercase tracking-widest ${roleText}">${r}</span>
                    <span class="text-gray-600 font-black">|</span>
                    <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">${dept}</span>
                    ${r === 'SUPER' ? '<span class="ml-1 text-[8px] font-black bg-purple-900/50 text-purple-300 px-1.5 py-0.5 rounded border border-purple-800 leading-none">OVERWATCH</span>' : ''}
                </div>
            </div>
        </div>
        <button onclick="logout()" class="hover:text-white font-bold uppercase tracking-widest transition flex items-center gap-1">Logout</button>
    </div>`;

    // Force inject universal footer to the bottom of the menu
    if(typeof injectFooter === 'function') injectFooter();

    const envEl = document.getElementById('env-badge');
    const setEnvBadge = () => {
        if (typeof IS_DEV_ENV !== 'undefined' && IS_DEV_ENV) {
            envEl.innerHTML = `<span class="text-orange-600 font-bold">⚠️ DEV MODE</span> <span class="text-gray-300 mx-1">|</span> <span class="text-gray-400">${typeof clientIP !== 'undefined' ? clientIP : ''}</span>`;
        } else {
            envEl.innerHTML = `<span class="text-green-500 font-bold">🟢 SECURE CONNECTION</span> <span class="text-gray-300 mx-1">|</span> <span class="text-gray-400">${typeof clientIP !== 'undefined' ? clientIP : ''}</span>`;
        }
    };
    setEnvBadge();

    if (r === 'ADMIN' || r === 'SUPER') {
        document.getElementById('admin-workflow').classList.remove('hidden');
        
        const perms = JSON.parse(sessionStorage.getItem('signos_perms') || '{}');
        const btnBackup = document.getElementById('btn-backup');
        if (r !== 'SUPER' && perms.backup !== 'Run' && perms.backup !== 'Full') {
            if(btnBackup) btnBackup.classList.add('hidden');
        }
    }

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/system_modules?select=*`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
        });

        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        const data = await response.json();

        renderMenu(data, r);
    } catch (e) {
        document.getElementById('menu-container').innerHTML = `<div class="p-8 text-center text-red-500 font-bold text-xs uppercase tracking-widest">Error Loading Menu: ${e.message}</div>`;
    }
};
</script>
</body>
</html>
