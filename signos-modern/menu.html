<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SignOS Menu v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col pb-10">

    <div class="bg-gray-900 text-white px-4 py-3 flex justify-between items-center text-xs shadow-md shrink-0 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-black shadow-inner border border-blue-400">OS</div>
            <div class="flex flex-col">
                <span class="font-bold text-gray-200 tracking-wider">The Sign Store <span class="text-blue-400">v6.0</span></span>
                <span id="auth-user" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">---</span>
            </div>
        </div>
        <div class="flex flex-col items-end gap-1">
            <button onclick="logout()" class="text-gray-400 hover:text-white font-bold uppercase transition flex items-center gap-1 active:scale-95">
                Logout <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
            <span id="auth-role" class="text-[9px] font-black bg-blue-900/50 text-blue-300 px-1.5 py-0.5 rounded border border-blue-800">---</span>
            <span id="super-badge" class="hidden text-[8px] font-black bg-purple-900/50 text-purple-300 px-1.5 py-0.5 rounded border border-purple-800">OVERWATCH</span>
        </div>
    </div>

    <div id="env-badge" class="w-full bg-slate-800 text-[10px] font-bold py-1 px-4 text-center tracking-widest border-b border-slate-700 shadow-inner flex justify-center items-center gap-2">
        <!-- Injected via JS -->
    </div>

    <div id="menu-container" class="w-full max-w-4xl mx-auto p-4 flex flex-col gap-6 mt-2">
        <!-- Rendered via JS -->
        <div class="text-center p-10 text-gray-400 animate-pulse text-xs font-bold tracking-widest uppercase">FETCHING ACTIVE MODULES...</div>
    </div>

    <div id="admin-workflow" class="hidden w-full max-w-4xl mx-auto px-4 mt-2">
        <div class="border-t-2 border-gray-200 pt-6">
            <div class="flex items-center gap-2 mb-4">
                <h2 class="text-xs font-black text-gray-800 uppercase tracking-widest">Admin Hub</h2>
                <div class="h-px bg-gray-200 flex-1"></div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                <a href="https://signos-v3-supabase-git-ai-sandbox-evan-8785s-projects.vercel.app/admin_agent_hopper.html" target="_blank" class="bg-blue-50 p-3 rounded-lg shadow-sm border border-blue-300 hover:border-blue-600 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🔫</span>
                    <span class="text-xs font-black text-blue-800">Agent Hopper</span>
                </a>
                <a href="admin_system.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-blue-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">👁️‍🗨️</span>
                    <span class="text-xs font-bold text-gray-700">Command Center</span>
                </a>
                <a href="admin_roadmap.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-orange-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🗺️</span>
                    <span class="text-xs font-bold text-gray-700">Dev Roadmap</span>
                </a>
                <a href="admin_database.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-blue-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🗄️</span>
                    <span class="text-xs font-bold text-gray-700">Data Engine</span>
                </a>
                <a href="admin_product_forge.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-orange-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">⚒️</span>
                    <span class="text-xs font-bold text-gray-700">Product Forge</span>
                </a>
                <a href="admin_staff.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-emerald-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">👥</span>
                    <span class="text-xs font-bold text-gray-700">Workforce</span>
                </a>
                <a href="admin_simulator.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-blue-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">🤖</span>
                    <span class="text-xs font-bold text-gray-700">Simulator</span>
                </a>
                <a href="admin_audit.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-blue-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">📊</span>
                    <span class="text-xs font-bold text-gray-700">Price Auditor</span>
                </a>
                <a href="admin_viewer.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-purple-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">📝</span>
                    <span class="text-xs font-bold text-gray-700">Log Viewer</span>
                </a>
                <a id="btn-backup" href="admin_backup.html" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:border-green-500 active:scale-95 transition flex flex-col items-center text-center gap-2">
                    <span class="text-2xl">💾</span>
                    <span class="text-xs font-bold text-gray-700">Backup Tool</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 1. SAFETY VALVE
        function val(obj, key) {
            if (!obj) return "";
            return obj[key] || obj[key.toUpperCase()] || obj[key.toLowerCase()] || "";
        }

        // 2. STYLE MAP
        const ICON_STYLES = {
            blue: "bg-blue-50 text-blue-600",
            green: "bg-green-50 text-green-600",
            purple: "bg-purple-50 text-purple-600",
            red: "bg-red-50 text-red-600",
            orange: "bg-orange-50 text-orange-600",
            slate: "bg-slate-50 text-slate-600",
            teal: "bg-teal-50 text-teal-600",
            indigo: "bg-indigo-50 text-indigo-600",
            pink: "bg-pink-50 text-pink-600",
            yellow: "bg-yellow-50 text-yellow-600",
            gray: "bg-gray-100 text-gray-600"
        };

        // 3. RENDER LOGIC
        function renderMenu(data, role) {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";

            const cats = [...new Set(data.map(i => val(i, 'Category')))].filter(c => c);
            const sortOrder = ["Rigid Signs", "Roll Media", "ADA", "Services", "System"];
            
            cats.sort((a,b) => {
                let ia = sortOrder.indexOf(a); let ib = sortOrder.indexOf(b);
                if(ia === -1) ia = 99; if(ib === -1) ib = 99;
                return ia - ib;
            });

            cats.forEach(cat => {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-2 mb-3">
                        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${cat}</h2>
                        <div class="h-px bg-gray-200 flex-1"></div>
                    </div>
                `;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3";

                data.filter(i => val(i, 'Category') === cat).forEach(mod => {
                    const tags = val(mod, 'Access_Tags') || [];
                    const devStatus = val(mod, 'Dev_Status');
                    let isAllowed = false;
                    
                    // Retrieve full identity from session storage
                    const userId = sessionStorage.getItem('signos_user_id');
                    const deptId = sessionStorage.getItem('signos_dept');

                    if (role === 'SUPER') {
                        isAllowed = true; // Overwatch sees everything
                    } else if (devStatus === 'LIVE') {
                        // Check if user has access via their Role, Department, OR specific User ID
                        if (tags.includes(role) || tags.includes(deptId) || tags.includes(userId)) {
                            isAllowed = true;
                        }
                    }

                    if (!isAllowed) return;

                    // FIX: Replaced dropped manual versions with the Git Commit tracker
                    const activeCommit = val(mod, 'Active_Commit');
                    let verText = activeCommit ? '#' + activeCommit.substring(0,7) : "Auto-Sync";
                    let verClass = devStatus === 'LIVE' ? "bg-green-100 text-green-800 border-green-200" : "bg-orange-100 text-orange-800 border-orange-200";

                    if (devStatus !== 'LIVE' && devStatus !== 'DEV ONLY') {
                         verText = devStatus; // Show "FIX PENDING" etc.
                    }

                    const displayName = val(mod, 'Display_Name');
                    const fileLink = val(mod, 'File_Link');
                    const iconRaw = val(mod, 'Icon') || 'blue';
                    const iconClass = ICON_STYLES[iconRaw] || ICON_STYLES['blue'];
                    const iconPath = val(mod, 'Icon_Path') || '<path d="M13 10V3L4 14h7v7l9-11h-7z"/>'; 

                    const link = document.createElement('a');
                    link.href = fileLink;
                    link.className = "bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:border-blue-500 hover:shadow-md transition active:scale-[0.98] flex items-center justify-between group";
                    link.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-lg ${iconClass} flex items-center justify-center shrink-0 border border-current/10">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    ${iconPath}
                                </svg>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-black text-gray-800 text-sm tracking-tight group-hover:text-blue-600 transition">${displayName}</span>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[9px] font-mono px-1.5 py-0.5 rounded font-bold ${verClass}">${verText}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-gray-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7-7"></path></svg>
                        </div>
                    `;
                    grid.appendChild(link);
                });

                if (grid.children.length > 0) {
                    section.appendChild(grid);
                    container.appendChild(section);
                }
            });
        }

        // 4. MAIN INIT
        window.onload = async function() {
            const user = sessionStorage.getItem('signos_user');
            const role = sessionStorage.getItem('signos_role');

            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('auth-user').innerText = user;
            document.getElementById('auth-role').innerText = role;

            const envEl = document.getElementById('env-badge');
            const setEnvBadge = () => {
                if (typeof IS_DEV_ENV !== 'undefined' && IS_DEV_ENV) {
                    envEl.innerHTML = `<span class="text-orange-600 font-bold">⚠️ DEV MODE</span> <span class="text-gray-300 mx-1">|</span> <span class="text-gray-400">${typeof clientIP !== 'undefined' ? clientIP : ''}</span>`;
                } else {
                    envEl.innerHTML = `<span class="text-green-500 font-bold">🟢 SECURE CONNECTION</span> <span class="text-gray-300 mx-1">|</span> <span class="text-gray-400">${typeof clientIP !== 'undefined' ? clientIP : ''}</span>`;
                }
            };
            
            setEnvBadge();
            let ipWatcher = setInterval(() => {
                if (typeof clientIP !== 'undefined' && clientIP !== "Unknown") {
                    setEnvBadge();
                    clearInterval(ipWatcher);
                }
            }, 100);
            setTimeout(() => clearInterval(ipWatcher), 5000);

            // Admin Visibility
            if (role === 'ADMIN' || role === 'SUPER') {
                document.getElementById('admin-workflow').classList.remove('hidden');
                if (role === 'SUPER') document.getElementById('super-badge').classList.remove('hidden');

                const perms = JSON.parse(sessionStorage.getItem('signos_perms') || '{}');
                const btnBackup = document.getElementById('btn-backup');
                if (role !== 'SUPER' && perms.backup !== 'Run' && perms.backup !== 'Full') {
                    if(btnBackup) btnBackup.classList.add('hidden');
                }
            }

            // --- FETCH MENU DATA FROM SUPABASE ---
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/system_modules?select=*`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const rawData = await response.json();
                
                // FIX: Removed mapped manual versions to pull the active_commit
                const data = rawData.map(item => ({
                    Module_ID: item.id,
                    Display_Name: item.display_name,
                    File_Link: item.file_link,
                    Dev_Status: item.dev_status,
                    Active_Commit: item.active_commit,
                    Access_Tags: item.access_tags || [],
                    Category: item.category,
                    Icon: item.icon,
                    Icon_Path: item.icon_path
                }));

                renderMenu(data, role);

            } catch (e) {
                document.getElementById('menu-container').innerHTML = `<div class="p-8 text-center text-red-500 font-bold text-xs uppercase tracking-widest">Error Loading Menu: ${e.message}</div>`;
            }
        };
    </script>
</body>
</html>
