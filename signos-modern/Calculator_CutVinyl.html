<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut Vinyl Lettering Retail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <script src="signos-ui.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .color-scroll::-webkit-scrollbar { width: 6px; }
        .color-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px;}
        .color-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

    <div id="main-card" class="max-w-md mx-auto mt-6 w-[calc(100%-2rem)] sm:w-full bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200">
        
        <!-- INPUTS -->
        <div class="p-6 space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Width</label><input type="number" id="w" value="24" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Height</label><input type="number" id="h" value="12" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
            </div>
            
            <div id="sheet-warn" class="hidden bg-yellow-50 text-yellow-700 text-[10px] font-bold px-3 py-1.5 rounded border border-yellow-200 transition-opacity">
                ⚠️ Max Roll Width (52") reached. Dimensions auto-adjusted.
            </div>

            <div class="grid grid-cols-1 gap-4 pt-2">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Material Series</label>
                    <select id="material" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="resetColorSelection(); runCalc();">
                        <option value="651">Oracal 651 (Intermediate / Short Term)</option>
                        <option value="751" selected>Oracal 751 (High Perf / Flat Surfaces)</option>
                        <option value="951">Oracal 951 (Premium Cast / Vehicles)</option>
                        <option value="8500">Oracal 8500 (Translucent / Backlit)</option>
                        <option value="8800">Oracal 8800 (Premium Translucent)</option>
                        <option value="8510">Oracal 8510 (Etched / Frosted Glass)</option>
                        <option value="8810">Oracal 8810 (Frosted Cast Glass)</option>
                        <option value="Specialty">Specialty (Metallic / Fluorescent)</option>
                    </select>
                </div>
            </div>

            <!-- UI WINDOW SELECTION (COLOR MODAL TRIGGER) -->
            <div class="mt-2 border-t border-gray-100 pt-3">
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Vinyl Color</label>
                <div class="cursor-pointer flex items-center justify-between bg-white border border-gray-300 p-2 rounded shadow-sm hover:border-blue-500 transition h-[42px]" onclick="openColorModal()">
                    <div class="flex items-center gap-3 truncate pr-2">
                        <div class="w-6 h-6 rounded-full border border-gray-400 shrink-0" id="ui-color-swatch" style="background-color: #ffffff"></div>
                        <span class="text-xs font-bold text-gray-700 truncate" id="ui-color-name">Select Color...</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4 border-t border-gray-100 pt-3 mt-2">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Weeding Complexity</label>
                    <select id="weeding" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="runCalc()">
                        <option value="Standard">Standard (Large Text / Solid Shapes)</option>
                        <option value="Complex">Complex (Small Text / Intricate Logos)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- RESULTS -->
        <div class="bg-blue-50 p-6 border-t border-blue-100 shadow-inner">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Price</span>
                <span id="ui-unit" class="text-2xl font-black text-blue-900 tracking-tight">$0.00</span>
            </div>
            <div class="border-t border-blue-200/50 my-3"></div>
            
            <!-- LINE ITEMS -->
            <div id="ui-line-items" class="space-y-1 text-xs text-blue-900/70 pt-1 pb-2"></div>
            
            <!-- FIXED: RESTORED MISSING TOTALS BLOCK -->
            <div class="flex justify-between items-end border-t-2 border-blue-800 my-3 pt-2">
                <div>
                    <span class="text-xs font-bold text-blue-800 uppercase block">Total Quote</span>
                    <span class="text-[9px] font-bold text-blue-600 uppercase block mt-1" id="ui-min-text">Shop Minimum: $45</span>
                    <div id="min-badge" class="hidden bg-red-100 text-red-600 border border-red-200 text-[9px] font-bold px-1 rounded inline-block mt-1">MINIMUM APPLIED</div>
                </div>
                <span class="text-3xl font-black text-blue-700" id="ui-total">---</span>
            </div>
        </div>

        <!-- DESCRIPTION GENERATOR -->
        <div class="bg-gray-50 p-4 border-t border-gray-200">
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Job Description</label>
            <textarea id="job-desc" class="w-full text-xs p-2 border rounded bg-white h-20 text-gray-600 font-mono outline-none" readonly></textarea>
        </div>
    </div>

    <!-- COLOR MODAL -->
    <div id="color-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity cursor-pointer" onclick="closeModal()">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col max-h-[85vh] overflow-hidden border border-gray-200 cursor-auto" onclick="event.stopPropagation()">
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center shrink-0">
                <h3 class="font-black text-gray-800 uppercase tracking-widest text-xs" id="modal-title">Select Color</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 font-bold transition focus:outline-none text-lg">✕</button>
            </div>
            <div class="p-3 shrink-0 border-b border-gray-100">
                <input type="text" id="color-search" placeholder="Search colors..." oninput="SignOS_UI.filterGrid('modal-grid', 'color-search')" class="w-full border border-gray-300 rounded p-2 text-xs font-bold outline-none focus:border-blue-500 shadow-inner">
            </div>
            <div id="modal-grid" class="p-4 overflow-y-auto custom-scroll flex flex-wrap gap-2 content-start bg-gray-50 flex-1"></div>
        </div>
    </div>

    <script>
        let backendData = {};
        let allColors = [];
        let selectedColor = null;

        function enforceLimits(maxShort) {
            let wEl = document.getElementById('w');
            let hEl = document.getElementById('h');
            let warnEl = document.getElementById('sheet-warn');
            if (!wEl || !hEl) return;
            let w = parseFloat(wEl.value) || 0;
            let h = parseFloat(hEl.value) || 0;
            let didClamp = false;

            if (w > maxShort && h > maxShort) {
                if (w > h) { h = maxShort; hEl.value = h; } else { w = maxShort; wEl.value = w; }
                didClamp = true;
            }
            if (warnEl) {
                if (didClamp) {
                    warnEl.classList.remove('hidden');
                    clearTimeout(warnEl.timeoutId);
                    warnEl.timeoutId = setTimeout(() => warnEl.classList.add('hidden'), 3000);
                }
            }
        }

        // --- UI COLOR MODAL LOGIC ---
        function resetColorSelection() {
            selectedColor = null;
            document.getElementById('ui-color-name').innerText = "Select Color...";
            document.getElementById('ui-color-swatch').style.backgroundImage = 'none';
            document.getElementById('ui-color-swatch').style.backgroundColor = '#ffffff';
        }

        function openColorModal() {
            document.getElementById('color-modal').classList.remove('hidden');
            document.getElementById('color-search').value = '';
            
            const series = document.getElementById('material').value;
            
            // FIXED: Robust mapping for both legacy uppercase and Supabase lowercase columns
            const filtered = allColors.filter(c => {
                const seriesId = c.Series_ID || c.series_id;
                const inStock = c.In_Stock !== undefined ? c.In_Stock : c.in_stock;
                
                if (!seriesId) return false;
                return String(seriesId).includes(String(series)) && (inStock === true || String(inStock).toUpperCase() === 'TRUE');
            }).map(c => ({
                Code: c.Color_Code || c.color_code || '',
                Name: c.Display_Name || c.display_name || '',
                Hex_Code: (c.Hex_Code || c.hex_code) && (c.Hex_Code || c.hex_code) !== 'N/A' ? (c.Hex_Code || c.hex_code) : '#ffffff'
            }));

            // Safety catch for missing UI library
            if (typeof SignOS_UI === 'undefined') {
                console.error("SignOS_UI library is missing! Make sure signos-ui.js is loaded in the header.");
                return;
            }

            SignOS_UI.buildColorGrid({
                containerId: 'modal-grid',
                data: filtered,
                type: 'vinyl',
                onSelect: (item) => {
                    selectedColor = allColors.find(c => 
                        (c.Color_Code === item.Code || c.color_code === item.Code) && 
                        String(c.Series_ID || c.series_id).includes(String(series))
                    );
                    updateColorUI();
                    closeModal();
                    runCalc();
                }
            });
        }

        function updateColorUI() {
            if (!selectedColor) return;
            
            const code = selectedColor.Color_Code || selectedColor.color_code;
            const name = selectedColor.Display_Name || selectedColor.display_name;
            const hex = selectedColor.Hex_Code || selectedColor.hex_code;
            
            document.getElementById('ui-color-name').innerText = `[${code}] ${name}`;
            
            const swatch = document.getElementById('ui-color-swatch');
            
            if (hex && hex.toLowerCase().startsWith('http')) {
                swatch.style.backgroundImage = `url('${hex}')`;
                swatch.style.backgroundSize = 'cover';
                swatch.style.backgroundColor = 'transparent';
            } else {
                swatch.style.backgroundImage = 'none';
                swatch.style.backgroundColor = hex || '#ffffff';
            }
        }

        function closeModal() {
            document.getElementById('color-modal').classList.add('hidden');
        }

        async function runCalc() {
            if(!backendData) return;
            enforceLimits(52);
            
            try {
                const inputs = {
                    qty: parseFloat(document.getElementById('qty').value) || 1,
                    w: parseFloat(document.getElementById('w').value) || 24,
                    h: parseFloat(document.getElementById('h').value) || 12,
                    material: document.getElementById('material').value,
                    complexity: document.getElementById('weeding').value
                };

                const fnUrl = `${EDGE_URL}/functions/v1/calculate-cut`;
                const response = await fetch(fnUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                    body: JSON.stringify({ inputs: inputs, config: backendData })
                });
                
                if (!response.ok) throw new Error(`Server Error: ${response.status}`);
                const result = await response.json();

                if (!result || !result.retail) return;
                const ret = result.retail;
                const fmt = (n) => "$" + (n || 0).toFixed(2);

                const totalSqFt = ((inputs.w * inputs.h) / 144) * inputs.qty;
                
                // Restored totals blocks
                document.getElementById('lbl-sqft').innerText = totalSqFt.toFixed(1);
                document.getElementById('ui-unit').innerText = fmt(ret.unitPrice);
                document.getElementById('ui-total').innerText = fmt(ret.grandTotal);

                let lineItemsHtml = '';
                ret.breakdown.forEach(item => {
                    if(!item.label.includes('Shop Minimum Surcharge')) {
                        let valStr = item.total === 0 ? 'Included' : fmt(item.total);
                        lineItemsHtml += `<div class="flex justify-between"><span>${item.label}:</span><span class="font-bold">${valStr}</span></div>`;
                    }
                });
                document.getElementById('ui-line-items').innerHTML = lineItemsHtml;

                const minOrder = parseFloat(backendData.Retail_Min_Order || 45);
                document.getElementById('ui-min-text').innerText = `Shop Minimum: $${minOrder}`;
                document.getElementById('min-badge').classList.toggle('hidden', !ret.isMinApplied);

                const matSelect = document.getElementById('material');
                const matTxt = matSelect.options[matSelect.selectedIndex].text;
                const weedTxt = inputs.complexity === 'Complex' ? ' (Complex Weeding)' : ' (Standard Weeding)';
                
                const code = selectedColor ? (selectedColor.Color_Code || selectedColor.color_code) : '';
                const name = selectedColor ? (selectedColor.Display_Name || selectedColor.display_name) : '';
                const colorTxt = selectedColor ? ` Color: [${code}] ${name}.` : ' Color: TBD.';

                document.getElementById('job-desc').value = `(x${inputs.qty}) ${inputs.w}" x ${inputs.h}" Cut Vinyl Lettering.\nMaterial: ${matTxt}.${colorTxt}${weedTxt}. Pre-Masked.`;

            } catch(e) {
                console.error("Cloud Calculation Error:", e);
            }
        }

        window.addEventListener('load', async () => {
            if (typeof injectHeader === 'function') injectHeader("Cut Vinyl Lettering");
            const statusText = document.getElementById("status-text");
            const statusDot = document.getElementById("status-dot");
            
            try {
                // FIXED: Fetches the vinyl data directly through the Handshake API
                const payload = await SignOS.fetchProductData('PROD_Cut', ['REF_Colors_Vinyl']);
                backendData = payload.config;
                if(!backendData || payload.error) throw new Error(payload.error || "Connection Failed");
                
                allColors = payload.tables['REF_Colors_Vinyl'] || [];
                
                if(statusText) {
                    statusText.innerText = "ONLINE";
                    statusText.className = "font-bold text-green-500";
                    if(statusDot) {
                        statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                        statusDot.classList.remove("animate-pulse");
                    }
                }
                runCalc();
            } catch(e) {
                if(statusText) {
                    statusText.innerText = "OFFLINE";
                    statusText.className = "font-bold text-red-500";
                }
                console.error("Initialization Failed:", e);
            }
        });
    </script>
</body>
</html>
