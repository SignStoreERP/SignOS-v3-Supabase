<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pole Cover | SignOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <script src="signos-export-v2.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<!-- UNIVERSAL HEADER INJECTION -->
<div id="menu-header-container"></div>

<!-- NOTICE: Max width reduced to max-w-2xl for standardized UI scaling -->
<div id="main-card" class="max-w-2xl mx-auto mt-6 w-[calc(100%-2rem)] bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200">
    
    <div class="flex flex-col">
        
        <!-- HEADER -->
        <div class="bg-slate-900 p-5 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-lg font-black text-white uppercase tracking-widest flex items-center gap-2">
                    Pole Cover <span class="text-xs text-slate-500">v1.3</span>
                </h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5">Heavy Fabrication Engine</p>
            </div>
            <label id="admin-toggle-container" class="hidden items-center gap-2 cursor-pointer bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 transition">
                <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Admin Cost</span>
                <div class="relative">
                    <input type="checkbox" id="admin-toggle" class="sr-only" onchange="handleAdminToggle()">
                    <div class="block bg-gray-300 w-8 h-5 rounded-full transition-colors" id="admin-toggle-bg"></div>
                    <div class="dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-transform" id="admin-toggle-dot"></div>
                </div>
            </label>
        </div>

        <!-- 2D ARCHITECTURAL VIEWPORT -->
        <div class="w-full bg-slate-900 border-b border-gray-200 flex flex-col relative overflow-hidden h-[380px] shrink-0">
            <div class="absolute top-4 left-4 flex flex-col z-20 pointer-events-none">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">2D Architectural Draft</span>
                <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Live Structural Physics</span>
            </div>
            
            <div class="absolute top-4 right-4 z-20 flex gap-2">
                <button onclick="DraftCamera.resetAll()" class="bg-slate-800 hover:bg-slate-700 text-white border border-slate-500 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">Reset View</button>
                <button id="btn-toggle-dims" onclick="toggleDimensions()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">Hide Dimensions</button>
                <button id="btn-toggle-xray" onclick="toggleXRay()" class="bg-blue-600 hover:bg-blue-500 text-white border border-blue-500 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">X-Ray Frame</button>
            </div>

            <!-- The Drawing Stage -->
            <div id="svg-preview-container" class="w-full h-full flex pt-16 pb-4"></div>
        </div>

        <!-- THE CALCULATOR INPUTS -->
        <div class="w-full flex flex-col">
            
            <div class="p-6 space-y-5">

                <!-- CONDENSED SPECIFICATIONS -->
                <div class="bg-slate-50 p-5 rounded-lg border border-slate-200 space-y-4">
                    <h3 class="text-[10px] font-black text-slate-700 uppercase tracking-widest border-b border-slate-200 pb-1">Pole Cover Specifications</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border border-blue-300 p-2 rounded text-sm font-bold text-center bg-blue-50 focus:border-blue-500 outline-none shadow-inner" oninput="runCalc()"></div>
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Width (in)</label><input type="number" id="w" value="36" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Height (in)</label><input type="number" id="h" value="72" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Depth (in)</label><input type="number" id="d" value="12" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center" title="Existing Pole Outer Diameter">Pole O.D.</label><input type="number" id="poleSize" value="4.0" step="0.5" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                    </div>
                </div>

                <div class="bg-slate-50 p-5 rounded-lg border border-slate-200 space-y-4">
                    <h3 class="text-[10px] font-black text-slate-700 uppercase tracking-widest border-b border-slate-200 pb-1">Materials & Finishes</h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Frame Angle</label>
                            <select id="frameMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="1">1" Alum Angle</option>
                                <option value="1.5" selected>1.5" Alum Angle</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Steel Brackets</label>
                            <select id="bracketMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="Cost_Frame_SteelAngle_1.5_1/8" selected>1.5" Steel Angle</option>
                                <option value="Cost_Frame_SteelAngle_2_1/8">2" Steel Angle</option>
                                <option value="Cost_Frame_SteelAngle_3_1/4">3" Steel Angle</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-1 border-t border-slate-200 mt-2">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Face Stock</label>
                            <select id="faceThk" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="handleFaceChange()">
                                <option value=".040" selected>.040 Aluminum</option>
                                <option value=".063">.063 Aluminum</option>
                                <option value=".080">.080 Aluminum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Finish / Paint</label>
                            <select id="paintOpt" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="Custom Paint">Custom Painted</option>
                                <option value="Factory Black" selected>Factory Black (.040)</option>
                                <option value="Factory White">Factory White (.040)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- ADMIN HARD COST LEDGER -->
                <div id="admin-ledger-box" class="hidden bg-slate-50 p-5 border border-gray-200 shadow-inner relative rounded-lg mt-2">
                    <div class="absolute top-0 right-4 w-12 h-1 bg-red-500 rounded-b-md"></div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-black text-gray-800 uppercase tracking-widest flex items-center gap-3">
                            Physics Audit
                            <button onclick="if(typeof SignOS_Export_v2 !== 'undefined' && SignOS_Export_v2.printCostLedger) { SignOS_Export_v2.printCostLedger(window.lastEdgeResult, 'svg-preview-container', 'job-summary'); }" class="bg-red-100 hover:bg-red-200 text-red-700 border border-red-200 px-2 py-1 rounded text-[8px] font-black uppercase tracking-widest transition flex items-center gap-1 shadow-sm">Print Ledger</button>
                        </h3>
                        <span id="ui-metrics-margin" class="text-sm text-green-600 font-mono tracking-tight">--%</span>
                    </div>
                    <div id="ui-cost-groups" class="space-y-4"></div>
                    <div class="flex justify-between items-center border-t-2 border-gray-300 mt-4 pt-3">
                        <span class="text-[10px] font-black text-gray-600 uppercase tracking-widest">Total Hard Cost</span>
                        <span id="ui-cost-total" class="text-lg font-black text-red-600 font-mono tracking-tight">---</span>
                    </div>
                </div>
            </div>

            <!-- RETAIL FOOTER -->
            <div class="bg-blue-50 p-6 border-t border-blue-200 shadow-inner sticky bottom-0 z-10">
                <div class="flex justify-between items-end border-b border-blue-200 pb-3 mb-4">
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Retail Price</span>
                        <span id="ui-unit" class="text-3xl font-black text-blue-900 tracking-tight leading-none">---</span>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-bold text-blue-800 uppercase block mb-1">Total Quote</span>
                        <span class="text-4xl font-black text-blue-700 tracking-tight leading-none" id="ui-total">---</span>
                    </div>
                </div>
                
                <button onclick="if(typeof SignOS_Export_v2 !== 'undefined' && SignOS_Export_v2.printWorkOrder) { SignOS_Export_v2.printWorkOrder(window.lastEdgeResult, 'svg-preview-container', 'job-summary'); }" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded shadow uppercase tracking-widest text-xs transition mb-4">Print Work Order</button>
                <textarea id="job-summary" class="w-full h-24 bg-white border border-gray-300 rounded p-3 text-[10px] font-mono text-gray-700 outline-none shadow-inner resize-none" readonly></textarea>
            </div>
            
        </div>
    </div>
</div>

<script>
    let adminCostEnabled = false;
    let backendData = null;
    let calcTimeout = null;
    let showDims = true;
    let showXRay = true;

    // --- INDEPENDENT 2D PAN/ZOOM ENGINE ---
    const DraftCamera = {
        activeTarget: null, isDragging: false, startX: 0, startY: 0,
        init: function(el) { if (el._panX === undefined) { el._panX = 0; el._panY = 0; el._scaleZ = 1; } },
        zoom: function(e, container) {
            e.preventDefault(); const target = container.querySelector('.zoom-target'); if(!target) return;
            this.init(target); target._scaleZ += e.deltaY * -0.001; target._scaleZ = Math.min(Math.max(0.4, target._scaleZ), 3); this.update(target);
        },
        start: function(e, container) {
            const target = container.querySelector('.zoom-target'); if(!target) return;
            this.init(target); this.activeTarget = target; this.isDragging = true;
            this.startX = e.clientX - target._panX; this.startY = e.clientY - target._panY; container.style.cursor = 'grabbing';
        },
        move: function(e) {
            if(!this.isDragging || !this.activeTarget) return;
            this.activeTarget._panX = e.clientX - this.startX; this.activeTarget._panY = e.clientY - this.startY; this.update(this.activeTarget, true);
        },
        end: function() {
            if(this.activeTarget) { this.update(this.activeTarget, false); this.activeTarget.parentElement.style.cursor = 'grab'; }
            this.isDragging = false; this.activeTarget = null;
        },
        update: function(target, isDragging = false) {
            target.style.transform = `translate(${target._panX}px, ${target._panY}px) scale(${target._scaleZ})`;
            target.style.transition = isDragging ? 'none' : 'transform 0.2s ease-out';
        },
        resetAll: function() { document.querySelectorAll('.zoom-target').forEach(t => { t._panX = 0; t._panY = 0; t._scaleZ = 1; this.update(t); }); }
    };
    window.addEventListener('mousemove', (e) => DraftCamera.move(e));
    window.addEventListener('mouseup', () => DraftCamera.end());

    function toggleDimensions() { 
        showDims = !showDims; 
        document.getElementById('btn-toggle-dims').innerText = showDims ? 'Hide Dimensions' : 'Show Dimensions'; 
        runCalc(); 
    }

    function toggleXRay() { 
        showXRay = !showXRay; 
        document.getElementById('btn-toggle-xray').className = showXRay ? "bg-blue-600 hover:bg-blue-500 text-white border border-blue-500 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none" : "bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none"; 
        runCalc(); 
    }

    function handleFaceChange() {
        const face = document.getElementById('faceThk').value;
        const paintOpt = document.getElementById('paintOpt');
        
        if (face !== '.040') {
            paintOpt.value = 'Custom Paint';
            Array.from(paintOpt.options).forEach(opt => { if (opt.value !== 'Custom Paint') opt.disabled = true; });
        } else {
            Array.from(paintOpt.options).forEach(opt => { opt.disabled = false; });
        }
        runCalc();
    }

    function handleAdminToggle() {
        adminCostEnabled = document.getElementById('admin-toggle').checked;
        const bg = document.getElementById('admin-toggle-bg');
        const dot = document.getElementById('admin-toggle-dot');
        const ledger = document.getElementById('admin-ledger-box');
        
        if (adminCostEnabled) {
            bg.classList.replace('bg-gray-300', 'bg-red-500');
            dot.style.transform = 'translateX(12px)';
            ledger.classList.remove('hidden');
        } else {
            bg.classList.replace('bg-red-500', 'bg-gray-300');
            dot.style.transform = 'translateX(0)';
            ledger.classList.add('hidden');
        }
        runCalc();
    }

    function renderAdminCostLedger(costData, metricsData) {
        const fmt = (n) => "$" + (n || 0).toFixed(2);
        document.getElementById('ui-cost-total').innerText = fmt(costData.total);
        document.getElementById('ui-metrics-margin').innerText = `${(metricsData.margin * 100).toFixed(1)}% Margin`;

        const grouped = {};
        costData.breakdown.forEach(i => {
            const cat = i.category || 'METAL_MAT';
            if(!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(i);
        });

        const DEPT_TITLES = {
            'METAL_MAT': 'Metal Fab (Materials)', 'METAL_LAB': 'Metal Fab (Labor)',
            'PAINT_MAT': 'Paint (Materials)', 'PAINT_LAB': 'Paint (Labor)',
            'INSTALL_HDW': 'Installation Hardware'
        };

        let html = '';
        for (const [key, items] of Object.entries(grouped)) {
            let catTotal = items.reduce((s,i)=>s+i.total, 0);
            let title = DEPT_TITLES[key] || key;
            html += `<div class="mb-3 border border-slate-200 rounded overflow-hidden">
                <div class="bg-slate-100 px-3 py-1.5 border-b border-slate-200 flex justify-between items-center">
                    <span class="text-[9px] font-black uppercase tracking-widest text-slate-600">${title}</span>
                    <span class="text-[10px] font-bold text-slate-700 font-mono">${fmt(catTotal)}</span>
                </div><div class="p-3 space-y-2 bg-white">`;
            
            items.forEach(i => {
                let cleanFormula = (i.formula || '').replace(/<[^>]*>?/gm, '');
                html += `<div class="flex flex-col">
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-bold text-slate-800 leading-tight flex-1 pr-2">${i.label}</span>
                        <span class="text-[10px] font-black text-red-700 font-mono shrink-0">${fmt(i.total)}</span>
                    </div>
                    <div class="text-[8px] text-gray-500 font-mono italic leading-snug break-words">↳ ${cleanFormula}</div>
                </div>`;
            });
            html += `</div></div>`;
        }
        document.getElementById('ui-cost-groups').innerHTML = html;
    }

    function renderDrawings(inputs) {
        const cont = document.getElementById('svg-preview-container');
        let savedStates = [];
        document.querySelectorAll('.zoom-target').forEach(t => {
            savedStates.push({ x: t._panX || 0, y: t._panY || 0, z: t._scaleZ || 1 });
        });

        const fw = parseFloat(inputs.frameMat) || 1.5;
        const w = inputs.w; const h = inputs.h; const d = inputs.d; 
        const pRad = inputs.poleSize / 2;
        
        const padX = 20; const padY = 20;
        
        // Dynamic Fine Strokes
        const sw = Math.max((w+h)*0.0015, 0.25);
        const fSize = Math.max((w+h)*0.015, 3);
        const faceOpacity = showXRay ? 0.25 : 0.95;
        const dimColor = "#64748b";

        const drawHDim = (x1, x2, y, label) => {
            if (!showDims) return "";
            return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${dimColor}" stroke-width="${sw}"/>
            <line x1="${x1}" y1="${y-fSize/2}" x2="${x1}" y2="${y+fSize/2}" stroke="${dimColor}" stroke-width="${sw}"/>
            <line x1="${x2}" y1="${y-fSize/2}" x2="${x2}" y2="${y+fSize/2}" stroke="${dimColor}" stroke-width="${sw}"/>
            <text x="${(x1+x2)/2}" y="${y-fSize*0.5}" fill="#e11d48" font-size="${fSize}" font-family="monospace" text-anchor="middle" font-weight="bold">${label}</text>`;
        };
        const drawVDim = (x, y1, y2, label) => {
            if (!showDims) return "";
            return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${dimColor}" stroke-width="${sw}"/>
            <line x1="${x-fSize/2}" y1="${y1}" x2="${x+fSize/2}" y2="${y1}" stroke="${dimColor}" stroke-width="${sw}"/>
            <line x1="${x-fSize/2}" y1="${y2}" x2="${x+fSize/2}" y2="${y2}" stroke="${dimColor}" stroke-width="${sw}"/>
            <text x="${x+fSize*0.5}" y="${(y1+y2)/2}" fill="#e11d48" font-size="${fSize}" font-family="monospace" alignment-baseline="middle" font-weight="bold">${label}</text>`;
        };

        // Front Elevation
        let svgFront = `<svg width="100%" height="100%" viewBox="-${padX} -${padY} ${w + padX*2} ${h + padY*2}">`;
        svgFront += `<rect x="${(w - inputs.poleSize)/2}" y="-10" width="${inputs.poleSize}" height="${h+20}" fill="#cbd5e1" stroke="#64748b" stroke-width="${sw}" opacity="0.3"/>`; // Ghost Pole
        
        // Front Skeleton Box
        svgFront += `<rect x="0" y="0" width="${w}" height="${h}" fill="none" stroke="#94a3b8" stroke-width="${sw}"/>`;
        svgFront += `<rect x="${fw}" y="${fw}" width="${w-(fw*2)}" height="${h-(fw*2)}" fill="none" stroke="#94a3b8" stroke-width="${sw}"/>`;
        svgFront += `<rect x="0" y="${h/2 - fw/2}" width="${w}" height="${fw}" fill="none" stroke="#94a3b8" stroke-width="${sw}"/>`; // Middle Brace Reference
        
        // Front Face
        svgFront += `<rect x="0" y="0" width="${w}" height="${h}" fill="#3b82f6" stroke="#1e3a8a" stroke-width="${sw*1.5}" opacity="${faceOpacity}"/>`; 
        svgFront += drawHDim(0, w, -5, w + '" W');
        svgFront += drawVDim(w + 5, 0, h, h + '" H');
        svgFront += `</svg>`;

        // Side Profile
        let svgSide = `<svg width="100%" height="100%" viewBox="-${padX} -${padY} ${d + padX*2} ${h + padY*2}">`;
        svgSide += `<rect x="${(d - inputs.poleSize)/2}" y="-10" width="${inputs.poleSize}" height="${h+20}" fill="#cbd5e1" stroke="#64748b" stroke-width="${sw}" opacity="0.3"/>`; // Ghost Pole
        
        // Side Skeleton Box
        svgSide += `<rect x="0" y="0" width="${d}" height="${h}" fill="none" stroke="#94a3b8" stroke-width="${sw}"/>`;
        svgSide += `<rect x="${fw}" y="${fw}" width="${d-(fw*2)}" height="${h-(fw*2)}" fill="none" stroke="#94a3b8" stroke-width="${sw}"/>`;
        svgSide += `<rect x="0" y="${h/2 - fw/2}" width="${d}" height="${fw}" fill="none" stroke="#94a3b8" stroke-width="${sw}"/>`;
        
        // Side Face
        svgSide += `<rect x="0" y="0" width="${d}" height="${h}" fill="#2563eb" stroke="#1e3a8a" stroke-width="${sw*1.5}" opacity="${faceOpacity}"/>`; 
        svgSide += drawHDim(0, d, -5, d + '" D');
        svgSide += drawVDim(d + 5, 0, h, h + '" H');
        svgSide += `</svg>`;

        // Top Section (Physics) - Rotated 90 Degrees to save horizontal space
        const rotW = d;
        const rotH = w;
        const cx = rotW/2; const cy = rotH/2;
        let svgTop = `<svg width="100%" height="100%" viewBox="-${padY} -${padX} ${rotW + padY*2} ${rotH + padX*2}">`;
        svgTop += `<rect x="0" y="0" width="${rotW}" height="${rotH}" fill="none" stroke="#1e3a8a" stroke-width="${sw*1.5}"/>`; // Outer Box
        svgTop += `<rect x="${fw}" y="${fw}" width="${rotW-(fw*2)}" height="${rotH-(fw*2)}" fill="none" stroke="#64748b" stroke-width="${sw}"/>`; // Inner Frame
        svgTop += `<circle cx="${cx}" cy="${cy}" r="${pRad}" fill="#94a3b8" stroke="#475569" stroke-width="${sw*1.5}"/>`; // Pole
        
        // Braces span short way (which is X in rotated view, meaning width)
        const braceThk = 1.5;
        const topBraceY = cy - pRad - braceThk;
        const botBraceY = cy + pRad;
        svgTop += `<rect x="${fw}" y="${topBraceY}" width="${rotW-(fw*2)}" height="${braceThk}" fill="#f59e0b" stroke="#b45309" stroke-width="${sw}"/>`; // Top Brace
        svgTop += `<rect x="${fw}" y="${botBraceY}" width="${rotW-(fw*2)}" height="${braceThk}" fill="#f59e0b" stroke="#b45309" stroke-width="${sw}"/>`; // Bot Brace
        
        // Brackets connecting brace to pole
        svgTop += `<rect x="${cx - 2}" y="${topBraceY + braceThk}" width="4" height="${pRad}" fill="#dc2626"/>`; 
        svgTop += `<rect x="${cx - 2}" y="${cy}" width="4" height="${pRad}" fill="#dc2626"/>`; 

        svgTop += drawHDim(0, rotW, -5, d + '" D');
        svgTop += drawVDim(rotW + 5, 0, rotH, w + '" W');
        svgTop += `</svg>`;

        // Adjusted to a 4-Column Grid: Side and Top get 1 col each, Front gets 2 cols.
        cont.innerHTML = `
            <div class="grid grid-cols-4 gap-3 w-full h-full p-4 animate-in fade-in duration-300">
                <div class="col-span-1 flex flex-col items-center bg-slate-950/50 rounded-xl border border-slate-700/50 p-2 relative shadow-inner overflow-hidden cursor-grab" onwheel="DraftCamera.zoom(event, this)" onmousedown="DraftCamera.start(event, this)">
                    <span class="absolute top-2 left-2 text-[8px] font-black text-blue-400 uppercase tracking-widest z-10 pointer-events-none">Top Section</span>
                    <div class="zoom-target w-full h-full flex items-center justify-center mt-4 pointer-events-none origin-center">${svgTop}</div>
                </div>
                <div class="col-span-2 flex flex-col items-center bg-slate-950/50 rounded-xl border border-slate-700/50 p-2 relative shadow-inner overflow-hidden cursor-grab" onwheel="DraftCamera.zoom(event, this)" onmousedown="DraftCamera.start(event, this)">
                    <span class="absolute top-2 left-2 text-[8px] font-black text-blue-400 uppercase tracking-widest z-10 pointer-events-none">Front Elevation</span>
                    <div class="zoom-target w-full h-full flex items-center justify-center mt-4 pointer-events-none origin-center">${svgFront}</div>
                </div>
                <div class="col-span-1 flex flex-col items-center bg-slate-950/50 rounded-xl border border-slate-700/50 p-2 relative shadow-inner overflow-hidden cursor-grab" onwheel="DraftCamera.zoom(event, this)" onmousedown="DraftCamera.start(event, this)">
                    <span class="absolute top-2 left-2 text-[8px] font-black text-blue-400 uppercase tracking-widest z-10 pointer-events-none">Side Profile</span>
                    <div class="zoom-target w-full h-full flex items-center justify-center mt-4 pointer-events-none origin-center">${svgSide}</div>
                </div>
            </div>
        `;

        document.querySelectorAll('.zoom-target').forEach((t, i) => {
            if (savedStates[i]) { t._panX = savedStates[i].x; t._panY = savedStates[i].y; t._scaleZ = savedStates[i].z; DraftCamera.update(t); }
        });
    }

    async function runCalc() {
        if(!backendData) return;
        clearTimeout(calcTimeout);
        
        calcTimeout = setTimeout(async () => {
            const inputs = {
                qty: parseFloat(document.getElementById('qty').value) || 1,
                w: parseFloat(document.getElementById('w').value) || 36,
                h: parseFloat(document.getElementById('h').value) || 72,
                d: parseFloat(document.getElementById('d').value) || 12,
                poleSize: parseFloat(document.getElementById('poleSize').value) || 4,
                faceThk: document.getElementById('faceThk').value,
                frameMat: document.getElementById('frameMat').value,
                bracketMat: document.getElementById('bracketMat').value,
                paintOption: document.getElementById('paintOpt').value
            };

            const auditMode = adminCostEnabled ? 'full' : 'retail_only';
            const targetMargin = backendData.Target_Margin_Pct !== undefined ? parseFloat(backendData.Target_Margin_Pct) : 0.60;
            const dynamicConfig = { ...backendData, Target_Margin_Pct: targetMargin };

            try {
                const response = await fetch(`${EDGE_URL}/functions/v1/calculate-pole-cover`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                    body: JSON.stringify({ inputs: inputs, config: dynamicConfig, audit_mode: auditMode })
                });

                if (!response.ok) throw new Error("Calculation failed");
                const result = await response.json();
                window.lastEdgeResult = result;

                const fmt = (n) => "$" + (n || 0).toFixed(2);
                document.getElementById('ui-unit').innerText = fmt(result.retail.unitPrice);
                document.getElementById('ui-total').innerText = fmt(result.retail.grandTotal);

                const bracketSize = Math.max(1, inputs.poleSize - 1);
                const bracketStyle = document.getElementById('bracketMat').options[document.getElementById('bracketMat').selectedIndex].text;
                
                let summary = `JOB SUMMARY:\n(x${inputs.qty}) ${inputs.w}"W x ${inputs.h}"H x ${inputs.d}"D Pole Cover.\nFaces: ${inputs.faceThk} Aluminum (${inputs.paintOption})\nFrame: ${inputs.frameMat}" Aluminum Angle Frame with Internal 1.5" Bracing Angles.\nHardware: Raw Steel Brackets (${bracketStyle}, cut to ${bracketSize}" lengths, Welded On-Site to ${inputs.poleSize}" OD Pole). Access panel attached via screws.`;
                document.getElementById('job-summary').value = summary;

                renderDrawings(inputs);

                if (adminCostEnabled && result.cost) {
                    renderAdminCostLedger(result.cost, result.metrics);
                }
            } catch(e) {
                console.error("Calculation Error:", e);
                document.getElementById('job-summary').value = `🚨 CALCULATION HALTED:\n${e.message}`;
            }
        }, 300);
    }

    window.addEventListener('load', async () => {
        if (typeof injectHeader === 'function') injectHeader("Pole Covers");
        const role = sessionStorage.getItem('signos_role');
        if (role === 'ADMIN' || role === 'SUPER') document.getElementById('admin-toggle-container').classList.remove('hidden');
        
        try {
            // Reusing Post Panel metal physics mappings
            const payload = await SignOS.fetchProductData('PROD_Post_Panel'); 
            if(payload.error) throw new Error(payload.error);
            backendData = payload.config;
            handleFaceChange();
            
            // Allow time for the dynamic header to finish injecting into the DOM before modifying it
            setTimeout(() => {
                const statusText = document.getElementById("status-text");
                const statusDot = document.getElementById("status-dot");
                if(statusText) {
                    statusText.innerText = "ONLINE";
                    statusText.className = "font-bold text-green-500";
                }
                if(statusDot) {
                    statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                    statusDot.classList.remove("animate-pulse");
                }
            }, 300);
            
        } catch(e) {
            console.error("Initialization Failed:", e);
            setTimeout(() => {
                const statusText = document.getElementById("status-text");
                const statusDot = document.getElementById("status-dot");
                if(statusText) {
                    statusText.innerText = "OFFLINE";
                    statusText.className = "font-bold text-red-500";
                }
                if(statusDot) {
                    statusDot.classList.replace("bg-yellow-500", "bg-red-500");
                    statusDot.classList.replace("bg-green-500", "bg-red-500");
                }
            }, 300);
        }
    });
</script>
</body>
