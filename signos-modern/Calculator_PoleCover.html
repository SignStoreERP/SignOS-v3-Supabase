<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pole Cover | SignOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <script src="signos-export-v2.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<!-- UNIVERSAL HEADER INJECTION -->
<div id="menu-header-container"></div>

<div id="main-card" class="max-w-3xl mx-auto mt-6 w-[calc(100%-2rem)] bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200">
    
    <div class="flex flex-col">
        
        <!-- HEADER -->
        <div class="bg-slate-900 p-5 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-lg font-black text-white uppercase tracking-widest flex items-center gap-2">
                    Pole Cover <span class="text-xs text-slate-500">v1.2</span>
                </h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5">Heavy Fabrication Engine</p>
            </div>
            <label id="admin-toggle-container" class="hidden items-center gap-2 cursor-pointer bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 transition">
                <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Admin Cost</span>
                <div class="relative">
                    <input type="checkbox" id="admin-toggle" class="sr-only" onchange="handleAdminToggle()">
                    <div class="block bg-gray-300 w-8 h-5 rounded-full transition-colors" id="admin-toggle-bg"></div>
                    <div class="dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-transform" id="admin-toggle-dot"></div>
                </div>
            </label>
        </div>

        <!-- 2D ARCHITECTURAL VIEWPORT -->
        <div class="w-full bg-slate-900 border-b border-gray-200 flex flex-col relative overflow-hidden h-[380px] shrink-0">
            <div class="absolute top-4 left-4 flex flex-col z-20 pointer-events-none">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">2D Architectural Draft</span>
                <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Live Structural Physics</span>
            </div>
            
            <div class="absolute top-4 right-4 z-20 flex gap-2">
                <button onclick="DraftCamera.resetAll()" class="bg-slate-800 hover:bg-slate-700 text-white border border-slate-500 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">Reset View</button>
                <button id="btn-toggle-dims" onclick="toggleDimensions()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">Hide Dimensions</button>
                <button id="btn-toggle-xray" onclick="toggleXRay()" class="bg-blue-600 hover:bg-blue-500 text-white border border-blue-500 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">X-Ray Frame</button>
            </div>

            <!-- The Drawing Stage -->
            <div id="svg-preview-container" class="w-full h-full flex pt-16 pb-4"></div>
        </div>

        <!-- THE CALCULATOR INPUTS -->
        <div class="w-full flex flex-col">
            
            <div class="p-6 space-y-5">
                
                <div class="grid grid-cols-4 gap-3 border-b border-gray-100 pb-4">
                    <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border border-blue-300 p-2 rounded text-lg font-black text-center bg-blue-50 focus:border-blue-600 outline-none shadow-inner" oninput="runCalc()"></div>
                    <div class="col-span-3">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Existing Pole Outer Diameter (in)</label>
                        <input type="number" id="poleSize" value="4.0" step="0.5" class="w-full border border-gray-300 p-2 rounded font-black text-gray-800 text-lg bg-white outline-none focus:border-blue-500 shadow-inner" oninput="runCalc()">
                    </div>
                </div>

                <div class="bg-slate-50 p-5 rounded-lg border border-slate-200 space-y-4">
                    <h3 class="text-[10px] font-black text-slate-700 uppercase tracking-widest border-b border-slate-200 pb-1">Cover Dimensions</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Width (in)</label><input type="number" id="w" value="36" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Height (in)</label><input type="number" id="h" value="72" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Depth (in)</label><input type="number" id="d" value="12" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                    </div>
                </div>

                <div class="bg-slate-50 p-5 rounded-lg border border-slate-200 space-y-4">
                    <h3 class="text-[10px] font-black text-slate-700 uppercase tracking-widest border-b border-slate-200 pb-1">Materials & Finishes</h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Frame Angle</label>
                            <select id="frameMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="1">1" Alum Angle</option>
                                <option value="1.5" selected>1.5" Alum Angle</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Steel Brackets</label>
                            <select id="bracketMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="Cost_Frame_SteelAngle_1.5_1/8">1.5" Steel Angle</option>
                                <option value="Cost_Frame_SteelAngle_2_1/8" selected>2" Steel Angle</option>
                                <option value="Cost_Frame_SteelAngle_3_1/4">3" Steel Angle</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-1 border-t border-slate-200 mt-2">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Face Stock</label>
                            <select id="faceThk" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="handleFaceChange()">
                                <option value=".040" selected>.040 Aluminum</option>
                                <option value=".063">.063 Aluminum</option>
                                <option value=".080">.080 Aluminum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Finish / Paint</label>
                            <select id="paintOpt" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="Custom Paint">Custom Painted</option>
                                <option value="Factory Black" selected>Factory Black (.040)</option>
                                <option value="Factory White">Factory White (.040)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- ADMIN HARD COST LEDGER -->
                <div id="admin-ledger-box" class="hidden bg-slate-50 p-5 border border-gray-200 shadow-inner relative rounded-lg mt-2">
                    <div class="absolute top-0 right-4 w-12 h-1 bg-red-500 rounded-b-md"></div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-black text-gray-800 uppercase tracking-widest flex items-center gap-3">
                            Physics Audit
                            <button onclick="if(typeof SignOS_Export_v2 !== 'undefined' && SignOS_Export_v2.printCostLedger) { SignOS_Export_v2.printCostLedger(window.lastEdgeResult, 'svg-preview-container', 'job-summary'); }" class="bg-red-100 hover:bg-red-200 text-red-700 border border-red-200 px-2 py-1 rounded text-[8px] font-black uppercase tracking-widest transition flex items-center gap-1 shadow-sm">Print Ledger</button>
                        </h3>
                        <span id="ui-metrics-margin" class="text-sm text-green-600 font-mono tracking-tight">--%</span>
                    </div>
                    <div id="ui-cost-groups" class="space-y-4"></div>
                    <div class="flex justify-between items-center border-t-2 border-gray-300 mt-4 pt-3">
                        <span class="text-[10px] font-black text-gray-600 uppercase tracking-widest">Total Hard Cost</span>
                        <span id="ui-cost-total" class="text-lg font-black text-red-600 font-mono tracking-tight">---</span>
                    </div>
                </div>
            </div>

            <!-- RETAIL FOOTER -->
            <div class="bg-blue-50 p-6 border-t border-blue-200 shadow-inner sticky bottom-0 z-10">
                <div class="flex justify-between items-end border-b border-blue-200 pb-3 mb-4">
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Retail Price</span>
                        <span id="ui-unit" class="text-3xl font-black text-blue-900 tracking-tight leading-none">---</span>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-bold text-blue-800 uppercase block mb-1">Total Quote</span>
                        <span class="text-4xl font-black text-blue-700 tracking-tight leading-none" id="ui-total">---</span>
                    </div>
                </div>
                
                <button onclick="if(typeof SignOS_Export_v2 !== 'undefined' && SignOS_Export_v2.printWorkOrder) { SignOS_Export_v2.printWorkOrder(window.lastEdgeResult, 'svg-preview-container', 'job-summary'); }" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded shadow uppercase tracking-widest text-xs transition mb-4">Print Work Order</button>
                <textarea id="job-summary" class="w-full h-24 bg-white border border-gray-300 rounded p-3 text-[10px] font-mono text-gray-700 outline-none shadow-inner resize-none" readonly></textarea>
            </div>
            
        </div>
    </div>
</div>

<script>
let adminCostEnabled = false;
let backendData = null;
let calcTimeout = null;
let showDims = true;
let showXRay = true;

// --- INDEPENDENT 2D PAN/ZOOM ENGINE ---
const DraftCamera = {
    activeTarget: null, isDragging: false, startX: 0, startY: 0,
    init: function() {
        document.querySelectorAll('.zoom-target').forEach(el => {
            el._scaleZ = 1; el._panX = 0; el._panY = 0;
            el.addEventListener('wheel', e => {
                e.preventDefault();
                const zoomIntensity = 0.1;
                const delta = e.deltaY < 0 ? zoomIntensity : -zoomIntensity;
                el._scaleZ = Math.min(Math.max(0.5, el._scaleZ + delta), 4);
                this.update(el);
            });
            el.addEventListener('mousedown', e => {
                this.isDragging = true; this.activeTarget = el;
                this.startX = e.clientX - el._panX; this.startY = e.clientY - el._panY;
                el.style.cursor = 'grabbing';
            });
        });
    },
    move: function(e) {
        if (!this.isDragging || !this.activeTarget) return;
        this.activeTarget._panX = e.clientX - this.startX;
        this.activeTarget._panY = e.clientY - this.startY;
        this.update(this.activeTarget);
    },
    end: function() {
        if(this.activeTarget) this.activeTarget.style.cursor = 'grab';
        this.isDragging = false; this.activeTarget = null;
    },
    update: function(el) {
        const g = el.querySelector('g');
        if(g) g.style.transform = `translate(${el._panX}px, ${el._panY}px) scale(${el._scaleZ})`;
    }
};

window.addEventListener('mousemove', (e) => DraftCamera.move(e));
window.addEventListener('mouseup', () => DraftCamera.end());

function toggleDimensions() { showDims = !showDims; document.getElementById('btn-toggle-dims').innerText = showDims ? 'Hide Dims' : 'Show Dims'; runCalc(); }
function toggleXRay() { 
    showXRay = !showXRay; 
    document.getElementById('btn-toggle-xray').className = showXRay ? "bg-blue-600 hover:bg-blue-500 text-white border border-blue-500 px-2 py-1 rounded shadow-sm text-[8px] font-black uppercase tracking-widest transition focus:outline-none" : "bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-2 py-1 rounded shadow-sm text-[8px] font-black uppercase tracking-widest transition focus:outline-none"; 
    runCalc(); 
}

function handleFaceChange() {
    const face = document.getElementById('faceThk').value;
    const paintOpt = document.getElementById('paintOpt');
    if (face !== 'ALM_SHT_040') {
        paintOpt.value = 'Custom Paint';
        Array.from(paintOpt.options).forEach(opt => { if (opt.value !== 'Custom Paint') opt.disabled = true; });
    } else {
        Array.from(paintOpt.options).forEach(opt => { opt.disabled = false; });
    }
    runCalc();
}

function handleAdminToggle() {
    const cb = document.getElementById('toggle-cost-view');
    const bg = document.getElementById('toggle-bg');
    const dot = document.getElementById('toggle-dot');
    adminCostEnabled = cb.checked;
    
    if (adminCostEnabled) {
        bg.classList.replace('bg-gray-300', 'bg-red-500');
        dot.style.transform = 'translateX(12px)';
        document.getElementById('admin-ledger-box').classList.remove('hidden');
    } else {
        bg.classList.replace('bg-red-500', 'bg-gray-300');
        dot.style.transform = 'translateX(0)';
        document.getElementById('admin-ledger-box').classList.add('hidden');
    }
    runCalc();
}

function renderAdminCostLedger(costData, metricsData) {
    const fmt = (n) => "$" + (n || 0).toFixed(2);
    document.getElementById('ui-margin').innerText = `${(metricsData.margin * 100).toFixed(1)}% Margin`;
    document.getElementById('ui-cost-total').innerText = fmt(costData.total);

    const DEPT_TITLES = {
        'METAL_MAT': 'Metal Fabrication (Materials)',
        'METAL_LAB': 'Metal Fabrication (Labor)',
        'PAINT_MAT': 'Paint & Finishes (Materials)',
        'PAINT_LAB': 'Paint & Finishes (Labor)',
        'INSTALL_HDW': 'Installation & Hardware'
    };

    const grouped = {};
    costData.breakdown.forEach(i => {
        const cat = i.category || 'GENERAL';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(i);
    });

    let html = '';
    for (const [cat, items] of Object.entries(grouped)) {
        const catTotal = items.reduce((s, i) => s + i.total, 0);
        html += `
        <div class="mb-3 bg-white border border-gray-200 rounded shadow-sm overflow-hidden">
            <div class="bg-gray-100 px-3 py-1.5 border-b border-gray-200 flex justify-between items-center">
                <span class="text-[9px] font-black text-gray-700 uppercase tracking-widest">${DEPT_TITLES[cat] || cat}</span>
                <span class="text-[9px] font-mono font-bold text-gray-500">${fmt(catTotal)}</span>
            </div>
            <div class="p-2 space-y-2">`;
        
        items.forEach(i => {
            const cleanFormula = i.formula.replace(/<[^>]*>?/gm, '');
            html += `
            <div class="border-b border-gray-50 pb-1.5 last:border-0 last:pb-0">
                <div class="flex justify-between items-start">
                    <span class="text-[10px] font-bold text-gray-800">${i.label}</span>
                    <span class="text-[10px] font-mono font-bold text-gray-600">${fmt(i.total)}</span>
                </div>
                <div class="text-[8px] text-gray-500 font-mono italic leading-snug break-words mt-0.5">↳ ${cleanFormula}</div>
            </div>`;
        });
        html += `</div></div>`;
    }
    document.getElementById('ui-cost-groups').innerHTML = html;
}

function renderDrawings(inputs) {
    const cont = document.getElementById('svg-preview-container');
    let savedStates = [];
    document.querySelectorAll('.zoom-target').forEach(t => { savedStates.push({ x: t._panX, y: t._panY, z: t._scaleZ }); });

    const cx = 150, cy = 120; 
    const maxDim = Math.max(inputs.w, inputs.h);
    const scale = 160 / maxDim;
    
    const sw = inputs.w * scale;
    const sh = inputs.h * scale;
    const sd = inputs.d * scale;

    const fillSkin = showXRay ? 'rgba(59, 130, 246, 0.2)' : 'rgba(59, 130, 246, 0.9)';
    const strokeSkin = '#1d4ed8';

    const drawHDim = (x1, x2, y, txt) => showDims ? `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#64748b" stroke-width="1"/><line x1="${x1}" y1="${y-3}" x2="${x1}" y2="${y+3}" stroke="#64748b" stroke-width="1"/><line x1="${x2}" y1="${y-3}" x2="${x2}" y2="${y+3}" stroke="#64748b" stroke-width="1"/><text x="${x1 + (x2-x1)/2}" y="${y-5}" fill="#64748b" font-size="8" font-family="monospace" text-anchor="middle">${txt}</text>` : '';
    const drawVDim = (x, y1, y2, txt) => showDims ? `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#64748b" stroke-width="1"/><line x1="${x-3}" y1="${y1}" x2="${x+3}" y2="${y1}" stroke="#64748b" stroke-width="1"/><line x1="${x-3}" y1="${y2}" x2="${x+3}" y2="${y2}" stroke="#64748b" stroke-width="1"/><text x="${x-5}" y="${y1 + (y2-y1)/2}" fill="#64748b" font-size="8" font-family="monospace" text-anchor="end" dominant-baseline="middle">${txt}</text>` : '';

    let svgFront = `<rect x="${cx - sw/2}" y="${cy - sh/2}" width="${sw}" height="${sh}" fill="${fillSkin}" stroke="${strokeSkin}" stroke-width="1.5" />`;
    let svgSide = `<rect x="${cx - sd/2}" y="${cy - sh/2}" width="${sd}" height="${sh}" fill="${fillSkin}" stroke="${strokeSkin}" stroke-width="1.5" />`;

    if (showXRay) {
        svgFront += `<rect x="${cx - sw/2 + 3}" y="${cy - sh/2 + 3}" width="${sw - 6}" height="${sh - 6}" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" />`;
        svgSide += `<rect x="${cx - sd/2 + 2}" y="${cy - sh/2 + 8}" width="${sd - 4}" height="${sh - 16}" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,3" />`;
    }

    svgFront += drawHDim(cx - sw/2, cx + sw/2, cy + sh/2 + 12, `${inputs.w}" W`);
    svgFront += drawVDim(cx - sw/2 - 12, cy - sh/2, cy + sh/2, `${inputs.h}" H`);
    
    svgSide += drawHDim(cx - sd/2, cx + sd/2, cy + sh/2 + 12, `${inputs.d}" D`);
    svgSide += drawVDim(cx - sd/2 - 12, cy - sh/2, cy + sh/2, `${inputs.h}" H`);

    cont.innerHTML = `
        <div class="flex w-full h-full divide-x divide-slate-800">
            <div class="w-2/3 relative overflow-hidden bg-[radial-gradient(#334155_1px,transparent_1px)] [background-size:16px_16px]">
                <svg class="w-full h-full zoom-target" viewBox="0 0 300 240"><g>${svgFront}</g></svg>
            </div>
            <div class="w-1/3 relative overflow-hidden bg-[radial-gradient(#334155_1px,transparent_1px)] [background-size:16px_16px]">
                <svg class="w-full h-full zoom-target" viewBox="0 0 300 240"><g>${svgSide}</g></svg>
            </div>
        </div>
    `;

    document.querySelectorAll('.zoom-target').forEach((t, i) => {
        if (savedStates[i]) { t._panX = savedStates[i].x; t._panY = savedStates[i].y; t._scaleZ = savedStates[i].z; DraftCamera.update(t); }
    });
    DraftCamera.init();
}

async function runCalc() {
    if(!backendData) return;
    
    clearTimeout(calcTimeout);
    calcTimeout = setTimeout(async () => {
        const inputs = {
            qty: parseFloat(document.getElementById('qty').value) || 1,
            w: parseFloat(document.getElementById('w').value) || 24,
            h: parseFloat(document.getElementById('h').value) || 72,
            d: parseFloat(document.getElementById('d').value) || 12,
            faceSku: document.getElementById('faceThk').value,
            frameSku: document.getElementById('frameMat').value,
            bracketSku: document.getElementById('bracketMat').value,
            paintOption: document.getElementById('paintOpt').value
        };

        const auditMode = adminCostEnabled ? 'full' : 'retail_only';

        try {
            document.getElementById('ui-total').classList.add('opacity-50');
            document.getElementById('ui-unit').classList.add('opacity-50');
            
            const authKey = sessionStorage.getItem('signos_session_token') || SUPABASE_ANON_KEY;
            
            const response = await fetch(`${EDGE_URL}/functions/v1/calculate-pole-cover`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'apikey': SUPABASE_ANON_KEY, 
                    'Authorization': `Bearer ${authKey}` 
                },
                body: JSON.stringify({ inputs: inputs, config: backendData, audit_mode: auditMode })
            });

            if (!response.ok) throw new Error((await response.json()).error || "Server Error");
            
            const result = await response.json();
            window.lastEdgeResult = result; // Cache for printing

            if (!result || !result.retail) return;

            const fmt = (n) => "$" + (n || 0).toFixed(2);
            document.getElementById('ui-unit').innerText = fmt(result.retail.unitPrice);
            document.getElementById('ui-total').innerText = fmt(result.retail.grandTotal);
            
            let lineItemsHtml = `<div class="flex justify-between"><span>${inputs.qty}x Custom Pole Covers</span><span class="font-bold">${fmt(result.retail.grandTotal)}</span></div>`;
            document.getElementById('ui-line-items').innerHTML = lineItemsHtml;

            const faceSelect = document.getElementById('faceThk');
            const faceTxt = faceSelect.options[faceSelect.selectedIndex].text;
            
            let summary = `(x${inputs.qty}) Custom Pole Covers.\nDims: ${inputs.w}"W x ${inputs.h}"H x ${inputs.d}"D.\nSkin: ${faceTxt} (${inputs.paintOption}).\nStructure: Welded Aluminum Ribs & Steel Mounts.`;
            document.getElementById('job-desc').value = summary;

            renderDrawings(inputs);

            if (adminCostEnabled && result.cost) {
                renderAdminCostLedger(result.cost, result.metrics);
            }

        } catch(e) {
            console.error("Calculation Error:", e);
            document.getElementById('job-desc').value = `🚨 CALCULATION HALTED:\n${e.message}`;
            document.getElementById('ui-total').innerText = "ERR";
            document.getElementById('ui-unit').innerText = "ERR";
        } finally {
            document.getElementById('ui-total').classList.remove('opacity-50');
            document.getElementById('ui-unit').classList.remove('opacity-50');
        }
    }, 300);
}

window.addEventListener('load', async () => {
    // Inject the standard single-column header
    if (typeof injectHeader === 'function') injectHeader("Pole Covers");
    
    const role = sessionStorage.getItem('signos_role');
    if (role === 'ADMIN' || role === 'SUPER') {
        document.getElementById('admin-toggle-bar').classList.remove('hidden');
        document.getElementById('admin-toggle-bar').classList.add('flex');
    }

    try {
        const payload = await SignOS.fetchProductData('PROD_Post_Panel'); // Schema placeholder
        if(payload.error) throw new Error(payload.error);
        
        backendData = payload.config;
        runCalc();
    } catch(e) {
        console.error("Initialization Failed:", e);
    }
});
</script>
</body>
</html>
