<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pole Cover | SignOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <script src="signos-export-v2.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<div class="max-w-4xl mx-auto mt-6 w-full px-4 sm:px-0">
    
    <!-- HEADER -->
    <div class="bg-gray-900 text-white p-4 rounded-t-xl flex justify-between items-center shadow-lg relative z-20">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><span class="text-xl">🔲</span></div>
            <div>
                <h1 class="text-sm font-black uppercase tracking-widest text-blue-400">Architectural Drafting</h1>
                <h2 class="text-lg font-bold leading-none">Custom Pole Covers</h2>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <label class="flex items-center gap-2 cursor-pointer group hidden" id="admin-toggle-container">
                <div class="relative">
                    <input type="checkbox" id="admin-toggle" class="sr-only" onchange="handleAdminToggle()">
                    <div id="admin-toggle-bg" class="block bg-gray-300 w-8 h-5 rounded-full transition duration-300"></div>
                    <div id="admin-toggle-dot" class="dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition transform duration-300"></div>
                </div>
                <span class="text-[10px] font-black uppercase tracking-widest text-red-400 group-hover:text-red-300">Admin Cost View</span>
            </label>
            <div class="text-right">
                <div id="status-text" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Connecting...</div>
                <div class="flex items-center gap-1 justify-end mt-1">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-500 animate-pulse"></div>
                    <span class="text-[9px] text-gray-500 font-mono">Twin-Engine Active</span>
                </div>
            </div>
        </div>
    </div>

    <div id="main-card" class="bg-white shadow-xl rounded-b-xl border-x border-b border-gray-200 relative overflow-hidden">

        <!-- 2D ARCHITECTURAL VIEWPORT -->
        <div class="w-full h-[400px] bg-slate-900 border-b border-gray-200 flex flex-col relative overflow-hidden">
            <div class="absolute top-3 left-3 flex flex-col z-20 pointer-events-none">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">2D Architectural Draft</span>
                <span class="text-xs font-bold text-slate-300" id="drafting-scale">Scale: Dynamic Fit</span>
            </div>
            
            <div class="absolute top-3 right-3 flex gap-2 z-20">
                <button onclick="toggleDimensions()" id="btn-toggle-dims" class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">Hide Dimensions</button>
                <button onclick="toggleXRay()" id="btn-toggle-xray" class="bg-blue-600 hover:bg-blue-500 text-white border border-blue-500 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none">X-Ray Frame</button>
            </div>

            <div id="svg-preview-container" class="flex-1 w-full h-full cursor-grab active:cursor-grabbing">
                <!-- SVG Rendered Here -->
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2">
            <!-- LEFT COLUMN: INPUTS -->
            <div class="p-6 border-r border-gray-200 bg-gray-50">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xs font-black text-gray-800 uppercase tracking-widest border-b-2 border-blue-200 pb-1 inline-block">1. Specifications</h3>
                </div>

                <div class="space-y-5">
                    <div class="grid grid-cols-4 gap-3 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Width (in)</label><input type="number" id="w" value="24" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Height (in)</label><input type="number" id="h" value="72" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                        <div class="col-span-1"><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 text-center">Depth (in)</label><input type="number" id="d" value="12" class="w-full border p-2 rounded text-sm font-bold text-center outline-none bg-white focus:border-blue-500 shadow-inner" oninput="runCalc()"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Internal Frame (Aluminum)</label>
                            <select id="frameMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="ALM_ANG_1">1" Alum Angle</option>
                                <option value="ALM_ANG_1.5" selected>1.5" Alum Angle</option>
                                <option value="ALM_ANG_2">2" Alum Angle</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Welded Brackets (Steel)</label>
                            <select id="bracketMat" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="STL_ANG_1.5_18" selected>1.5" Steel Angle</option>
                                <option value="STL_ANG_2_18">2" Steel Angle</option>
                                <option value="STL_ANG_3_14">3" Steel Angle</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Face Material</label>
                            <select id="faceThk" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="handleFaceChange()">
                                <option value="ALM_SHT_040" selected>.040 Aluminum</option>
                                <option value="ALM_SHT_063">.063 Aluminum</option>
                                <option value="ALM_SHT_080">.080 Aluminum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Finish / Paint</label>
                            <select id="paintOpt" class="w-full border border-gray-300 p-2 rounded text-xs font-bold text-gray-700 outline-none bg-white focus:border-blue-500 shadow-sm" onchange="runCalc()">
                                <option value="Factory Pre-Painted">Factory Pre-Painted (White/Black)</option>
                                <option value="Custom Paint">Custom Automotive Paint Match</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: RESULTS & ADMIN LEDGER -->
            <div class="flex flex-col bg-white">
                
                <div id="admin-ledger-box" class="hidden flex-1 overflow-y-auto bg-slate-50 border-b border-gray-200 p-4 relative custom-scroll">
                    <div class="absolute top-0 right-4 w-12 h-1 bg-red-500 rounded-b-md"></div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-black text-gray-800 uppercase tracking-widest flex items-center gap-3">
                            Physics Audit
                            <button onclick="if(typeof SignOS_Export_v2 !== 'undefined' && SignOS_Export_v2.printCostLedger) { SignOS_Export_v2.printCostLedger(window.lastEdgeResult, 'svg-preview-container', 'job-summary'); }" class="bg-red-100 hover:bg-red-200 text-red-700 border border-red-200 px-2 py-1 rounded text-[8px] font-black uppercase tracking-widest transition flex items-center gap-1 shadow-sm">Print Ledger</button>
                        </h3>
                        <span class="text-[9px] font-black text-red-600 uppercase tracking-widest bg-red-100 px-2 py-0.5 rounded shadow-sm border border-red-200" id="ui-metrics-margin">0% Margin</span>
                    </div>
                    <div id="ui-cost-groups" class="space-y-4">
                        <!-- Grouped Cost Ledger injected here -->
                    </div>
                </div>

                <div class="p-6 bg-blue-50/50 shrink-0">
                    <div class="flex justify-between items-end border-b border-blue-200 pb-3 mb-4">
                        <span class="text-xs font-black text-blue-800 uppercase tracking-widest">Total Retail Quote</span>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest block mb-1">Hardware + Labor + Assembly</span>
                            <span class="text-4xl font-black text-blue-700 tracking-tight leading-none" id="ui-total">---</span>
                        </div>
                    </div>
                    
                    <button onclick="if(typeof SignOS_Export_v2 !== 'undefined' && SignOS_Export_v2.printWorkOrder) { SignOS_Export_v2.printWorkOrder(window.lastEdgeResult, 'svg-preview-container', 'job-summary'); }" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded shadow uppercase tracking-widest text-xs transition mb-4">Print Work Order</button>

                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Job Narrative</label>
                    <textarea id="job-summary" class="w-full h-24 bg-white border border-gray-300 rounded p-3 text-[10px] font-mono text-gray-700 outline-none shadow-inner resize-none" readonly></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let adminCostEnabled = false;
let backendData = null;
let calcTimeout = null;
let showDims = true;
let showXRay = true;

// --- INDEPENDENT 2D PAN/ZOOM ENGINE ---
const DraftCamera = {
    activeTarget: null, isDragging: false, startX: 0, startY: 0,
    init: function() {
        document.querySelectorAll('.zoom-target').forEach(el => {
            el._scaleZ = 1; el._panX = 0; el._panY = 0;
            el.addEventListener('wheel', e => {
                e.preventDefault();
                const zoomIntensity = 0.1;
                const delta = e.deltaY < 0 ? zoomIntensity : -zoomIntensity;
                el._scaleZ = Math.min(Math.max(0.5, el._scaleZ + delta), 4);
                this.update(el);
            });
            el.addEventListener('mousedown', e => {
                this.isDragging = true; this.activeTarget = el;
                this.startX = e.clientX - el._panX; this.startY = e.clientY - el._panY;
                el.style.cursor = 'grabbing';
            });
        });
    },
    move: function(e) {
        if (!this.isDragging || !this.activeTarget) return;
        this.activeTarget._panX = e.clientX - this.startX;
        this.activeTarget._panY = e.clientY - this.startY;
        this.update(this.activeTarget);
    },
    end: function() {
        if(this.activeTarget) this.activeTarget.style.cursor = 'grab';
        this.isDragging = false; this.activeTarget = null;
    },
    update: function(el) {
        const g = el.querySelector('g');
        if(g) g.style.transform = `translate(${el._panX}px, ${el._panY}px) scale(${el._scaleZ})`;
    }
};

window.addEventListener('mousemove', (e) => DraftCamera.move(e));
window.addEventListener('mouseup', () => DraftCamera.end());

function toggleDimensions() {
    showDims = !showDims;
    document.getElementById('btn-toggle-dims').innerText = showDims ? 'Hide Dimensions' : 'Show Dimensions';
    runCalc();
}

function toggleXRay() {
    showXRay = !showXRay;
    document.getElementById('btn-toggle-xray').className = showXRay ? "bg-blue-600 hover:bg-blue-500 text-white border border-blue-500 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none" : "bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-3 py-1.5 rounded shadow-sm text-[9px] font-black uppercase tracking-widest transition focus:outline-none";
    runCalc();
}

function handleFaceChange() {
    const face = document.getElementById('faceThk').value;
    const paintOpt = document.getElementById('paintOpt');
    if (face !== 'ALM_SHT_040') {
        paintOpt.value = 'Custom Paint';
        Array.from(paintOpt.options).forEach(opt => { if (opt.value !== 'Custom Paint') opt.disabled = true; });
    } else {
        Array.from(paintOpt.options).forEach(opt => { opt.disabled = false; });
    }
    runCalc();
}

function handleAdminToggle() {
    adminCostEnabled = document.getElementById('admin-toggle').checked;
    const bg = document.getElementById('admin-toggle-bg');
    const dot = document.getElementById('admin-toggle-dot');
    const ledger = document.getElementById('admin-ledger-box');

    if (adminCostEnabled) {
        bg.classList.replace('bg-gray-300', 'bg-red-500');
        dot.style.transform = 'translateX(12px)';
        ledger.classList.remove('hidden');
    } else {
        bg.classList.replace('bg-red-500', 'bg-gray-300');
        dot.style.transform = 'translateX(0)';
        ledger.classList.add('hidden');
    }
    runCalc();
}

function renderAdminCostLedger(costData, metricsData) {
    const fmt = (n) => "$" + (n || 0).toFixed(2);
    document.getElementById('ui-metrics-margin').innerText = `${(metricsData.margin * 100).toFixed(1)}% Margin`;

    const DEPT_TITLES = {
        'METAL_MAT': 'Metal Fabrication (Materials)',
        'METAL_LAB': 'Metal Fabrication (Labor)',
        'PAINT_MAT': 'Paint & Finishes (Materials)',
        'PAINT_LAB': 'Paint & Finishes (Labor)',
        'INSTALL_HDW': 'Installation & Hardware'
    };

    const grouped = {};
    let grandTime = 0;
    costData.breakdown.forEach(i => {
        const cat = i.category || 'GENERAL';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(i);
        if (i.meta?.time) grandTime += i.meta.time;
    });

    let html = '';
    for (const [cat, items] of Object.entries(grouped)) {
        const catTotal = items.reduce((s, i) => s + i.total, 0);
        html += `
        <div class="mb-4 bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
            <div class="bg-gray-100 px-3 py-2 border-b border-gray-200 flex justify-between items-center">
                <span class="text-[10px] font-black text-gray-700 uppercase tracking-widest">${DEPT_TITLES[cat] || cat}</span>
                <span class="text-[10px] font-mono font-bold text-gray-500">${fmt(catTotal)}</span>
            </div>
            <div class="p-3 space-y-2">`;
        
        items.forEach(i => {
            const cleanFormula = i.formula.replace(/<[^>]*>?/gm, '');
            const timeTag = i.meta?.time ? `<span class="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-widest ml-2">${(i.meta.time/60).toFixed(1)} Hrs</span>` : '';
            
            html += `
            <div class="border-b border-gray-50 pb-2 last:border-0 last:pb-0">
                <div class="flex justify-between items-start">
                    <span class="text-[10px] font-bold text-gray-800">${i.label}${timeTag}</span>
                    <span class="text-[10px] font-mono font-bold text-gray-600">${fmt(i.total)}</span>
                </div>
                <div class="text-[8px] text-gray-500 font-mono italic leading-snug break-words mt-0.5">↳ ${cleanFormula}</div>
            </div>`;
        });
        html += `</div></div>`;
    }
    document.getElementById('ui-cost-groups').innerHTML = html;
}

function renderDrawings(inputs) {
    const cont = document.getElementById('svg-preview-container');
    
    // Save camera states if they exist
    let savedStates = [];
    document.querySelectorAll('.zoom-target').forEach(t => {
        savedStates.push({ x: t._panX, y: t._panY, z: t._scaleZ });
    });

    const cx = 200, cy = 200;
    const maxDim = Math.max(inputs.w, inputs.h);
    const scale = 250 / maxDim;
    
    const sw = inputs.w * scale;
    const sh = inputs.h * scale;
    const sd = inputs.d * scale;

    const fillSkin = showXRay ? 'rgba(59, 130, 246, 0.2)' : 'rgba(59, 130, 246, 0.9)';
    const strokeSkin = '#1d4ed8';

    const drawHDim = (x1, x2, y, txt) => showDims ? `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#64748b" stroke-width="1"/><line x1="${x1}" y1="${y-4}" x2="${x1}" y2="${y+4}" stroke="#64748b" stroke-width="1"/><line x1="${x2}" y1="${y-4}" x2="${x2}" y2="${y+4}" stroke="#64748b" stroke-width="1"/><text x="${x1 + (x2-x1)/2}" y="${y-6}" fill="#64748b" font-size="10" font-family="monospace" text-anchor="middle">${txt}</text>` : '';
    const drawVDim = (x, y1, y2, txt) => showDims ? `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#64748b" stroke-width="1"/><line x1="${x-4}" y1="${y1}" x2="${x+4}" y2="${y1}" stroke="#64748b" stroke-width="1"/><line x1="${x-4}" y1="${y2}" x2="${x+4}" y2="${y2}" stroke="#64748b" stroke-width="1"/><text x="${x-6}" y="${y1 + (y2-y1)/2}" fill="#64748b" font-size="10" font-family="monospace" text-anchor="end" dominant-baseline="middle">${txt}</text>` : '';

    let svgFront = `<rect x="${cx - sw/2}" y="${cy - sh/2}" width="${sw}" height="${sh}" fill="${fillSkin}" stroke="${strokeSkin}" stroke-width="1.5" />`;
    let svgSide = `<rect x="${cx - sd/2}" y="${cy - sh/2}" width="${sd}" height="${sh}" fill="${fillSkin}" stroke="${strokeSkin}" stroke-width="1.5" />`;

    if (showXRay) {
        // Front Internal Frame
        svgFront += `<rect x="${cx - sw/2 + 4}" y="${cy - sh/2 + 4}" width="${sw - 8}" height="${sh - 8}" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />`;
        // Side Brackets
        svgSide += `<rect x="${cx - sd/2 + 2}" y="${cy - sh/2 + 10}" width="${sd - 4}" height="${sh - 20}" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />`;
    }

    svgFront += drawHDim(cx - sw/2, cx + sw/2, cy + sh/2 + 15, `${inputs.w}" W`);
    svgFront += drawVDim(cx - sw/2 - 15, cy - sh/2, cy + sh/2, `${inputs.h}" H`);
    
    svgSide += drawHDim(cx - sd/2, cx + sd/2, cy + sh/2 + 15, `${inputs.d}" D`);
    svgSide += drawVDim(cx - sd/2 - 15, cy - sh/2, cy + sh/2, `${inputs.h}" H`);

    cont.innerHTML = `
        <div class="flex w-full h-full divide-x divide-slate-800">
            <div class="flex-1 relative overflow-hidden bg-[radial-gradient(#334155_1px,transparent_1px)] [background-size:20px_20px]">
                <span class="absolute top-2 right-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Front Elevation</span>
                <svg class="w-full h-full zoom-target" data-width-in="${inputs.w}" data-height-in="${inputs.h}" viewBox="0 0 400 400"><g>${svgFront}</g></svg>
            </div>
            <div class="w-1/3 relative overflow-hidden bg-[radial-gradient(#334155_1px,transparent_1px)] [background-size:20px_20px]">
                <span class="absolute top-2 right-2 text-[9px] font-black text-slate-500 uppercase tracking-widest">Side Profile</span>
                <svg class="w-full h-full zoom-target" viewBox="0 0 400 400"><g>${svgSide}</g></svg>
            </div>
        </div>
    `;

    document.querySelectorAll('.zoom-target').forEach((t, i) => {
        if (savedStates[i]) { t._panX = savedStates[i].x; t._panY = savedStates[i].y; t._scaleZ = savedStates[i].z; DraftCamera.update(t); }
    });
    DraftCamera.init();
}

async function runCalc() {
    if(!backendData) return;
    
    clearTimeout(calcTimeout);
    calcTimeout = setTimeout(async () => {
        const inputs = {
            qty: parseFloat(document.getElementById('qty').value) || 1,
            w: parseFloat(document.getElementById('w').value) || 24,
            h: parseFloat(document.getElementById('h').value) || 72,
            d: parseFloat(document.getElementById('d').value) || 12,
            faceSku: document.getElementById('faceThk').value,
            frameSku: document.getElementById('frameMat').value,
            bracketSku: document.getElementById('bracketMat').value,
            paintOption: document.getElementById('paintOpt').value
        };

        const auditMode = adminCostEnabled ? 'full' : 'retail_only';

        try {
            document.getElementById('ui-total').classList.add('opacity-50');
            
            const response = await fetch(`${EDGE_URL}/functions/v1/calculate-pole-cover`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                body: JSON.stringify({ inputs: inputs, config: backendData, audit_mode: auditMode })
            });

            if (!response.ok) throw new Error((await response.json()).error || "Server Error");
            
            const result = await response.json();
            window.lastEdgeResult = result; // Cache for printing

            if (!result || !result.retail) return;

            document.getElementById('ui-total').innerText = "$" + (result.retail.grandTotal || 0).toFixed(2);
            
            const faceSelect = document.getElementById('faceThk');
            const faceTxt = faceSelect.options[faceSelect.selectedIndex].text;
            
            let summary = `(x${inputs.qty}) Aluminum Pole Covers.\nDimensions: ${inputs.w}" W x ${inputs.h}" H x ${inputs.d}" D.\nSkin: ${faceTxt} (${inputs.paintOption}).\nStructure: Internal Welded Aluminum Ribs with Steel Mounting Brackets.\nAssembly: Countersunk Fasteners + Adhesion.`;
            document.getElementById('job-summary').value = summary;

            renderDrawings(inputs);

            if (adminCostEnabled && result.cost) {
                renderAdminCostLedger(result.cost, result.metrics);
            }

        } catch(e) {
            console.error("Calculation Error:", e);
            document.getElementById('job-summary').value = `🚨 CALCULATION HALTED:\n${e.message}`;
            document.getElementById('ui-total').innerText = "ERR";
        } finally {
            document.getElementById('ui-total').classList.remove('opacity-50');
        }
    }, 300);
}

window.addEventListener('load', async () => {
    if (typeof injectHeader === 'function') injectHeader("Pole Covers");
    
    const role = sessionStorage.getItem('signos_role');
    if (role === 'ADMIN' || role === 'SUPER') {
        const adminBar = document.getElementById('admin-toggle-container');
        if (adminBar) adminBar.classList.remove('hidden');
    }

    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");

    try {
        const payload = await SignOS.fetchProductData('PROD_Post_Panel'); // Using Post Panel schema placeholder
        if(payload.error) throw new Error(payload.error);
        
        backendData = payload.config;

        if(statusText) {
            statusText.innerText = "ONLINE";
            statusText.className = "text-xs font-bold text-green-400 uppercase tracking-widest";
        }
        if(statusDot) {
            statusDot.className = "w-2 h-2 rounded-full bg-green-500";
            statusDot.classList.remove("animate-pulse");
        }
        
        runCalc();

    } catch(e) {
        console.error("Initialization Failed:", e);
        if(statusText) {
            statusText.innerText = "OFFLINE";
            statusText.className = "text-xs font-bold text-red-500 uppercase tracking-widest";
        }
    }
});
</script>
</body>
</html>
