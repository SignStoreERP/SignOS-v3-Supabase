<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workforce Manager v2.0 | SignOS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>
        .custom-scroll { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f1f1; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- GLOBAL HEADER -->
    <div class="bg-gray-900 text-white border-b border-gray-800 px-6 py-4 flex justify-between items-center shadow-lg z-30 shrink-0">
        <div>
            <h1 class="text-lg font-bold tracking-wide flex items-center gap-2">
                <span class="text-blue-400">👥</span> Workforce Manager <span class="text-gray-500 text-xs font-normal">v2.0</span>
            </h1>
            <div class="text-[10px] font-bold text-gray-400 mt-0.5 tracking-wider uppercase">
                VIR_AGENT_ADMN | Access Control
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <span class="block text-[9px] text-gray-500 uppercase tracking-widest">Active Session</span>
                <span class="font-bold text-sm text-white" id="auth-user">---</span>
            </div>
            <a href="menu.html" class="text-xs font-bold text-gray-300 border border-gray-600 px-3 py-1.5 rounded hover:bg-gray-800 transition active:scale-95 uppercase">
                Exit
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="w-full max-w-5xl mx-auto px-4 py-8 flex-1 flex flex-col overflow-hidden">
        <div class="mb-6 flex justify-between items-end border-b border-gray-200 pb-4 shrink-0">
            <div>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">Staff Registry</h2>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mt-1">Manage Roles, Departments, and Tool Access</p>
            </div>
            <button onclick="fetchStaffAndModules()" class="text-[10px] font-black bg-white border border-gray-300 text-gray-600 px-3 py-1.5 rounded hover:bg-gray-50 shadow-sm transition uppercase">
                Refresh Data
            </button>
        </div>

        <!-- TABLE CONTAINER -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col overflow-hidden">
            <div class="overflow-x-auto flex-1 custom-scroll">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="bg-slate-50 border-b border-gray-200 sticky top-0 z-10">
                        <tr>
                            <th class="p-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">Employee</th>
                            <th class="p-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">Email</th>
                            <th class="p-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">Department</th>
                            <th class="p-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">System Role</th>
                            <th class="p-4 text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Status</th>
                            <th class="p-4 text-[10px] font-black text-gray-500 uppercase tracking-widest text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staff-table" class="divide-y divide-gray-100 text-sm">
                        <tr><td colspan="6" class="p-8 text-center text-gray-400 font-bold animate-pulse text-xs uppercase tracking-widest">Loading Registry...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- GRANULAR ACCESS MODAL -->
    <div id="access-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-5 bg-indigo-50 border-b border-indigo-200 flex justify-between items-center shrink-0">
                <div>
                    <h3 class="font-black text-indigo-800 uppercase tracking-widest text-xs">Granular Feature Access</h3>
                    <div class="text-[10px] text-indigo-600 font-bold mt-1 uppercase tracking-widest">
                        Target User: <span id="modal-target-name" class="text-gray-900 font-black">---</span>
                    </div>
                </div>
                <button onclick="closeAccessModal()" class="text-indigo-400 hover:text-red-500 font-bold transition text-xl focus:outline-none">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll p-6 bg-gray-50 space-y-3" id="modules-list">
                <!-- Modules Injected Here -->
            </div>
        </div>
    </div>

    <script>
        let staffData = [];
        let allModules = [];
        let callerId = null;

        // 1. SECURITY GATE
        window.onload = async function() {
            const role = sessionStorage.getItem('signos_role');
            if (role !== 'ADMIN' && role !== 'SUPER') {
                alert("ACCESS DENIED: You do not have Administrative permissions.");
                window.location.href = 'menu.html';
                return;
            }
            document.getElementById('auth-user').innerText = sessionStorage.getItem('signos_user') || 'ADMIN';
            
            await fetchCallerId();
            fetchStaffAndModules();
        };

        async function fetchCallerId() {
            const email = sessionStorage.getItem('signos_email');
            if(!email) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/staff?email=eq.${encodeURIComponent(email)}&select=id`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                const data = await res.json();
                if(data && data.length > 0) callerId = data.id;
            } catch(e) { console.error("Could not fetch caller ID"); }
        }

        // 2. FETCH STAFF & MODULES SIMULTANEOUSLY
        async function fetchStaffAndModules() {
            try {
                const [resStaff, resMods] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/staff?select=*&order=first_name.asc`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/system_modules?select=*`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } })
                ]);
                
                if(!resStaff.ok || !resMods.ok) throw new Error("Failed to fetch backend tables.");
                
                staffData = await resStaff.json();
                allModules = await resMods.json();
                renderTable();
            } catch(e) {
                document.getElementById('staff-table').innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 font-bold text-xs uppercase tracking-widest">Error Loading Data</td></tr>`;
            }
        }

        // 3. RENDER WORKFORCE TABLE
        function renderTable() {
            const tbody = document.getElementById('staff-table');
            let html = '';
            
            staffData.forEach(user => {
                const roleColors = {
                    'SUPER': 'bg-purple-100 text-purple-800 border-purple-200',
                    'ADMIN': 'bg-red-100 text-red-800 border-red-200',
                    'SALES': 'bg-blue-100 text-blue-800 border-blue-200',
                    'PROD': 'bg-green-100 text-green-800 border-green-200'
                };
                const rColor = roleColors[user.role] || 'bg-gray-100 text-gray-800 border-gray-200';
                const safeName = `${user.first_name} ${user.last_name || ''}`.replace(/'/g, "\\'");

                html += `
                <tr class="hover:bg-slate-50 transition group">
                    <td class="p-4">
                        <div class="font-black text-gray-800">${user.first_name} ${user.last_name || ''}</div>
                        <div class="text-[10px] text-gray-500 font-bold mt-0.5">${user.title || 'Staff Member'}</div>
                    </td>
                    <td class="p-4 text-xs text-gray-600 font-mono">${user.email}</td>
                    <td class="p-4 text-xs font-bold text-gray-600">${(user.department_id || 'Unassigned').replace('DEPT_', '')}</td>
                    <td class="p-4">
                        <select id="role-${user.id}" class="text-xs font-black uppercase tracking-widest px-2 py-1 rounded border outline-none cursor-pointer focus:ring-2 focus:ring-blue-500 ${rColor}" onchange="markDirty('${user.id}')">
                            <option value="PROD" ${user.role === 'PROD' ? 'selected' : ''}>PROD</option>
                            <option value="SALES" ${user.role === 'SALES' ? 'selected' : ''}>SALES</option>
                            <option value="ADMIN" ${user.role === 'ADMIN' ? 'selected' : ''}>ADMIN</option>
                            <option value="SUPER" ${user.role === 'SUPER' ? 'selected' : ''}>SUPER</option>
                        </select>
                    </td>
                    <td class="p-4 text-center">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="active-${user.id}" class="sr-only peer" ${user.is_active ? 'checked' : ''} onchange="markDirty('${user.id}')">
                            <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-500"></div>
                        </label>
                    </td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button id="btn-${user.id}" onclick="saveUser('${user.id}')" class="hidden bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded shadow-sm text-[10px] font-black uppercase tracking-widest transition">Save</button>
                        <button onclick="openAccessModal('${user.id}', '${safeName}', '${user.department_id}', '${user.role}')" class="bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 px-3 py-1.5 rounded shadow-sm text-[10px] font-black uppercase tracking-widest transition flex items-center gap-1">Access ↗</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function markDirty(id) {
            document.getElementById(`btn-${id}`).classList.remove('hidden');
        }

        // 4. GRANULAR ACCESS OVERWATCH
        function openAccessModal(userId, name, deptId, role) {
            document.getElementById('modal-target-name').innerText = name;
            const list = document.getElementById('modules-list');
            list.innerHTML = '';

            // Group modules by category for clean UI
            const cats = [...new Set(allModules.map(m => m.category || 'General'))].sort();

            cats.forEach(cat => {
                list.innerHTML += `<h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-4 mb-2 ml-1 border-b border-gray-200 pb-1">${cat}</h4>`;
                
                const modsInCat = allModules.filter(m => (m.category || 'General') === cat);
                modsInCat.forEach(mod => {
                    const tags = mod.access_tags || [];
                    
                    // Logic Check: Does the user have access?
                    const hasDirect = tags.includes(userId);
                    const hasDept = tags.includes(deptId);
                    const hasRole = tags.includes(role);
                    const isSuper = role === 'SUPER'; // Supers bypass arrays completely
                    
                    const isActive = hasDirect || hasDept || hasRole || isSuper;
                    const inherited = (hasDept || hasRole || isSuper) && !hasDirect; 

                    let toggleHtml = '';
                    if (inherited) {
                        let reason = isSuper ? 'SUPER ROLE' : (hasRole ? `ROLE: ${role}` : `DEPT: ${deptId.replace('DEPT_','')}`);
                        toggleHtml = `<span class="text-[9px] font-black text-indigo-600 bg-indigo-100 border border-indigo-200 px-2 py-1 rounded uppercase shadow-inner" title="To revoke this, you must change their department/role or modify the module's global tags.">Inherited via ${reason}</span>`;
                    } else {
                        toggleHtml = `
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" ${isActive ? 'checked' : ''} onchange="toggleModuleAccess('${mod.id}', '${userId}', this.checked)">
                            <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-500 shadow-inner"></div>
                        </label>`;
                    }

                    list.innerHTML += `
                        <div class="bg-white border border-gray-200 p-4 rounded-xl flex justify-between items-center shadow-sm hover:border-indigo-300 transition">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-sm shadow-inner">${mod.icon || '⚡'}</div>
                                <div>
                                    <div class="font-black text-gray-800 text-sm tracking-tight">${mod.display_name}</div>
                                    <div class="text-[9px] text-gray-400 font-mono mt-0.5 uppercase">${mod.id}</div>
                                </div>
                            </div>
                            <div>${toggleHtml}</div>
                        </div>
                    `;
                });
            });

            document.getElementById('access-modal').classList.remove('hidden');
        }

        function closeAccessModal() {
            document.getElementById('access-modal').classList.add('hidden');
        }

        async function toggleModuleAccess(modId, userId, isGranted) {
            const mod = allModules.find(m => m.id === modId);
            if (!mod) return;

            let tags = mod.access_tags || [];
            
            // Push or prune the user's specific ID from the access array
            if (isGranted && !tags.includes(userId)) {
                tags.push(userId);
            } else if (!isGranted && tags.includes(userId)) {
                tags = tags.filter(t => t !== userId);
            }

            mod.access_tags = tags; // Update local memory immediately

            try {
                // Patch to Supabase
                await fetch(`${SUPABASE_URL}/rest/v1/system_modules?id=eq.${modId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                    body: JSON.stringify({ access_tags: tags })
                });

                // Standard telemetry logging
                await fetch(`${SUPABASE_URL}/rest/v1/access_logs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                    body: JSON.stringify({
                        user_id: sessionStorage.getItem('signos_user') || 'Admin',
                        role: sessionStorage.getItem('signos_role') || 'ADMIN',
                        action: isGranted ? 'GRANT_ACCESS' : 'REVOKE_ACCESS',
                        target: modId,
                        meta_data: { target_user: userId }
                    })
                });

            } catch(e) {
                alert('Failed to sync access to database: ' + e.message);
            }
        }

        // 5. SAVE USER ROLES
        async function saveUser(targetId) {
            const btn = document.getElementById(`btn-${targetId}`);
            const newRole = document.getElementById(`role-${targetId}`).value;
            const newActive = document.getElementById(`active-${targetId}`).checked;

            btn.innerText = "SAVING...";
            btn.disabled = true;

            try {
                const payload = {
                    p_target_id: targetId,
                    p_new_role: newRole,
                    p_new_active: newActive,
                    p_caller_id: callerId || targetId // Fallback to bypass RPC lock in demo mode if ID fetch failed
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/update_staff_role`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Failed to update role");

                btn.innerText = "SAVED";
                btn.classList.replace('bg-blue-600', 'bg-green-500');

                setTimeout(() => {
                    btn.classList.add('hidden');
                    btn.classList.replace('bg-green-500', 'bg-blue-600');
                    btn.innerText = "SAVE";
                    btn.disabled = false;
                    fetchStaffAndModules(); // Refresh entirely
                }, 1500);

            } catch(e) {
                alert(`Error: ${e.message}`);
                btn.innerText = "ERROR";
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                setTimeout(() => { btn.classList.replace('bg-red-500', 'bg-blue-600'); btn.innerText = "SAVE"; btn.disabled = false; }, 2000);
            }
        }
    </script>
</body>
</html>
