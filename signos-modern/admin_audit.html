<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Price Auditor v3.0 | SignOS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col p-4 md:p-8">

    <!-- MAIN ISLAND -->
    <div class="max-w-7xl mx-auto w-full bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200 flex flex-col">
        
        <!-- HEADER -->
        <div class="bg-gray-900 px-6 py-4 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-lg font-black uppercase tracking-widest text-blue-400 flex items-center gap-2">
                    📊 Retail Price Auditor <span class="text-xs text-gray-500">v3.0</span>
                </h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Automated Edge Function vs. Legacy Blue Sheet Validation</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportCSV()" id="btn-export" class="hidden bg-emerald-600 hover:bg-emerald-500 text-white font-black px-4 py-2 rounded text-[10px] uppercase tracking-widest transition shadow border border-emerald-400">
                    Export CSV
                </button>
                <a href="menu.html" class="text-[10px] font-black text-gray-300 border border-gray-600 px-4 py-2 rounded hover:bg-gray-800 transition uppercase tracking-widest">Exit to Menu</a>
            </div>
        </div>

        <!-- CONTROLS & SUMMARY -->
        <div class="p-6 bg-slate-50 border-b border-gray-200 flex flex-col gap-4 shrink-0">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">1. Comparison Source</label>
                    <select id="audit-source" onchange="updateProductDropdown()" class="w-full border border-gray-300 p-2.5 rounded font-bold text-gray-700 outline-none focus:border-blue-500 shadow-sm bg-white">
                        <option value="ALL">All Available Records</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">2. Target Product Line</label>
                    <select id="audit-product" class="w-full border border-gray-300 p-2.5 rounded font-bold text-gray-700 outline-none focus:border-blue-500 shadow-sm bg-white">
                        <option value="ALL">All Products</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">3. Hardware Testing</label>
                    <select id="audit-hardware" class="w-full border border-gray-300 p-2.5 rounded font-bold text-gray-700 outline-none focus:border-blue-500 shadow-sm bg-white">
                        <option value="none">Standard (No Hardware)</option>
                        <option value="stakes">Audit With & Without H-Stakes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">4. Volume Matrix</label>
                    <select id="audit-volume" class="w-full border border-gray-300 p-2.5 rounded font-bold text-gray-700 outline-none focus:border-blue-500 shadow-sm bg-white">
                        <option value="single">Single Unit (Qty 1)</option>
                        <option value="volume">Test Volume Discounts (Qty 1 & 10)</option>
                    </select>
                </div>
            </div>
            
            <div class="flex justify-end pt-2">
                <button onclick="runGlobalAudit()" id="btn-run" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-6 py-3 rounded shadow-md text-xs uppercase tracking-widest transition flex items-center justify-center gap-2 w-48">
                    <span id="btn-text">Execute Audit</span>
                    <div id="loader" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </div>
        </div>

        <!-- RESULTS TABLE -->
        <div class="flex-1 overflow-x-auto custom-scroll relative min-h-[500px] bg-white">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead class="bg-white sticky top-0 z-10 shadow-sm text-[10px] font-black text-gray-500 uppercase tracking-widest">
                    <tr>
                        <th class="p-4 border-b border-gray-200">Category</th>
                        <th class="p-4 border-b border-gray-200">Product Line</th>
                        <th class="p-4 border-b border-gray-200">Dimensions</th>
                        <th class="p-4 border-b border-gray-200">Sides</th>
                        <th class="p-4 border-b border-gray-200 text-center">Test Qty</th>
                        <th class="p-4 border-b border-gray-200 text-right">Legacy Total</th>
                        <th class="p-4 border-b border-gray-200 text-right text-blue-600">Live Cloud Total</th>
                        <th class="p-4 border-b border-gray-200 text-right">Variance ($)</th>
                        <th class="p-4 border-b border-gray-200 text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="audit-table" class="divide-y divide-gray-100 text-xs font-medium">
                    <tr>
                        <td colspan="9" class="p-12 text-center text-gray-400 font-bold uppercase tracking-widest border-dashed border-2 border-gray-200 m-4">
                            System Ready. Select a source and click Execute Audit.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let globalHistory = [];
        let auditResults = [];

        // Security Gate & Initialization
        window.onload = async () => {
            const role = sessionStorage.getItem('signos_role');
            if (role !== 'ADMIN' && role !== 'SUPER') {
                alert("ACCESS DENIED: Restricted to Administrators.");
                window.location.href = 'menu.html';
                return;
            }
            await loadSources();
        };

        async function loadSources() {
            try {
                // Fetch ALL historical records so we can dynamically filter the dropdowns
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ref_retail_history?select=*&order=category.asc,product_line.asc`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                
                if (!res.ok) throw new Error("Failed to load sources");
                globalHistory = await res.json();

                const uniqueSources = [...new Set(globalHistory.map(item => item.source_document))].filter(Boolean);
                const sel = document.getElementById('audit-source');
                
                uniqueSources.forEach(src => {
                    sel.innerHTML += `<option value="${src}">${src}</option>`;
                });

                updateProductDropdown();

            } catch(e) {
                console.error("Error loading sources:", e);
            }
        }

        function updateProductDropdown() {
            const sourceDoc = document.getElementById('audit-source').value;
            let filteredData = sourceDoc === 'ALL' ? globalHistory : globalHistory.filter(i => i.source_document === sourceDoc);
            
            const uniqueProducts = [...new Set(filteredData.map(item => item.product_line))].filter(Boolean).sort();
            
            const prodSel = document.getElementById('audit-product');
            prodSel.innerHTML = '<option value="ALL">All Products</option>';
            uniqueProducts.forEach(p => {
                prodSel.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }

        async function runGlobalAudit() {
            const btn = document.getElementById('btn-run');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const tbody = document.getElementById('audit-table');
            const btnExport = document.getElementById('btn-export');
            
            const sourceDoc = document.getElementById('audit-source').value;
            const targetProd = document.getElementById('audit-product').value;
            const testStakes = document.getElementById('audit-hardware').value === 'stakes';
            const testVolume = document.getElementById('audit-volume').value === 'volume';

            btn.disabled = true;
            btnText.innerText = "Auditing...";
            loader.classList.remove('hidden');
            btnExport.classList.add('hidden');
            auditResults = [];
            
            tbody.innerHTML = `<tr><td colspan="9" class="p-8 text-center text-blue-500 font-bold animate-pulse uppercase tracking-widest">Running Simulation Matrix...</td></tr>`;

            try {
                // 1. Filter Data Based on User Selection
                let auditData = globalHistory;
                if (sourceDoc !== 'ALL') auditData = auditData.filter(i => i.source_document === sourceDoc);
                if (targetProd !== 'ALL') auditData = auditData.filter(i => i.product_line === targetProd);

                if (auditData.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="9" class="p-8 text-center text-gray-400 font-bold uppercase tracking-widest">No matching records found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';

                // Universal Base Payload preventing Edge Function undefined crashes
                const baseInputs = {
                    shape: 'Rectangle', mountStyle: 'Flush', faceMat: '063 Alum',
                    panels: [{ id: 1, w: 48, h: 24, mountStyle: 'Flush', faceMat: '063 Alum', sides: 1, gap: 0 }],
                    postType: 'Aluminum', postSize: '2', frameMat: 'AlumTube_2_1/8',
                    belowGrade: 36, topOffset: 0, thag: 60, color: 'White'
                };

                // 2. Execute Loop
                for (let item of auditData) {
                    
                    // Route to the correct physics engine
                    let endpoint = '';
                    let pLine = (item.product_line || '').toLowerCase();
                    if (pLine.includes('banner')) endpoint = 'calculate-banner';
                    else if (pLine.includes('foam')) endpoint = 'calculate-foam';
                    else if (pLine.includes('acm')) endpoint = 'calculate-acm';
                    else if (pLine.includes('pvc')) endpoint = 'calculate-pvc';
                    else if (pLine.includes('coro') || pLine.includes('yard')) endpoint = 'calculate-coro';
                    
                    if (!endpoint) continue;

                    // Smart Dimensional Parsing
                    let w = 24, h = 24;
                    if (item.dimensions && item.dimensions.includes('x')) {
                        let parts = item.dimensions.toLowerCase().split('x');
                        let multiplier = (item.category === 'Roll') ? 12 : 1;
                        w = parseFloat(parts) * multiplier;
                        h = parseFloat(parts[4]) * multiplier;
                    }

                    let sides = (item.sides === 'Double' || item.sides === '2') ? 2 : 1;

                    // SMART EXTRACTION: Pull specific variables out of the product line text
                    let extThickness = '4mm'; // Safe default
                    if (pLine.includes('10mm')) extThickness = '10mm';
                    else if (pLine.includes('6mm')) extThickness = '6mm';
                    else if (pLine.includes('3mm')) extThickness = '3mm';
                    else if (pLine.includes('1/4')) extThickness = '0.25';
                    else if (pLine.includes('1/2')) extThickness = '0.5';
                    else if (pLine.includes('3/4')) extThickness = '0.75';
                    else if (pLine.includes('1"')) extThickness = '1';

                    let extMaterial = '13oz';
                    if (pLine.includes('15oz')) extMaterial = '15oz';
                    else if (pLine.includes('18oz')) extMaterial = '18oz';
                    else if (pLine.includes('mesh')) extMaterial = 'Mesh';
                    
                    // 3. Dynamic Permutation Generation
                    let permutations = [ { hasStakes: false, hardwareName: '', legacyAdd: 0 } ];
                    
                    if (testStakes && (pLine.includes('coro') || pLine.includes('yard'))) {
                        permutations.push({ hasStakes: true, hardwareName: ' w/ H-Stakes', legacyAdd: 2.00 }); 
                    }

                    // 4. Quantity Matrix Loop
                    let qtyPermutations = testVolume ? [4, 5] : [4];

                    for (let q of qtyPermutations) {
                        for (let perm of permutations) {
                            
                            // Apply the extracted physics payload
                            const payload = {
                                inputs: { 
                                    ...baseInputs, 
                                    w: w, 
                                    h: h, 
                                    sides: sides, 
                                    qty: q, 
                                    hasStakes: perm.hasStakes,
                                    thickness: extThickness,
                                    material: extMaterial
                                },
                                config: {}
                            };

                            const response = await fetch(`${EDGE_URL}/functions/v1/${endpoint}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                                body: JSON.stringify(payload)
                            });

                            if (!response.ok) {
                                console.error(`Failed ${endpoint} for ${item.product_line}`);
                                continue;
                            }

                            const result = await response.json();
                            if (!result || !result.retail) continue;

                            let livePriceTotal = result.retail.grandTotal;
                            
                            if (perm.hasStakes && endpoint === 'calculate-coro') {
                                livePriceTotal += (2.00 * q);
                            }

                            // Calculate Legacy Expectations
                            let baseLegacyUnit = item.legacy_price + perm.legacyAdd;
                            if (q >= 10) {
                                // Assume standard Tier 1 5% discount for bulk
                                baseLegacyUnit = baseLegacyUnit * 0.95;
                            }
                            const expectedTotal = baseLegacyUnit * q;
                            const variance = livePriceTotal - expectedTotal;
                            
                            const displayProduct = item.product_line + perm.hardwareName;

                            // Formatting rendering variables
                            let varianceColor = 'text-green-500';
                            let varianceText = Math.abs(variance) < 0.05 ? 'MATCH' : (variance > 0 ? `+$${variance.toFixed(2)}` : `-$${Math.abs(variance).toFixed(2)}`);

                            if (variance > 0.05) varianceColor = 'text-blue-500'; 
                            if (variance < -0.05) varianceColor = 'text-red-500';  

                            let badge = `<span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">ERR</span>`;
                            if (Math.abs(variance) < 0.05) badge = `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">EXACT</span>`;
                            else if (Math.abs(variance) < 2) badge = `<span class="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">MINOR</span>`;
                            else if (Math.abs(variance) >= 2) badge = `<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">DRIFT</span>`;

                            auditResults.push({
                                category: item.category,
                                product: displayProduct,
                                dimensions: item.dimensions,
                                sides: item.sides,
                                qty: q,
                                legacy: expectedTotal,
                                live: livePriceTotal,
                                variance: variance
                            });

                            tbody.innerHTML += `
                                <tr class="hover:bg-gray-50 transition">
                                    <td class="p-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">${item.category}</td>
                                    <td class="p-4 font-bold text-gray-800">${displayProduct}</td>
                                    <td class="p-4 text-gray-600">${item.dimensions}</td>
                                    <td class="p-4 text-gray-600">${item.sides}</td>
                                    <td class="p-4 text-center font-bold text-blue-700">${q}</td>
                                    <td class="p-4 text-right font-mono text-gray-500">$${expectedTotal.toFixed(2)}</td>
                                    <td class="p-4 text-right font-mono font-bold text-blue-600">$${livePriceTotal.toFixed(2)}</td>
                                    <td class="p-4 text-right font-mono font-bold ${varianceColor}">${varianceText}</td>
                                    <td class="p-4 text-center">${badge}</td>
                                </tr>
                            `;
                        }
                    }
                }

                btnExport.classList.remove('hidden');

            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="9" class="p-8 text-center text-red-500 font-bold uppercase">System Error: ${e.message}</td></tr>`;
            } finally {
                btn.disabled = false;
                btnText.innerText = "Execute Audit";
                loader.classList.add('hidden');
            }
        }

        function exportCSV() {
            if (auditResults.length === 0) return;

            let csvContent = "data:text/csv;charset=utf-8,Category,Product Line,Dimensions,Sides,Qty,Legacy Total,Live Cloud Total,Variance\n";

            auditResults.forEach(r => {
                let row = `${r.category},"${r.product}",${r.dimensions},${r.sides},${r.qty},${r.legacy.toFixed(2)},${r.live.toFixed(2)},${r.variance.toFixed(2)}`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `SignOS_Price_Matrix_Audit_${Date.now()}.csv`);
            document.body.appendChild(link);
            
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
