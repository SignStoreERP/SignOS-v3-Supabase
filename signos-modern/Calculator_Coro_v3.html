<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coroplast Quoter v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<div class="max-w-md mx-auto mt-6 w-[calc(100%-2rem)] sm:w-full">
    
    <!-- MAIN ISLAND CARD -->
    <div id="main-card" class="bg-white shadow-xl overflow-hidden rounded-xl border border-gray-200 relative">
        
        <!-- BOLD TOGGLE HEADER -->
        <div class="flex bg-slate-900 border-b border-gray-800 shrink-0">
            <button id="tab-calc" onclick="switchMode('calc')" class="flex-1 py-3.5 text-xs font-black uppercase tracking-widest bg-blue-600 text-white transition focus:outline-none">Calculator View</button>
            <button id="tab-sheet" onclick="switchMode('sheet')" class="flex-1 py-3.5 text-xs font-black uppercase tracking-widest text-gray-400 hover:text-white hover:bg-slate-800 transition focus:outline-none">Master Price Sheet</button>
        </div>

        <!-- ================= CALCULATOR MODE ================= -->
        <div id="view-calc" class="w-full transition-all duration-300">
            <!-- INPUTS -->
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none shadow-inner" oninput="runCalc()"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Width</label><input type="number" id="w" value="24" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none shadow-inner" oninput="runCalc()"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Height</label><input type="number" id="h" value="18" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none shadow-inner" oninput="runCalc()"></div>
                </div>

                <div class="flex flex-col items-center justify-center bg-gray-50 py-1.5 rounded border border-gray-100">
                    <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Producing from: 4' x 8' Sheet</span>
                    <span class="text-[8px] font-bold text-blue-500 uppercase tracking-wide mt-0.5">*Note: 5'x10' available via Custom Quote</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Thickness</label>
                        <select id="thickness" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none shadow-sm" onchange="runCalc()">
                            <option value="4mm">4mm Standard</option>
                            <option value="10mm">10mm Heavy Duty</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Sides</label>
                        <select id="sides" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none shadow-sm" onchange="runCalc()">
                            <option value="1">1-Sided</option>
                            <option value="2">2-Sided</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cutting Method</label>
                        <select id="shape" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none shadow-sm" onchange="runCalc()">
                            <option value="Rectangle">Standard (Square)</option>
                            <option value="CNC Simple">CNC (Simple)</option>
                            <option value="CNC Complex">CNC (Complex)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Hardware</label>
                        <select id="hardware" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none shadow-sm" onchange="runCalc()">
                            <option value="None">None</option>
                            <option value="H-Stakes">Standard H-Stakes</option>
                            <option value="HD-Stakes">Heavy Duty Stakes</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- RESULTS -->
            <div class="bg-blue-50 p-6 border-t border-blue-100 shadow-inner">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Price</span>
                    <span id="ui-unit" class="text-2xl font-black text-blue-900 tracking-tight">$0.00</span>
                </div>
                <div class="border-t border-blue-200/50 my-3"></div>

                <!-- DYNAMIC LINE ITEMS -->
                <div id="ui-line-items" class="space-y-1.5 text-xs text-blue-900/80 pt-1 pb-2"></div>

                <div class="flex justify-between items-end border-t-2 border-blue-800 my-3 pt-2">
                    <div>
                        <span class="text-xs font-bold text-blue-800 uppercase block">Total Quote</span>
                        <span class="text-[9px] font-bold text-blue-600 uppercase block mt-1" id="ui-min-text">Shop Minimum: $50</span>
                        <div id="min-badge" class="hidden bg-red-100 text-red-600 border border-red-200 text-[9px] font-bold px-1 rounded inline-block mt-1">MINIMUM APPLIED</div>
                    </div>
                    <span class="text-3xl font-black text-blue-700" id="ui-total">---</span>
                </div>
            </div>

            <!-- DESCRIPTION GENERATOR -->
            <div class="bg-gray-50 p-4 border-t border-gray-200">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Job Description</label>
                <textarea id="job-desc" class="w-full text-xs p-2 border border-gray-300 rounded bg-white h-20 text-gray-600 font-mono outline-none shadow-inner" readonly></textarea>
            </div>
        </div>

        <!-- ================= SHEET VIEW MODE ================= -->
        <div id="view-sheet" class="hidden w-full transition-all duration-300 flex flex-col h-[650px]">
            <div class="p-4 bg-slate-50 border-b border-gray-200 flex flex-col gap-3 shrink-0 shadow-sm">
                <!-- Top Row: Thickness -->
                <div class="flex bg-white rounded border border-gray-300 p-0.5 shadow-sm">
                    <button id="filter-4mm" onclick="setThkFilter('4mm Coroplast')" class="flex-1 py-1.5 font-black text-[10px] rounded bg-indigo-600 text-white shadow uppercase tracking-widest transition">4mm Standard</button>
                    <button id="filter-10mm" onclick="setThkFilter('10mm Coroplast')" class="flex-1 py-1.5 font-black text-[10px] rounded text-gray-600 hover:bg-gray-100 uppercase tracking-widest transition">10mm Heavy Duty</button>
                </div>
                <!-- Bottom Row: Sides -->
                <div class="flex bg-white rounded border border-gray-300 p-0.5 shadow-sm">
                    <button id="filter-ss" onclick="setSideFilter('Single')" class="flex-1 py-1.5 font-black text-[10px] rounded bg-blue-600 text-white shadow uppercase tracking-widest transition">Single Sided</button>
                    <button id="filter-ds" onclick="setSideFilter('Double')" class="flex-1 py-1.5 font-black text-[10px] rounded text-gray-600 hover:bg-gray-100 uppercase tracking-widest transition">Double Sided</button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scroll relative bg-gray-50">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-white sticky top-0 border-b border-gray-200 text-[10px] font-black text-gray-500 uppercase tracking-widest shadow-sm z-10">
                        <tr>
                            <th class="p-3">Dimensions</th>
                            <th class="p-3 text-center">Sides</th>
                            <th class="p-3 text-right">Qty 1-9</th>
                            <th class="p-3 text-right text-blue-600">Qty 10+</th>
                        </tr>
                    </thead>
                    <tbody id="sheet-body" class="text-xs font-medium divide-y divide-gray-100 bg-white">
                        <tr><td colspan="4" class="p-6 text-center text-gray-400 italic">Fetching Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
let backendData = null;
let calcTimeout = null;
let rawSheetData = [];

// State for Sheet Filters
let activeThk = '4mm Coroplast';
let activeSide = 'Single';

// UI Toggle Logic
function switchMode(mode) {
    const isCalc = mode === 'calc';
    document.getElementById('view-calc').classList.toggle('hidden', !isCalc);
    document.getElementById('view-sheet').classList.toggle('hidden', isCalc);
    
    document.getElementById('tab-calc').className = isCalc ? "flex-1 py-3.5 text-xs font-black uppercase tracking-widest bg-blue-600 text-white transition focus:outline-none" : "flex-1 py-3.5 text-xs font-black uppercase tracking-widest text-gray-400 hover:text-white hover:bg-slate-800 transition focus:outline-none";
    document.getElementById('tab-sheet').className = !isCalc ? "flex-1 py-3.5 text-xs font-black uppercase tracking-widest bg-blue-600 text-white transition focus:outline-none" : "flex-1 py-3.5 text-xs font-black uppercase tracking-widest text-gray-400 hover:text-white hover:bg-slate-800 transition focus:outline-none";

    if (!isCalc && rawSheetData.length === 0) fetchSheetData();
}

// Sheet View Logic
async function fetchSheetData() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ref_retail_history?product_line=ilike.*Coroplast*&select=*`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if(res.ok) {
            rawSheetData = await res.json();
            renderSheet();
        }
    } catch(e) { console.error("Sheet Fetch Error:", e); }
}

function setThkFilter(thk) {
    activeThk = thk;
    document.getElementById('filter-4mm').className = thk === '4mm Coroplast' ? "flex-1 py-1.5 font-black text-[10px] rounded bg-indigo-600 text-white shadow uppercase tracking-widest transition" : "flex-1 py-1.5 font-black text-[10px] rounded text-gray-600 hover:bg-gray-100 uppercase tracking-widest transition";
    document.getElementById('filter-10mm').className = thk === '10mm Coroplast' ? "flex-1 py-1.5 font-black text-[10px] rounded bg-indigo-600 text-white shadow uppercase tracking-widest transition" : "flex-1 py-1.5 font-black text-[10px] rounded text-gray-600 hover:bg-gray-100 uppercase tracking-widest transition";
    renderSheet();
}

function setSideFilter(side) {
    activeSide = side;
    document.getElementById('filter-ss').className = side === 'Single' ? "flex-1 py-1.5 font-black text-[10px] rounded bg-blue-600 text-white shadow uppercase tracking-widest transition" : "flex-1 py-1.5 font-black text-[10px] rounded text-gray-600 hover:bg-gray-100 uppercase tracking-widest transition";
    document.getElementById('filter-ds').className = side === 'Double' ? "flex-1 py-1.5 font-black text-[10px] rounded bg-blue-600 text-white shadow uppercase tracking-widest transition" : "flex-1 py-1.5 font-black text-[10px] rounded text-gray-600 hover:bg-gray-100 uppercase tracking-widest transition";
    renderSheet();
}

function renderSheet() {
    // Filter and Sort by Physical Area
    let filtered = rawSheetData.filter(r => r.product_line === activeThk && r.sides === activeSide);
    filtered.sort((a, b) => {
        const getArea = (dim) => {
            if(!dim) return 0;
            const [w, h] = dim.toLowerCase().split('x').map(Number);
            return (w || 0) * (h || 0);
        };
        return getArea(a.dimensions) - getArea(b.dimensions);
    });

    let html = '';
    if(filtered.length === 0) {
        html = `<tr><td colspan="4" class="p-6 text-center text-gray-400 italic font-bold">No pricing matrix defined for this combination yet.</td></tr>`;
    } else {
        filtered.forEach(row => {
            const basePrice = parseFloat(row.legacy_price || 0);
            const bulkPrice = basePrice * 0.95; 
            
            html += `<tr class="even:bg-gray-50 hover:bg-blue-50 transition-colors cursor-default">
                <td class="p-3 font-bold text-gray-800">${row.dimensions}</td>
                <td class="p-3 text-center text-gray-500">${row.sides}</td>
                <td class="p-3 text-right font-mono font-bold text-gray-700">$${basePrice.toFixed(2)}</td>
                <td class="p-3 text-right font-mono font-black text-blue-600">$${bulkPrice.toFixed(2)}</td>
            </tr>`;
        });
    }
    document.getElementById('sheet-body').innerHTML = html;
}

// Math Engine Logic
function runCalc() {
    if(!backendData) return;
    clearTimeout(calcTimeout);
    
    calcTimeout = setTimeout(async () => {
        const totalEl = document.getElementById('ui-total');
        const unitEl = document.getElementById('ui-unit');
        
        if(totalEl) totalEl.classList.add('opacity-50', 'transition-opacity', 'duration-200');
        if(unitEl) unitEl.classList.add('opacity-50', 'transition-opacity', 'duration-200');

        try {
            const userRole = sessionStorage.getItem('signos_role') || 'SALES';
            const activeAuditMode = (userRole === 'SALES') ? 'retail_only' : 'full';

            const inputs = {
                qty: parseFloat(document.getElementById('qty').value) || 1,
                w: parseFloat(document.getElementById('w').value) || 24,
                h: parseFloat(document.getElementById('h').value) || 18,
                thickness: document.getElementById('thickness').value,
                sides: parseInt(document.getElementById('sides').value) || 1,
                shape: document.getElementById('shape').value,
                hardware: document.getElementById('hardware').value
            };

            const response = await fetch(`${EDGE_URL}/functions/v1/calculate-coro-v3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                body: JSON.stringify({ inputs: inputs, config: backendData, audit_mode: activeAuditMode })
            });

            if (!response.ok) throw new Error("Server Rejected Request");
            const result = await response.json();
            
            if (!result || !result.retail) return;
            const ret = result.retail;
            const fmt = (n) => "$" + (n || 0).toFixed(2);

            unitEl.innerText = fmt(ret.unitPrice);
            totalEl.innerText = fmt(ret.grandTotal);

            // Render Dynamic Line Items
            let lineItemsHtml = '';
            ret.breakdown.forEach(item => {
                if(item.label !== 'Shop Minimum Surcharge' && item.label !== 'Shop Minimum') {
                    lineItemsHtml += `<div class="flex justify-between"><span>${item.label}:</span><span class="font-bold">${fmt(item.total)}</span></div>`;
                }
            });
            document.getElementById('ui-line-items').innerHTML = lineItemsHtml;

            const minOrder = parseFloat(backendData.Retail_Min_Order || "50");
            document.getElementById('ui-min-text').innerText = `Shop Minimum: $${minOrder}`;
            document.getElementById('min-badge').classList.toggle('hidden', !ret.isMinApplied);

            const sideTxt = inputs.sides === 2 ? "Double-Sided" : "Single-Sided";
            const cutTxt = inputs.shape === 'Rectangle' ? 'Square/Rectangle Cut' : 'Custom CNC Cut';
            const hwTxt = inputs.hardware === 'None' ? 'No Hardware' : inputs.hardware;
            document.getElementById('job-desc').value = `(x${inputs.qty}) ${inputs.w}" x ${inputs.h}" ${inputs.thickness} Custom Coroplast Signs.\n${sideTxt}. ${cutTxt}. ${hwTxt}.`;

        } catch(e) { 
            console.error("Engine Error:", e); 
        } finally {
            if(totalEl) totalEl.classList.remove('opacity-50');
            if(unitEl) unitEl.classList.remove('opacity-50');
        }
    }, 200);
}

// Initialization
window.addEventListener('load', async () => {
    if (typeof injectHeader === 'function') injectHeader("Coroplast v3.0");
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    
    try {
        const payload = await SignOS.fetchProductData('PROD_Coroplast_Signs');
        if(payload.error) throw new Error(payload.error);
        
        backendData = payload.config;
        
        if (typeof SignOS_Sandbox !== 'undefined' && backendData.ui_schema) {
            SignOS_Sandbox.init(backendData.ui_schema, backendData, runCalc);
        }

        if(statusText) {
            statusText.innerText = "ONLINE";
            statusText.className = "font-bold text-green-500";
            if(statusDot) {
                statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                statusDot.classList.remove("animate-pulse");
            }
        }
        runCalc();
    } catch(e) {
        if(statusText) {
            statusText.innerText = "OFFLINE";
            statusText.className = "font-bold text-red-500";
        }
        console.error("Initialization Error:", e);
    }
});
</script>
</body>
</html>
