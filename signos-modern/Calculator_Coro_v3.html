<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coroplast Quoter v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }</style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<div class="max-w-2xl mx-auto mt-6 w-full px-4">
    <!-- TOGGLE HEADER -->
    <div class="flex justify-center mb-6">
        <div class="bg-gray-200 p-1 rounded-lg flex gap-1 shadow-inner">
            <button id="tab-calc" onclick="switchMode('calc')" class="px-6 py-2 text-xs font-black uppercase tracking-widest rounded-md bg-white text-blue-700 shadow-sm transition">Calculator</button>
            <button id="tab-sheet" onclick="switchMode('sheet')" class="px-6 py-2 text-xs font-black uppercase tracking-widest rounded-md text-gray-500 hover:text-gray-800 transition">Sheet View</button>
        </div>
    </div>

    <!-- CALCULATOR MODE -->
    <div id="view-calc" class="w-full bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200">
        <div class="p-6 space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border p-2 rounded font-bold text-lg text-center bg-gray-50 outline-none" oninput="runCalc()"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Width</label><input type="number" id="w" value="24" class="w-full border p-2 rounded font-bold text-lg text-center bg-gray-50 outline-none" oninput="runCalc()"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Height</label><input type="number" id="h" value="18" class="w-full border p-2 rounded font-bold text-lg text-center bg-gray-50 outline-none" oninput="runCalc()"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 pt-2">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Thickness</label>
                    <select id="thickness" class="w-full border p-2 rounded bg-white font-bold text-sm outline-none" onchange="runCalc()">
                        <option value="4mm">4mm Standard</option>
                        <option value="10mm">10mm Heavy Duty</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Sides</label>
                    <select id="sides" class="w-full border p-2 rounded bg-white font-bold text-sm outline-none" onchange="runCalc()">
                        <option value="1">1-Sided</option>
                        <option value="2">2-Sided</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-blue-50 p-6 border-t border-blue-100 shadow-inner">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Price</span>
                <span id="ui-unit" class="text-2xl font-black text-blue-900 tracking-tight">$0.00</span>
            </div>
            <div class="border-t border-blue-200/50 my-3"></div>
            <div id="ui-ledger" class="space-y-1 text-xs text-blue-900/70 pt-1 pb-3 font-mono"></div>
            <div class="flex justify-between items-end border-t-2 border-blue-800 pt-2">
                <div>
                    <span class="text-xs font-bold text-blue-800 uppercase block">Total Quote</span>
                </div>
                <span class="text-3xl font-black text-blue-700" id="ui-total">---</span>
            </div>
        </div>
    </div>

    <!-- SHEET VIEW MODE -->
    <div id="view-sheet" class="hidden w-full bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
            <h2 class="text-sm font-black uppercase tracking-widest">Master Price Sheet</h2>
            <span class="text-[10px] bg-blue-600 px-2 py-1 rounded">Coroplast</span>
        </div>
        <div class="p-0 overflow-x-auto">
            <table class="w-full text-left border-collapse text-sm">
                <thead class="bg-slate-100 border-b border-gray-200 text-[10px] font-black text-gray-500 uppercase tracking-widest">
                    <tr>
                        <th class="p-3">Dimensions</th>
                        <th class="p-3">Thickness</th>
                        <th class="p-3">Sides</th>
                        <th class="p-3 text-right">Price</th>
                    </tr>
                </thead>
                <tbody id="sheet-body" class="divide-y divide-gray-100">
                    <tr><td colspan="4" class="p-6 text-center text-gray-400 italic">Fetching Database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let backendData = null;
let calcTimeout = null;

function switchMode(mode) {
    const isCalc = mode === 'calc';
    document.getElementById('view-calc').classList.toggle('hidden', !isCalc);
    document.getElementById('view-sheet').classList.toggle('hidden', isCalc);
    
    document.getElementById('tab-calc').className = isCalc ? "px-6 py-2 text-xs font-black uppercase tracking-widest rounded-md bg-white text-blue-700 shadow-sm transition" : "px-6 py-2 text-xs font-black uppercase tracking-widest rounded-md text-gray-500 hover:text-gray-800 transition";
    document.getElementById('tab-sheet').className = !isCalc ? "px-6 py-2 text-xs font-black uppercase tracking-widest rounded-md bg-white text-blue-700 shadow-sm transition" : "px-6 py-2 text-xs font-black uppercase tracking-widest rounded-md text-gray-500 hover:text-gray-800 transition";

    if (!isCalc) loadSheetView();
}

async function loadSheetView() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ref_retail_history?product_line=ilike.*Coroplast*&select=*&order=legacy_price.asc`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        const data = await res.json();
        let html = '';
        data.forEach(row => {
            html += `<tr class="hover:bg-gray-50 transition">
                <td class="p-3 font-bold text-gray-800">${row.dimensions}</td>
                <td class="p-3 text-gray-600">${row.product_line}</td>
                <td class="p-3 text-gray-600">${row.sides}</td>
                <td class="p-3 text-right font-mono font-bold text-blue-600">$${parseFloat(row.legacy_price || 0).toFixed(2)}</td>
            </tr>`;
        });
        document.getElementById('sheet-body').innerHTML = html;
    } catch(e) { console.error("Sheet View Error:", e); }
}

function runCalc() {
    if(!backendData) return;
    clearTimeout(calcTimeout);
    
    calcTimeout = setTimeout(async () => {
        try {
            const userRole = sessionStorage.getItem('signos_role') || 'SALES';
            // Role Morphing SRE Throttle
            const activeAuditMode = (userRole === 'SALES') ? 'retail_only' : 'full';

            const inputs = {
                qty: parseFloat(document.getElementById('qty').value) || 1,
                w: parseFloat(document.getElementById('w').value) || 24,
                h: parseFloat(document.getElementById('h').value) || 18,
                thickness: document.getElementById('thickness').value,
                sides: parseInt(document.getElementById('sides').value) || 1
            };

            const response = await fetch(`${EDGE_URL}/functions/v1/calculate-coro-v3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                body: JSON.stringify({ inputs: inputs, config: backendData, audit_mode: activeAuditMode })
            });

            const result = await response.json();
            if (!result || !result.retail) return;

            document.getElementById('ui-unit').innerText = "$" + (result.retail.unitPrice).toFixed(2);
            document.getElementById('ui-total').innerText = "$" + (result.retail.grandTotal).toFixed(2);
            
            let lineHtml = '';
            result.retail.breakdown.forEach(item => {
                lineHtml += `<div class="flex justify-between"><span>${item.label}</span><span class="font-bold">$${item.total.toFixed(2)}</span></div>`;
            });
            document.getElementById('ui-ledger').innerHTML = lineHtml;

        } catch(e) { console.error("Edge Engine Error:", e); }
    }, 200);
}

window.addEventListener('load', async () => {
    if (typeof injectHeader === 'function') injectHeader("Coroplast v3");
    try {
        const payload = await SignOS.fetchProductData('PROD_Coro');
        backendData = payload.config;
        runCalc();
    } catch(e) { console.error("Initialization Error:", e); }
});
</script>
</body>
</html>
