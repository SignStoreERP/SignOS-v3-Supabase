<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coroplast Quoter v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col pb-10">

<div class="max-w-md mx-auto mt-6 w-[calc(100%-2rem)] sm:w-full">
    
    <!-- TOGGLE HEADER -->
    <div class="flex justify-center mb-4">
        <div class="bg-gray-200 p-1 rounded-lg flex gap-1 shadow-inner w-full max-w-[250px]">
            <button id="tab-calc" onclick="switchMode('calc')" class="flex-1 py-2 text-xs font-black uppercase tracking-widest rounded-md bg-white text-blue-700 shadow-sm transition">Calculator</button>
            <button id="tab-sheet" onclick="switchMode('sheet')" class="flex-1 py-2 text-xs font-black uppercase tracking-widest rounded-md text-gray-500 hover:text-gray-800 transition">Sheet View</button>
        </div>
    </div>

    <!-- MAIN ISLAND CARD -->
    <div id="main-card" class="bg-white shadow-lg overflow-hidden rounded-xl border border-gray-200 relative">
        
        <!-- ================= CALCULATOR MODE ================= -->
        <div id="view-calc" class="w-full transition-all duration-300">
            <!-- INPUTS -->
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Qty</label><input type="number" id="qty" value="1" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Width</label><input type="number" id="w" value="24" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
                    <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Height</label><input type="number" id="h" value="18" min="1" class="w-full border p-2 rounded font-bold text-gray-800 text-lg text-center bg-gray-50 focus:border-blue-500 outline-none" oninput="runCalc()"></div>
                </div>

                <div class="flex flex-col items-center justify-center bg-gray-50 py-1.5 rounded border border-gray-100">
                    <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Producing from: 4' x 8' Sheet</span>
                    <span class="text-[8px] font-bold text-blue-500 uppercase tracking-wide mt-0.5">*Note: 5'x10' available via Custom Quote</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Thickness</label>
                        <select id="thickness" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="runCalc()">
                            <option value="4mm">4mm Standard</option>
                            <option value="10mm">10mm Heavy Duty</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Sides</label>
                        <select id="sides" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="runCalc()">
                            <option value="1">1-Sided</option>
                            <option value="2">2-Sided</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cutting Method</label>
                        <select id="shape" class="w-full border p-2 rounded bg-white font-bold text-sm h-[42px] focus:border-blue-500 outline-none" onchange="runCalc()">
                            <option value="Rectangle">Standard (Square/Rectangle)</option>
                            <option value="CNC Simple">CNC (Simple Shape)</option>
                            <option value="CNC Complex">CNC (Complex Shape)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- RESULTS -->
            <div class="bg-blue-50 p-6 border-t border-blue-100 shadow-inner">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Unit Price</span>
                    <span id="ui-unit" class="text-2xl font-black text-blue-900 tracking-tight">$0.00</span>
                </div>
                <div class="border-t border-blue-200/50 my-3"></div>

                <div class="space-y-1 text-xs text-blue-900/70 pt-1">
                    <div class="flex justify-between"><span>Printed Signs (<span id="lbl-sqft">0</span> sqft):</span><span id="ui-print" class="font-bold">$0.00</span></div>
                    <div class="flex justify-between text-orange-700 hidden" id="row-router"><span>CNC Router Fee:</span><span id="ui-router" class="font-bold">$0.00</span></div>
                </div>

                <div class="flex justify-between items-end border-t-2 border-blue-800 my-3 pt-2">
                    <div>
                        <span class="text-xs font-bold text-blue-800 uppercase block">Total Quote</span>
                        <span class="text-[9px] font-bold text-blue-600 uppercase block mt-1" id="ui-min-text">Shop Minimum: $50</span>
                        <div id="min-badge" class="hidden bg-red-100 text-red-600 border border-red-200 text-[9px] font-bold px-1 rounded inline-block mt-1">MINIMUM APPLIED</div>
                    </div>
                    <span class="text-3xl font-black text-blue-700" id="ui-total">---</span>
                </div>
            </div>

            <!-- DESCRIPTION GENERATOR -->
            <div class="bg-gray-50 p-4 border-t border-gray-200">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Job Description</label>
                <textarea id="job-desc" class="w-full text-xs p-2 border rounded bg-white h-20 text-gray-600 font-mono outline-none" readonly></textarea>
            </div>
        </div>

        <!-- ================= SHEET VIEW MODE ================= -->
        <div id="view-sheet" class="hidden w-full transition-all duration-300 flex flex-col h-[650px]">
            <div class="p-5 bg-slate-900 text-white flex justify-between items-center shrink-0">
                <h2 class="text-sm font-black uppercase tracking-widest">Master Price Sheet</h2>
                <span class="text-[10px] bg-blue-600 px-2 py-1 rounded font-bold tracking-widest">COROPLAST</span>
            </div>
            
            <div class="p-4 bg-slate-50 border-b border-gray-200 flex justify-center gap-3 shrink-0 shadow-sm">
                <button id="filter-ss" onclick="renderSheet('Single')" class="w-1/2 py-2 bg-blue-600 text-white font-black text-[10px] rounded shadow uppercase tracking-widest transition">Single Sided</button>
                <button id="filter-ds" onclick="renderSheet('Double')" class="w-1/2 py-2 bg-white text-gray-600 border border-gray-300 hover:bg-gray-100 font-black text-[10px] rounded shadow-sm uppercase tracking-widest transition">Double Sided</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scroll relative">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-white sticky top-0 border-b border-gray-200 text-[10px] font-black text-gray-500 uppercase tracking-widest shadow-sm z-10">
                        <tr>
                            <th class="p-3">Dimensions</th>
                            <th class="p-3 text-center">Sides</th>
                            <th class="p-3 text-right">Qty 1-9</th>
                            <th class="p-3 text-right text-blue-600">Qty 10+</th>
                        </tr>
                    </thead>
                    <tbody id="sheet-body" class="text-xs font-medium divide-y divide-gray-100">
                        <tr><td colspan="4" class="p-6 text-center text-gray-400 italic">Fetching Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
let backendData = null;
let calcTimeout = null;
let rawSheetData = [];

// UI Toggle Logic
function switchMode(mode) {
    const isCalc = mode === 'calc';
    document.getElementById('view-calc').classList.toggle('hidden', !isCalc);
    document.getElementById('view-sheet').classList.toggle('hidden', isCalc);
    
    document.getElementById('tab-calc').className = isCalc ? "flex-1 py-2 text-xs font-black uppercase tracking-widest rounded-md bg-white text-blue-700 shadow-sm transition" : "flex-1 py-2 text-xs font-black uppercase tracking-widest rounded-md text-gray-500 hover:text-gray-800 transition";
    document.getElementById('tab-sheet').className = !isCalc ? "flex-1 py-2 text-xs font-black uppercase tracking-widest rounded-md bg-white text-blue-700 shadow-sm transition" : "flex-1 py-2 text-xs font-black uppercase tracking-widest rounded-md text-gray-500 hover:text-gray-800 transition";

    if (!isCalc && rawSheetData.length === 0) fetchSheetData();
}

// Sheet View Logic
async function fetchSheetData() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ref_retail_history?product_line=ilike.*Coroplast*&select=*`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if(res.ok) {
            rawSheetData = await res.json();
            renderSheet('Single');
        }
    } catch(e) { console.error("Sheet Fetch Error:", e); }
}

function renderSheet(sideFilter) {
    // Update Button Styles
    const isSS = sideFilter === 'Single';
    document.getElementById('filter-ss').className = isSS ? "w-1/2 py-2 bg-blue-600 text-white font-black text-[10px] rounded shadow uppercase tracking-widest transition" : "w-1/2 py-2 bg-white text-gray-600 border border-gray-300 hover:bg-gray-100 font-black text-[10px] rounded shadow-sm uppercase tracking-widest transition";
    document.getElementById('filter-ds').className = !isSS ? "w-1/2 py-2 bg-blue-600 text-white font-black text-[10px] rounded shadow uppercase tracking-widest transition" : "w-1/2 py-2 bg-white text-gray-600 border border-gray-300 hover:bg-gray-100 font-black text-[10px] rounded shadow-sm uppercase tracking-widest transition";

    // Filter and Sort by Physical Area
    let filtered = rawSheetData.filter(r => r.sides === sideFilter);
    filtered.sort((a, b) => {
        const getArea = (dim) => {
            if(!dim) return 0;
            const [w, h] = dim.toLowerCase().split('x').map(Number);
            return (w || 0) * (h || 0);
        };
        return getArea(a.dimensions) - getArea(b.dimensions);
    });

    // Render Rows with Alternating Colors and Hover
    let html = '';
    filtered.forEach(row => {
        const basePrice = parseFloat(row.legacy_price || 0);
        const bulkPrice = basePrice * 0.95; // The 5% volume break
        
        html += `<tr class="even:bg-gray-50 hover:bg-blue-50 transition-colors cursor-default">
            <td class="p-3 font-bold text-gray-800">${row.dimensions}</td>
            <td class="p-3 text-center text-gray-500">${row.sides}</td>
            <td class="p-3 text-right font-mono font-bold text-gray-700">$${basePrice.toFixed(2)}</td>
            <td class="p-3 text-right font-mono font-black text-blue-600">$${bulkPrice.toFixed(2)}</td>
        </tr>`;
    });
    document.getElementById('sheet-body').innerHTML = html;
}

// Math Engine Logic
function runCalc() {
    if(!backendData) return;
    clearTimeout(calcTimeout);
    
    calcTimeout = setTimeout(async () => {
        const totalEl = document.getElementById('ui-total');
        const unitEl = document.getElementById('ui-unit');
        
        if(totalEl) totalEl.classList.add('opacity-50', 'transition-opacity', 'duration-200');
        if(unitEl) unitEl.classList.add('opacity-50', 'transition-opacity', 'duration-200');

        try {
            const userRole = sessionStorage.getItem('signos_role') || 'SALES';
            const activeAuditMode = (userRole === 'SALES') ? 'retail_only' : 'full';

            const inputs = {
                qty: parseFloat(document.getElementById('qty').value) || 1,
                w: parseFloat(document.getElementById('w').value) || 24,
                h: parseFloat(document.getElementById('h').value) || 18,
                thickness: document.getElementById('thickness').value,
                sides: parseInt(document.getElementById('sides').value) || 1,
                shape: document.getElementById('shape').value
            };

            const response = await fetch(`${EDGE_URL}/functions/v1/calculate-coro-v3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': EDGE_KEY, 'Authorization': `Bearer ${EDGE_KEY}` },
                body: JSON.stringify({ inputs: inputs, config: backendData, audit_mode: activeAuditMode })
            });

            if (!response.ok) throw new Error("Server Rejected Request");
            const result = await response.json();
            
            if (!result || !result.retail) return;
            const ret = result.retail;
            const fmt = (n) => "$" + (n || 0).toFixed(2);

            const totalSqFt = ((inputs.w * inputs.h) / 144) * inputs.qty;
            document.getElementById('lbl-sqft').innerText = totalSqFt.toFixed(1);

            unitEl.innerText = fmt(ret.unitPrice);
            totalEl.innerText = fmt(ret.grandTotal);
            document.getElementById('ui-print').innerText = fmt(ret.printTotal);

            if (ret.routerFee > 0) {
                document.getElementById('row-router').classList.remove('hidden');
                document.getElementById('ui-router').innerText = fmt(ret.routerFee);
            } else {
                document.getElementById('row-router').classList.add('hidden');
            }

            const minOrder = parseFloat(backendData.Retail_Min_Order || "50");
            document.getElementById('ui-min-text').innerText = `Shop Minimum: $${minOrder}`;
            document.getElementById('min-badge').classList.toggle('hidden', !ret.isMinApplied);

            const sideTxt = inputs.sides === 2 ? "Double-Sided" : "Single-Sided";
            const cutTxt = inputs.shape === 'Rectangle' ? 'Square/Rectangle Cut' : 'Custom CNC Cut';
            document.getElementById('job-desc').value = `(x${inputs.qty}) ${inputs.w}" x ${inputs.h}" ${inputs.thickness} Custom Coroplast Signs.\n${sideTxt}. ${cutTxt}.`;

        } catch(e) { 
            console.error("Engine Error:", e); 
        } finally {
            if(totalEl) totalEl.classList.remove('opacity-50');
            if(unitEl) unitEl.classList.remove('opacity-50');
        }
    }, 200);
}

// Initialization
window.addEventListener('load', async () => {
    if (typeof injectHeader === 'function') injectHeader("Coroplast v3.0");
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    
    try {
        // FIXED: Using the exact Postgres Database ID mapped to the Coroplast configuration
        const payload = await SignOS.fetchProductData('PROD_Coroplast_Signs');
        if(payload.error) throw new Error(payload.error);
        
        backendData = payload.config;
        
        if (typeof SignOS_Sandbox !== 'undefined' && backendData.ui_schema) {
            SignOS_Sandbox.init(backendData.ui_schema, backendData, runCalc);
        }

        if(statusText) {
            statusText.innerText = "ONLINE";
            statusText.className = "font-bold text-green-500";
            if(statusDot) {
                statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                statusDot.classList.remove("animate-pulse");
            }
        }
        runCalc();
    } catch(e) {
        if(statusText) {
            statusText.innerText = "OFFLINE";
            statusText.className = "font-bold text-red-500";
        }
        console.error("Initialization Error:", e);
    }
});
</script>
</body>
</html>
